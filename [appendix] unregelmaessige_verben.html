<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unregelmäßige Verben – Arbeitswelt</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,600;1,8..60,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f5f2ec;
    --surface:   #ffffff;
    --surface2:  #eef3f8;
    --border:    #ccd6e0;
    --accent:    #1a4a7a;
    --accent2:   #2e75b6;
    --accent3:   #e8f0f8;
    --text:      #1a1f2e;
    --muted:     #5a6270;
    --tag-prae:  #1a6e3c;
    --tag-praet: #7a3a00;
    --tag-perf:  #4a1a7a;
    --tag-fut:   #1a4a7a;
    --playing:   #d4edda;
    --playing-border: #28a745;
    --hover-form: #e8f4fd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Serif 4', 'Noto Serif TC', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--accent);
    color: white;
    padding: 28px 32px 24px;
    border-bottom: 4px solid var(--accent2);
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  header h1 span {
    display: block;
    font-size: 0.72rem;
    font-weight: 400;
    opacity: 0.7;
    letter-spacing: 0.08em;
    margin-top: 3px;
    font-family: 'Source Serif 4', serif;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .count-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  /* ── SEARCH & FILTER ── */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    position: sticky;
    top: 89px;
    z-index: 99;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 380px;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
  }
  #searchInput {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  #searchInput:focus { border-color: var(--accent2); }

  .filter-btn {
    padding: 7px 14px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    font-size: 0.82rem;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .filter-btn:hover:not(.active) { border-color: var(--accent2); color: var(--accent2); }

  #resultCount {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-left: auto;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
    gap: 20px;
    padding: 28px 32px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.15s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    box-shadow: 0 4px 20px rgba(26,74,122,0.12);
    transform: translateY(-1px);
  }

  /* Card header: verb forms */
  .card-forms {
    background: var(--accent);
    color: white;
    padding: 14px 18px 12px;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    transition: background 0.15s;
    position: relative;
  }
  .card-forms:hover { background: #1d5491; }
  .card-forms.playing {
    background: #145a32;
    outline: 2px solid #28a745;
  }

  .forms-left { flex: 1; }
  .infinitiv {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1;
    margin-bottom: 7px;
  }
  .forms-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
  }
  .form-item {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    opacity: 0.85;
    line-height: 1.4;
  }

  .speak-icon {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    margin-top: 2px;
  }
  .card-forms:hover .speak-icon { background: rgba(255,255,255,0.25); }
  .card-forms.playing .speak-icon { background: rgba(40,167,69,0.5); }

  /* Translation row */
  .card-trans {
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
    background: var(--accent3);
  }
  .trans-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
  }
  .trans-en {
    font-size: 0.82rem;
    color: var(--muted);
    font-style: italic;
  }

  /* Examples */
  .card-examples {
    padding: 10px 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .ex-row {
    display: grid;
    grid-template-columns: 68px 1fr;
    gap: 6px 10px;
    align-items: start;
    border-radius: 6px;
    padding: 2px 4px;
  }

  .tense-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    border-radius: 4px;
    text-align: center;
    white-space: nowrap;
    margin-top: 2px;
    text-transform: uppercase;
  }
  .tag-prae  { background: #d4edda; color: var(--tag-prae); }
  .tag-praet { background: #ffe8cc; color: var(--tag-praet); }
  .tag-perf  { background: #e8d5f5; color: var(--tag-perf); }
  .tag-fut   { background: #d0e8f8; color: var(--tag-fut); }

  .ex-content { display: flex; flex-direction: column; gap: 1px; }

  .ex-de {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text);
    cursor: pointer;
    border-radius: 4px;
    padding: 1px 5px;
    transition: background 0.12s;
    display: inline-block;
  }
  .ex-de:hover { background: var(--hover-form); }
  .ex-de.playing {
    background: var(--playing);
    outline: 1.5px solid var(--playing-border);
  }

  .ex-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.78rem;
    color: var(--muted);
    padding: 0 5px;
    line-height: 1.5;
  }

  /* ── SPEAKING INDICATOR ── */
  .speaking-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #28a745;
    margin-left: 5px;
    animation: pulse 0.8s infinite alternate;
    vertical-align: middle;
  }
  @keyframes pulse {
    from { opacity: 0.4; transform: scale(0.8); }
    to   { opacity: 1;   transform: scale(1.2); }
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 1rem;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    header { padding: 18px 16px; }
    .toolbar { padding: 12px 16px; top: 80px; }
    .grid { padding: 16px; gap: 14px; grid-template-columns: 1fr; }
    header h1 { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>
    Unregelmäßige Verben
    <span>不規則動詞 · Thema: Arbeitswelt</span>
  </h1>
  <div class="header-right">
    <div class="count-badge" id="totalCount">110 Verben</div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="動詞搜索… (z.B. gehen, 去, to go)">
  </div>
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="hat">hat + ge–</button>
  <button class="filter-btn" data-filter="ist">ist + ge–</button>
  <span id="resultCount"></span>
</div>

<div class="grid" id="verbGrid"></div>

<script>
const VERBS = [["befehlen","befiehlt","befahl","hat befohlen","命令，下令","to command, to order","Der Vorgesetzte befiehlt dem Team, den Bericht bis Freitag fertigzustellen.","上司命令團隊在週五前完成報告。","Der Manager befahl den Mitarbeitern, Überstunden zu leisten.","經理命令員工加班。","Die Geschäftsführung hat befohlen, alle Kosten zu reduzieren.","管理層已下令削減所有費用。","Der Projektleiter wird befehlen, die Arbeit neu zu verteilen.","項目負責人將命令重新分配工作。"],["beginnen","beginnt","begann","hat begonnen","開始，著手","to begin, to start","Das Meeting beginnt pünktlich um neun Uhr.","會議準時在九點開始。","Das neue Projekt begann mit einer Planungssitzung.","新項目從一次規劃會議開始。","Die Zusammenarbeit mit dem Kooperationspartner hat begonnen.","與合作夥伴的合作已經開始。","Die Schulung wird nächste Woche beginnen.","培訓將在下週開始。"],["begreifen","begreift","begriff","hat begriffen","理解，領悟","to understand, to grasp","Er begreift die neuen Arbeitsprozesse schnell.","他很快理解了新的工作流程。","Die neue Kollegin begriff die Aufgaben sofort.","新同事立刻理解了工作任務。","Das Team hat den Sinn der Umstrukturierung nicht begriffen.","團隊沒有理解重組的意義。","Er wird die Anforderungen nach der Einarbeitung besser begreifen.","他在入職培訓後會更好地理解要求。"],["betrügen","betrügt","betrog","hat betrogen","欺騙，詐騙","to deceive, to cheat","Wer seinen Arbeitgeber betrügt, riskiert seine Stelle.","欺騙雇主的人冒著失去職位的風險。","Der Angestellte betrog das Unternehmen um eine große Summe.","那名員工騙取了公司一大筆錢。","Ein Mitarbeiter hat die Buchhaltung betrogen.","一名員工欺騙了會計部門。","Wer betrügt, wird früher oder später entlassen werden.","欺騙者遲早會被解雇。"],["biegen","biegt","bog","hat gebogen","彎曲，轉彎","to bend, to turn","Der Techniker biegt das Kabel vorsichtig um die Ecke.","技術人員小心地將電纜彎繞過角落。","Er bog um die Ecke und betrat das Büro.","他轉過角落走進了辦公室。","Der Mechaniker hat das beschädigte Teil gebogen.","技師已將損壞的零件彎曲。","Man wird die Leitungen neu biegen müssen.","將需要重新彎曲管線。"],["bieten","bietet","bot","hat geboten","提供，出價","to offer, to bid","Das Unternehmen bietet seinen Mitarbeitern flexible Arbeitszeiten.","公司向員工提供彈性工作時間。","Die Firma bot dem Bewerber ein attraktives Gehalt.","公司向應聘者提出了有吸引力的薪資。","Die neue Stelle hat gute Entwicklungsmöglichkeiten geboten.","新職位提供了良好的發展機會。","Das Unternehmen wird bessere Konditionen bieten.","公司將提供更好的條件。"],["bitten","bittet","bat","hat gebeten","請求，要求","to ask, to request","Die Mitarbeiterin bittet um einen freien Tag.","員工請求休一天假。","Er bat seinen Vorgesetzten um ein Feedback-Gespräch.","他請求上司進行一次反饋談話。","Die Kollegin hat um eine Gehaltserhöhung gebeten.","同事已請求加薪。","Er wird die Personalabteilung um Unterstützung bitten.","他將請求人事部門的支持。"],["bleiben","bleibt","blieb","ist geblieben","留下，保持","to stay, to remain","Sie bleibt heute länger im Büro.","她今天在辦公室待得比較晚。","Der Direktor blieb trotz des Angebots in seiner Stelle.","儘管有其他機會，主任仍然留在了他的職位上。","Er ist der Firma zwanzig Jahre lang treu geblieben.","他在公司忠心耿耿地待了二十年。","Sie wird vorerst in der gleichen Abteilung bleiben.","她暫時將留在同一個部門。"],["brechen","bricht","brach","hat gebrochen","違反，打破","to break, to violate","Er bricht nie seine Versprechen gegenüber Kollegen.","他從不違背對同事的承諾。","Die Firma brach den Vertrag ohne Vorwarnung.","公司在沒有預警的情況下違約了。","Der Mitarbeiter hat die Arbeitszeitregelung gebrochen.","員工違反了工作時間規定。","Niemand wird die Vereinbarungen brechen dürfen.","任何人都不得違反協議。"],["bringen","bringt","brachte","hat gebracht","帶來，提交","to bring, to submit","Er bringt die Unterlagen ins Büro des Chefs.","他把文件帶到主管辦公室。","Sie brachte frische Ideen in das Projekt ein.","她為項目帶來了新思路。","Das neue Verfahren hat gute Ergebnisse gebracht.","新流程帶來了良好的成果。","Der Praktikant wird die Berichte morgen bringen.","實習生明天會把報告帶來。"],["denken","denkt","dachte","hat gedacht","思考，認為","to think, to consider","Der Ingenieur denkt über neue Lösungsansätze nach.","工程師正在思考新的解決方案。","Sie dachte lange über das Jobangebot nach.","她對那份工作邀請思考了很久。","Das Team hat kreativ über das Problem gedacht.","團隊對問題進行了創造性思考。","Man wird auch an die langfristigen Folgen denken müssen.","也必須考慮長遠的後果。"],["dürfen","darf","durfte","hat dürfen/gedurft","被允許，可以","may, to be allowed to","Praktikante // ── TTS ──────────────────────────────────────────────────────────────────────
let currentUtterance = null;
let currentPlayingEl = null;

function stopSpeaking() {
  window.speechSynthesis.cancel();
  if (currentPlayingEl) {
    currentPlayingEl.classList.remove('playing');
    currentPlayingEl = null;
  }
}

function speak(text, el) {
  stopSpeaking();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'de-DE';
  utter.rate = 0.92;

  // Try to pick a German voice
  const voices = window.speechSynthesis.getVoices();
  const deVoice = voices.find(v => v.lang.startsWith('de'));
  if (deVoice) utter.voice = deVoice;

  currentUtterance = utter;
  currentPlayingEl = el;
  if (el) el.classList.add('playing');

  utter.onend = () => {
    if (el) el.classList.remove('playing');
    if (currentPlayingEl === el) currentPlayingEl = null;
  };
  utter.onerror = () => {
    if (el) el.classList.remove('playing');
  };
  window.speechSynthesis.speak(utter);
}

// Speak 4 verb forms in sequence
function speakForms(inf, prae, praet, perf, cardFormEl) {
  stopSpeaking();
  cardFormEl.classList.add('playing');

  const parts = [inf, prae, praet, perf];
  let idx = 0;

  function speakNext() {
    if (idx >= parts.length) {
      cardFormEl.classList.remove('playing');
      return;
    }
    const utter = new SpeechSynthesisUtterance(parts[idx]);
    utter.lang = 'de-DE';
    utter.rate = 0.88;
    const voices = window.speechSynthesis.getVoices();
    const deVoice = voices.find(v => v.lang.startsWith('de'));
    if (deVoice) utter.voice = deVoice;
    utter.onend = () => { idx++; speakNext(); };
    utter.onerror = () => { idx++; speakNext(); };
    window.speechSynthesis.speak(utter);
  }
  speakNext();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
const TENSE_LABELS = ['Präsens', 'Präteritum', 'Perfekt', 'Futur I'];
const TENSE_CLASSES = ['tag-prae', 'tag-praet', 'tag-perf', 'tag-fut'];

function buildCard(v) {
  const [inf, prae, praet, perf, zh, en,
         ex0de, ex0zh, ex1de, ex1zh, ex2de, ex2zh, ex3de, ex3zh] = v;

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.inf = inf.toLowerCase();
  card.dataset.zh = zh;
  card.dataset.en = en.toLowerCase();
  card.dataset.perf = perf.toLowerCase();

  // ── Forms header (click → speak 4 forms) ──
  const formsDiv = document.createElement('div');
  formsDiv.className = 'card-forms';
  formsDiv.title = 'Klicken zum Vorlesen aller vier Formen';
  formsDiv.innerHTML = `
    <div class="forms-left">
      <div class="infinitiv">${inf}</div>
      <div class="forms-row">
        <span class="form-item">${prae}</span>
        <span class="form-item" style="opacity:0.4">·</span>
        <span class="form-item">${praet}</span>
        <span class="form-item" style="opacity:0.4">·</span>
        <span class="form-item">${perf}</span>
      </div>
    </div>
    <div class="speak-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </div>`;
  formsDiv.addEventListener('click', () => speakForms(inf, prae, praet, perf, formsDiv));

  // ── Translation ──
  const transDiv = document.createElement('div');
  transDiv.className = 'card-trans';
  transDiv.innerHTML = `<span class="trans-zh">${zh}</span><span class="trans-en">${en}</span>`;

  // ── Examples ──
  const exDiv = document.createElement('div');
  exDiv.className = 'card-examples';

  const examples = [[ex0de, ex0zh], [ex1de, ex1zh], [ex2de, ex2zh], [ex3de, ex3zh]];
  examples.forEach(([de, zh2], i) => {
    const row = document.createElement('div');
    row.className = 'ex-row';

    const tag = document.createElement('span');
    tag.className = `tense-tag ${TENSE_CLASSES[i]}`;
    tag.textContent = TENSE_LABELS[i];

    const content = document.createElement('div');
    content.className = 'ex-content';

    const deEl = document.createElement('span');
    deEl.className = 'ex-de';
    deEl.textContent = de;
    deEl.title = 'Klicken zum Vorlesen';
    deEl.addEventListener('click', (e) => {
      e.stopPropagation();
      speak(de, deEl);
    });

    const zhEl = document.createElement('span');
    zhEl.className = 'ex-zh';
    zhEl.textContent = zh2;

    content.appendChild(deEl);
    content.appendChild(zhEl);
    row.appendChild(tag);
    row.appendChild(content);
    exDiv.appendChild(row);
  });

  card.appendChild(formsDiv);
  card.appendChild(transDiv);
  card.appendChild(exDiv);
  return card;
}

// ── FILTER & SEARCH ───────────────────────────────────────────────────────────
let currentFilter = 'all';
let currentSearch = '';

function filterVerbs() {
  const q = currentSearch.trim().toLowerCase();
  return VERBS.filter(v => {
    const [inf,,,,zh, en,,,,,,,,] = v;
    const perf = v[3].toLowerCase();

    // Filter
    if (currentFilter === 'hat' && !perf.startsWith('hat')) return false;
    if (currentFilter === 'ist' && !perf.startsWith('ist')) return false;

    // Search
    if (!q) return true;
    return inf.toLowerCase().includes(q)
      || zh.includes(q)
      || en.toLowerCase().includes(q)
      || v[1].toLowerCase().includes(q)
      || v[2].toLowerCase().includes(q)
      || perf.includes(q);
  });
}

function render() {
  const grid = document.getElementById('verbGrid');
  const filtered = filterVerbs();

  grid.innerHTML = '';
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">找不到符合的動詞 · Kein Verb gefunden</div>';
  } else {
    filtered.forEach(v => grid.appendChild(buildCard(v)));
  }

  const rc = document.getElementById('resultCount');
  if (filtered.length < VERBS.length) {
    rc.textContent = `${filtered.length} / ${VERBS.length} Verben`;
  } else {
    rc.textContent = '';
  }
}

// ── EVENT LISTENERS ───────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

// Load voices async
if (window.speechSynthesis.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = () => {};
}

// Initial render
render();
</script>
