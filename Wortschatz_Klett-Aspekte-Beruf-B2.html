<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }
.page { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #999; margin-bottom: 20px; line-height: 1.7; }
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
  background: #fff; border: 0.5px solid #ddd; border-radius: 10px;
  padding: 10px 14px;
}
.toolbar-left { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 14px; border-radius: 6px;
  border: 0.5px solid #ccc; background: #fff;
  color: #333; font-size: 13px; cursor: pointer;
}
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.stats { font-size: 12px; color: #888; margin-left: 4px; }
.export-btn {
  padding: 5px 16px; border-radius: 6px;
  border: 0.5px solid #ccc; background: #fff;
  color: #333; font-size: 13px; cursor: pointer;
}
.export-btn:disabled { opacity: 0.35; cursor: default; }
.clear-btn {
  padding: 5px 12px; border-radius: 6px;
  border: 0.5px solid #f0c0c0; background: #fff;
  color: #c0392b; font-size: 12px; cursor: pointer;
}

/* speaking indicator */
.speaking-badge {
  display: none; align-items: center; gap: 5px;
  font-size: 11px; color: #666; padding: 3px 10px;
  border: 0.5px solid #ddd; border-radius: 20px; background: #fafaf8;
}
.speaking-badge.active { display: flex; }
.speaking-dot { width: 7px; height: 7px; border-radius: 50%; background: #4a9eff; animation: pulse 0.9s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.section-block { margin-bottom: 20px; }
.section-header {
  font-size: 11px; font-weight: 600; color: #555;
  padding: 8px 10px 6px; letter-spacing: 0.06em; text-transform: uppercase;
  background: #efefed; border-radius: 6px 6px 0 0;
  border: 0.5px solid #ddd; border-bottom: none;
}
table { width: 100%; border-collapse: collapse; background: #fff; border: 0.5px solid #ddd; border-radius: 0 0 8px 8px; overflow: hidden; table-layout: fixed; }
th {
  text-align: left; padding: 7px 10px;
  background: #fafaf8; color: #777; font-weight: 500; font-size: 11px;
  border-bottom: 0.5px solid #e0e0e0; letter-spacing: 0.03em;
}
td { padding: 7px 10px; border-bottom: 0.5px solid #efefed; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr.unfamiliar td { background: #fff6f6; }

/* dot column — click toggles */
.dot-cell { width: 28px; cursor: pointer; user-select: none; }
.dot-cell:hover .dot { border-color: #e24b4a; }
.dot {
  display: block; width: 10px; height: 10px; border-radius: 50%;
  border: 1.5px solid #ccc; margin-top: 3px; transition: all 0.15s;
}
tr.unfamiliar .dot { background: #e24b4a; border-color: #e24b4a; }

/* clickable text cells */
.speak-cell { cursor: pointer; }
.speak-cell:hover td { background: #f0f6ff; }
tr.unfamiliar .speak-cell:hover td { background: #ffe0e0; }

.col-dot  { width: 28px; }
.col-de   { width: 14%; }
.col-enzh { width: 17%; }
.col-koll { width: 27%; }
.col-satz { width: 42%; }

/* DE column typography */
.artikel  { font-size: 11px; color: #aaa; font-style: italic; display: block; line-height: 1.4; }
.word-de  { font-weight: 700; font-size: 13px; color: #1a5fc8; display: block; }
.plural   { font-size: 11px; color: #bbb; display: block; line-height: 1.4; }

/* EN/ZH column */
.word-en  { font-size: 12px; color: #222; line-height: 1.6; display: block; }
.word-zh  { font-size: 11px; color: #999; font-style: italic; display: block; }

/* Kollokation column */
.koll-de  { font-size: 12px; color: #222; line-height: 1.6; display: block; }
.koll-verb { color: #1a5fc8; font-weight: 700; }
.koll-zh  { font-size: 11px; color: #999; font-style: italic; display: block; }

/* Satz column */
.satz-de  { font-size: 12px; color: #222; line-height: 1.6; display: block; }
.satz-zh  { font-size: 11px; color: #999; font-style: italic; display: block; }

/* Irregular verb conjugation */
.irr-conj {
  font-size: 11px; color: #7BA7D8; display: block; line-height: 1.6;
  cursor: pointer; border-radius: 3px; padding: 0 2px;
  transition: background 0.1s;
}
.irr-conj:hover { background: #e8f0fe; }




/* Checkpoint bar */
.checkpoint-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 20px; background: #f0f4ff;
  border-bottom: 1px solid #d0d8f0; font-size: 12px; color: #555;
}
.checkpoint-bar span { color: #888; margin-right: 4px; }
.cp-btn {
  padding: 4px 12px; border-radius: 5px; border: 1px solid #b0c0e8;
  background: #fff; color: #1a3a6b; font-size: 12px;
  cursor: pointer; font-weight: 500; transition: background 0.15s;
}
.cp-btn:hover { background: #e8f0fe; }
.cp-btn.primary { background: #1a3a6b; color: #fff; border-color: #1a3a6b; }
.cp-btn.primary:hover { background: #2a5a9b; }
.cp-status { font-size: 11px; color: #5a8a5a; margin-left: 4px; }
#cpFileInput { display: none; }

mark { background:#fff3b0; border-radius:2px; padding:0 1px; }
/* Short text (Kurztext) */
.kurztext { margin: 10px 0 20px; background: #fff; border-left: 3px solid #1a5fc8; border-radius: 0 8px 8px 0; box-shadow: 0 1px 4px rgba(0,0,0,.04); overflow: hidden; }
.kurztext-header { font-size: 11px; font-weight: 600; color: #1a5fc8; padding: 7px 12px 5px; background: #f5f8ff; border-bottom: 0.5px solid #dde6f8; letter-spacing: 0.04em; }
.kurztext-body { padding: 8px 12px 10px; }
.kurztext-sent { display: flex; flex-direction: column; padding: 4px 0; border-bottom: 0.5px solid #f0f0ee; }
.kurztext-sent:last-child { border-bottom: none; }
.sent-de { font-size: 12.5px; color: #222; line-height: 1.55; cursor: pointer; border-radius: 4px; padding: 2px 4px; transition: background 0.12s; display: block; }
.sent-de:hover { background: #e8f0fe; }
.sent-zh { font-size: 11px; color: #999; font-style: italic; padding: 1px 4px 2px; display: block; }

.empty { text-align: center; padding: 40px; color: #aaa; font-size: 13px; background: #fff; border: 0.5px solid #ddd; border-radius: 8px; }

/* Export panel */
.export-panel {
  display: none; margin-top: 24px;
  background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 20px;
}
.export-panel.visible { display: block; }
.export-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.export-top h2 { font-size: 15px; font-weight: 500; }
.export-actions { display: flex; gap: 8px; align-items: center; }
.print-btn { padding: 5px 14px; border-radius: 6px; border: 0.5px solid #ccc; background: #1a1a1a; color: #fff; font-size: 12px; cursor: pointer; }
.close-export { padding: 5px 12px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #555; font-size: 12px; cursor: pointer; }
.export-count { font-size: 12px; color: #888; background: #f5f5f3; padding: 3px 10px; border-radius: 20px; }

@media print {
  @page { size: A4 portrait; margin: 12mm 10mm; }

  /* Hide entire body first, then show only what we need */
  body * { visibility: hidden; }

  #exportPanel,
  #exportPanel * { visibility: visible; }

  #exportPanel {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: auto !important;
    min-height: 0 !important;
    border: none !important;
    padding: 0 !important;
    margin: 0 !important;
    overflow: visible !important;
  }

  html, body {
    height: auto !important;
    min-height: 0 !important;
    overflow: hidden !important;
  }

  .export-top { display: none !important; }

  /* Table layout */
  table {
    width: 100% !important;
    table-layout: fixed !important;
    font-size: 9pt !important;
    border-collapse: collapse !important;
  }
  tr { page-break-inside: avoid; }
  td, th { padding: 4px 6px !important; border: 0.5px solid #ddd !important; }

  /* No dot column in export panel — nothing to hide */

  /* ── Text styles — explicit on every element ── */
  .artikel   { display: block; font-size: 8pt; color: #999; font-style: italic; font-weight: normal; }
  .word-de   { display: block; font-size: 10pt; font-weight: bold; color: #1a5fc8;
               -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .plural    { display: block; font-size: 8pt; color: #bbb; font-weight: normal; }
  .word-en   { display: block; font-size: 8pt; color: #222; font-weight: normal; }
  .word-zh   { display: block; font-size: 7pt; color: #888; font-style: italic; font-weight: normal; }
  .koll-de   { display: block; font-size: 8pt; color: #222; font-weight: normal; }
  .koll-verb { color: #1a5fc8; font-weight: bold;
               -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .koll-zh   { display: block; font-size: 7pt; color: #888; font-style: italic; font-weight: normal; }
  .satz-de   { display: block; font-size: 8pt; color: #222; font-weight: normal; }
  .satz-zh   { display: block; font-size: 7pt; color: #888; font-style: italic; font-weight: normal; }

  /* Row backgrounds — white by default, very light pink for unfamiliar */
  td { background: #ffffff !important; }
  tr.unfamiliar td {
    background: #fff0f0 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  th {
    background: #f0f0f0 !important;
    font-size: 8pt; font-weight: 600; color: #555;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .section-header {
    font-size: 8pt; font-weight: 600;
    background: #e8e8e6 !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* Column widths */
  .col-de   { width: 14%; }
  .col-enzh { width: 17%; }
  .col-koll { width: 27%; }
  .col-satz { width: 42%; }
}

body { padding-top: 0; }

.tab-scroll { display: flex; gap: 4px; flex-wrap: wrap; }

// ── Active chapter ────────────────────────────────────────────
let currentChapter = 1;
try {
  const saved = localStorage.getItem('b2_activeChapter');
  if (saved) {
    const parsed = JSON.parse(saved);
    if (typeof parsed === 'object' && parsed.book) {
      currentBook = parsed.book;
      currentChapter = parsed.k;
    } else if (CHAPTERS[parseInt(saved)]) {
      currentChapter = parseInt(saved);
    }
  }
} catch(e) {}

function getChapterData() { return CHAPTERS[currentChapter]; }
function getVOCAB()  { return getChapterData().vocab; }
function getKEY()    { return getChapterData().key; }
function getTEXTS()  { return getChapterData().texts; }

// ── Per-chapter unfamiliar sets ───────────────────────────────
const unfamiliarCache = {};
function getUnfamiliar() {
  if (!unfamiliarCache[currentChapter]) {
    unfamiliarCache[currentChapter] = new Set();
    try {
      const s = localStorage.getItem(getKEY());
      if (s) unfamiliarCache[currentChapter] = new Set(JSON.parse(s));
    } catch(e) {}
  }
  return unfamiliarCache[currentChapter];
}
function save() {
  try { localStorage.setItem(getKEY(), JSON.stringify([...getUnfamiliar()])); } catch(e) {}
}

function renderB1Chapter(k) {
  const data = B1_CHAPTERS[k];
  if (!data) return;
  const unfam = getB1Unfamiliar(k);
  const VOCAB = data.vocab;
  const filtered = VOCAB.map((v,i)=>[v,i]).filter(([v,i])=>{
    if (currentFilter==='unfamiliar') return unfam.has(i);
    if (currentFilter==='familiar') return !unfam.has(i);
    return true;
  });
  document.getElementById('stats').textContent = `不熟悉 ${unfam.size} / ${VOCAB.length} 個`;
  document.getElementById('exportBtn').disabled = unfam.size===0;
  if (!filtered.length) {
    document.getElementById('mainContent').innerHTML = '<div class="empty">沒有符合的單字</div>';
    return;
  }
  const sections = {};
  filtered.forEach(([v,i]) => { if(!sections[v.s]) sections[v.s]=[]; sections[v.s].push([v,i]); });
  let html2 = '';
  for (const [sec, words] of Object.entries(sections)) {
    const rows = words.map(([v,i]) => buildB1Row(v,i,k,unfam)).join('');
    html2 += `<div class="section-block">
      <div class="section-header">${sec}</div>
      <table><thead><tr>
        <th class="col-dot"></th>
        <th class="col-de">德文</th>
        <th class="col-enzh">英文 / 中文</th>
        <th class="col-koll">固定搭配</th>
        <th class="col-satz">例句</th>
      </tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
    ${buildB1Kurztext(sec, k)}`;
  }
  document.getElementById('mainContent').innerHTML = html2;
}

function buildB1Row(v, i, k, unfam) {
  const uf = unfam.has(i);
  const deT = ((v.a?v.a+' ':'')+v.w).replace(/'/g,'&#39;');
  const enT = (v.en.split('/')[0]||'').trim().replace(/'/g,'&#39;');
  const kT  = (v.k||'').replace(/'/g,'&#39;');
  const exT = (v.ex||'').replace(/'/g,'&#39;');
  const enParts = v.en.split('/').map(s=>s.trim()).join('<br>');
  const zhParts = v.zh.split('/').map(s=>s.trim()).join('<br>');
  const kParts  = highlightVerbs(v.k||'');
  return `<tr class="${uf?'unfamiliar':''}">
    <td class="dot-cell" onclick="event.stopPropagation();toggleMarkB1(${k},${i})"><span class="dot"></span></td>
    <td onclick="speakText('${deT}','de-DE')" style="cursor:pointer">
      ${v.a?`<span class="artikel">${v.a}</span>`:''}
      <span class="word-de">${v.w}</span>
      ${v.p?`<span class="plural">${v.p}</span>`:''}
      ${v.c1?`<span class="irr-conj" onclick="speakConj('${v.c1}',event)">${v.c1}</span>`:''}
      ${v.c2?`<span class="irr-conj" onclick="speakConj('${v.c2}',event)">${v.c2}</span>`:''}

    </td>

      <span class="word-en">${enParts}</span>

}

function toggleMarkB1(k, i) {
  const key = 'b1k'+k;
  if (!unfamiliarCache[key]) {
    unfamiliarCache[key]=new Set();
    try{const s=localStorage.getItem(B1_CHAPTERS[k].key);if(s)unfamiliarCache[key]=new Set(JSON.parse(s));}catch(e){}
  }
  const set=unfamiliarCache[key];
  if(set.has(i)) set.delete(i); else set.add(i);
  try{localStorage.setItem(B1_CHAPTERS[k].key,JSON.stringify([...set]));}catch(e){}
  renderB1Chapter(k);
  renderTabs();
}

function buildB1Kurztext(secName, k) {
  const data = B1_CHAPTERS[k];
  if (!data || !data.vocab) return '';
  // Group sentences by section from vocab examples
  const sectionVocab = data.vocab.filter(v => v.s === secName);
  if (!sectionVocab.length) return '';
  // Build short text from first few examples in the section
  const sentences = sectionVocab.slice(0,6).map(v => ({de:v.ex, zh:v.ez}));
  const rows = sentences.map(p => {
    const de = (p.de||'').replace(/'/g,"\'");
    return `<div class="kurztext-sent">
      <span class="sent-de" onclick="speakText('${de}','de-DE')" title="點擊朗讀">${p.de||''}</span>
      <span class="sent-zh">${p.zh||''}</span>
    </div>`;
  }).join('');
  return `<div class="kurztext">
    <div class="kurztext-header">📝 練習例句 — 點擊句子可朗讀</div>
    <div class="kurztext-body">${rows}</div>
  </div>`;
}

function switchChapter(k) {

const VERBS = /\b(leiten|informieren|arbeiten|übernehmen|wenden|konsultieren|sein|kontaktieren|verbessern|koordinieren|prüfen|festlegen|erledigen|klären|finden|schicken|melden|angeben|mitteilen|vorlegen|beantragen|erfassen|benutzen|vergessen|einhalten|abgeben|einreichen|anpassen|einrichten|regeln|tun|reagieren|antworten|befinden|erfolgen|desinfizieren|üben|machen|halten|suchen|unternehmen|vermeiden|nutzen|setzen|geben|abstimmen|zukommen|lassen|teilnehmen|erstellen|bringen|berücksichtigen|reagieren|danken|benennen|hinterlegen)\b/g;

function highlightVerbs(text) {
  return text.replace(VERBS, m => `<span class="koll-verb">${m}</span>`);
}

let synth = window.speechSynthesis;
let deVoice = null, enVoice = null;

function loadVoices() {
  const voices = synth.getVoices();
  deVoice = voices.find(v => v.lang.startsWith('de')) || null;
  enVoice = voices.find(v => v.lang.startsWith('en')) || null;
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

function speakText(text, lang) {
  synth.cancel();
  const badge = document.getElementById('speakingBadge');
  badge.classList.add('active');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.voice = lang.startsWith('de') ? deVoice : enVoice;
  u.rate = 0.9;
  u.onend = u.onerror = () => badge.classList.remove('active');
  synth.speak(u);
}

function speakWord(i)  { const VOCAB=getVOCAB(); const v=VOCAB[i]; speakText(v.w.replace(/ zu \+ D\.| mit \+ D\.| \+ [AD]\.| über \+ A\./g,'').trim(), 'de-DE'); }
function speakConj(text, event) { event.stopPropagation(); speakText(text, 'de-DE'); }
function speakKoll(i)  { const VOCAB=getVOCAB(); const v=VOCAB[i]; speakText(v.k.replace(/\//g,' oder '), 'de-DE'); }
function speakSatz(i)  { const VOCAB=getVOCAB(); const v=VOCAB[i]; speakText(v.ex, 'de-DE'); }
function speakEn(i)   { const VOCAB=getVOCAB(); const v=VOCAB[i]; speakText(v.en.split('/')[0].trim(), 'en-US'); }

// ── Build row HTML ─────────────────────────────────────────
function buildRow(v, i, compact) {
  const uf = getUnfamiliar().has(i);
  const enParts = v.en.split('/').map(s => s.trim()).join('<br>');
  const zhParts = v.zh.split('/').map(s => s.trim()).join('<br>');
  const kParts = highlightVerbs(v.k.split('/').map(s => s.trim()).join('<br>'));

  const dotTd = compact ? '' :
    `<td class="dot-cell" onclick="event.stopPropagation();toggleMark(${i})">
       <span class="dot"></span>
     </td>`;

  const uf2 = uf;
  const sc = compact ? '' : 'speak-cell';
  const de_click  = compact ? '' : `onclick="speakWord(${i})"`;
  const koll_click = compact ? '' : `onclick="speakKoll(${i})"`;
  const satz_click = compact ? '' : `onclick="speakSatz(${i})"`;

  return `<tr class="${uf2 ? 'unfamiliar' : ''}">
    ${dotTd}
    <td class="${sc}">
      ${v.a ? `<span class="artikel">${v.a}</span>` : ''}
      <span class="word-de" ${compact ? '' : `onclick="speakWord(${i})"`} style="cursor:pointer">${v.w}</span>
      ${v.p ? `<span class="plural">${v.p}</span>` : ''}
      ${v.c1 && !compact ? `<span class="irr-conj" onclick="speakConj('${v.c1}',event)" title="點擊朗讀">${v.c1}</span>` : (v.c1 ? `<span class="irr-conj">${v.c1}</span>` : '')}
      ${v.c2 && !compact ? `<span class="irr-conj" onclick="speakConj('${v.c2}',event)" title="點擊朗讀">${v.c2}</span>` : (v.c2 ? `<span class="irr-conj">${v.c2}</span>` : '')}
      ${v.c3 && !compact ? `<span class="irr-conj" onclick="speakConj('${v.c3}',event)" title="點擊朗讀">${v.c3}</span>` : (v.c3 ? `<span class="irr-conj">${v.c3}</span>` : '')}
    </td>
    <td ${compact ? '' : `onclick="speakEn(${i})"`} class="${sc}">
      <span class="word-en">${enParts}</span>
      <span class="word-zh">${zhParts}</span>
    </td>
    <td ${koll_click} class="${sc}">
      <span class="koll-de">${kParts}</span>
      <span class="koll-zh">${v.kz}</span>
    </td>
    <td ${satz_click} class="${sc}">
      <span class="satz-de">${v.ex}</span>
      <span class="satz-zh">${v.ez}</span>
    </td>
  </tr>`;
}

function buildTable(items, compact) {
  const dotTh = compact ? '' : '<th class="col-dot"></th>';
  return `<table>
    <thead><tr>${dotTh}
      <th class="col-de">德文</th>
      <th class="col-enzh">英文 / 中文</th>
      <th class="col-koll">固定搭配</th>
      <th class="col-satz">例句</th>
    </tr></thead>
    <tbody>${items.map(([v,i]) => buildRow(v,i,compact)).join('')}</tbody>
  </table>`;
}

function groupBySection(items) {
  const out = {};
  items.forEach(([v,i]) => { if (!out[v.s]) out[v.s]=[]; out[v.s].push([v,i]); });
  return out;
}

// ── Render main ───────────────────────────────────────────

// ── Short texts (Kurztext) per section ──────────────────
function buildKurztext(sectionName) {
  const sentences = getTEXTS()[sectionName];
  if (!sentences) return '';
  const rows = sentences.map((pair, si) => {
    const de = pair[0].replace(/'/g, "\'");
    return `<div class="kurztext-sent">
      <span class="sent-de" onclick="speakText('${de}','de-DE')" title="點擊朗讀">${pair[0]}</span>
      <span class="sent-zh">${pair[1]}</span>
    </div>`;
  }).join('');
  return `<div class="kurztext">
    <div class="kurztext-header">📝 短文練習 — 點擊句子可朗讀</div>
    <div class="kurztext-body">${rows}</div>
  </div>`;
}

function render() {
  const VOCAB = getVOCAB();
  const indexed = VOCAB.map((v,i) => [v,i]);
  const filtered = indexed.filter(([v,i]) => {
    if (currentFilter === 'unfamiliar') return getUnfamiliar().has(i);
    if (currentFilter === 'familiar') return !getUnfamiliar().has(i);
    return true;
  });

  document.getElementById('stats').textContent = `不熟悉 ${getUnfamiliar().size} / ${getVOCAB().length} 個`;
  document.getElementById('exportBtn').disabled = getUnfamiliar().size === 0;

  if (!filtered.length) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">沒有符合的單字</div>`;
    return;
  }

  const sections = groupBySection(filtered);
  let html = '';
  for (const [sec, words] of Object.entries(sections)) {
    html += `<div class="section-block">
      <div class="section-header">${sec}</div>
      ${buildTable(words, false)}
    </div>`;
    // Only show Kurztext when showing all words (not filtered)
    if (currentFilter === 'all') {
      html += buildKurztext(sec);
    }
  }
  document.getElementById('mainContent').innerHTML = html;
}

}

  const VOCAB = getVOCAB();

}

function buildSearchText(v) {
  return [v.a||'',v.w||'',v.p||'',v.c1||'',v.c2||'',v.c3||'',
          v.en||'',v.zh||'',v.k||'',v.kz||'',v.ex||'',v.ez||'',v.s||''].join(' ').toLowerCase();
}

function hl(text, q) {
  if (!q || !text) return text || '';
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return String(text).replace(new RegExp('('+esc+')', 'gi'), '<mark>$1</mark>');
}

function runSearch(q) {
  searchQuery = q.trim();
  const el = document.getElementById('searchResults');
  if (!el) return;
  if (!searchQuery) { el.innerHTML = ''; return; }
  const low = searchQuery.toLowerCase();
  const byChapter = {};
  for (let k=1; k<=10; k++) {
    CHAPTERS[k].vocab.forEach((v,i) => {
      if (buildSearchText(v).includes(low)) {
        if (!byChapter['b2-'+k]) byChapter['b2-'+k]=[];
        byChapter['b2-'+k].push({v,i,book:'b2',k});
      }
    });
  }
  for (let k=1; k<=4; k++) {
    B1_CHAPTERS[k].vocab.forEach((v,i) => {
      if (buildSearchText(v).includes(low)) {
        if (!byChapter['b1-'+k]) byChapter['b1-'+k]=[];
        byChapter['b1-'+k].push({v,i,book:'b1',k});
      }
    });
  }
  const total = Object.values(byChapter).reduce((s,a)=>s+a.length,0);
  if (!total) { el.innerHTML=`<div class="empty">找不到「${searchQuery}」的相關單字</div>`; return; }
  const TITLES={1:'Im Beruf ankommen',2:'Mein Weg in den Beruf',3:'Neu in der Firma',
    4:'Meetings & Kommunikation',5:'Kennen Sie schon …?',6:'Kommunikation ist alles',
    7:'Was kann ich für Sie tun?',8:'Arbeitssicherheit',9:'Karriere & Gespräche',10:'Arbeit im Wandel'};
  let out=`<p style="color:#888;font-size:12px;margin:0 0 12px;padding:0 4px;">共找到 <strong>${total}</strong> 筆結果</p>`;
  Object.keys(byChapter).sort((a,b)=>+a-+b).forEach(k => {
    const items=byChapter[k];
    const rows=items.map(({v,i})=>{
      const uf=(unfamiliarCache[k]||new Set()).has(i);
      const deT=((v.a?v.a+' ':'')+v.w).replace(/'/g,'&#39;');
      const enT=(v.en.split('/')[0]||'').trim().replace(/'/g,'&#39;');
      const kT=(v.k||'').replace(/'/g,'&#39;');
      const exT=(v.ex||'').replace(/'/g,'&#39;');
      return `<tr class="${uf?'unfamiliar':''}">
        <td class="dot-cell" onclick="event.stopPropagation();srToggleMark('${book}',${kNum},${i})"><span class="dot"></span></td>
        <td onclick="speakText('${deT}','de-DE')" style="cursor:pointer">
          ${v.a?`<span class="artikel">${v.a}</span>`:''}
          <span class="word-de">${hl(v.w,searchQuery)}</span>
          ${v.p?`<span class="plural">${v.p}</span>`:''}
          ${v.c1?`<span class="irr-conj" onclick="speakConj('${v.c1}',event)">${hl(v.c1,searchQuery)}</span>`:''}
          ${v.c2?`<span class="irr-conj" onclick="speakConj('${v.c2}',event)">${hl(v.c2,searchQuery)}</span>`:''}
          ${v.c3?`<span class="irr-conj" onclick="speakConj('${v.c3}',event)">${hl(v.c3,searchQuery)}</span>`:''}
        </td>
        <td onclick="speakText('${enT}','en-US')" style="cursor:pointer">
          <span class="word-en">${hl(v.en,searchQuery)}</span>
          <span class="word-zh">${hl(v.zh,searchQuery)}</span>
        </td>
        <td onclick="speakText('${kT}','de-DE')" style="cursor:pointer">
          <span class="koll-de">${highlightVerbs(hl(v.k||'',searchQuery))}</span>
          <span class="koll-zh">${hl(v.kz||'',searchQuery)}</span>
        </td>
        <td onclick="speakText('${exT}','de-DE')" style="cursor:pointer">
          <span class="satz-de">${hl(v.ex||'',searchQuery)}</span>
          <span class="satz-zh">${hl(v.ez||'',searchQuery)}</span>
        </td>
      </tr>`;
    }).join('');
    const bookLabel = k.startsWith('b1') ? 'B1/B2' : 'B2';
    const kNum2 = parseInt(k.split('-')[1]);
    const secTitle = k.startsWith('b1') 
      ? {1:'Das bin ich',2:'Im Unternehmen',3:'Teamarbeit',4:'Kaufen und Verkaufen'}[kNum2]
      : TITLES[kNum2];
    out+=`<div class="section-block" style="margin-bottom:20px;">
      <div class="section-header"><span style="opacity:.6;font-size:10px;margin-right:6px;">${bookLabel}</span>Kapitel ${kNum2} – ${secTitle||''}
        <span style="font-weight:400;margin-left:6px;opacity:.7;">(${items.length} 筆)</span>
      </div>
      <table><thead><tr>
        <th class="col-dot"></th><th class="col-de">德文</th>
        <th class="col-enzh">英文 / 中文</th><th class="col-koll">固定搭配</th>
        <th class="col-satz">例句</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  });
  el.innerHTML=out;
}

function srToggleMark(bookKey,k,i) {
  if (bookKey==='b1') { toggleMarkB1(k,i); runSearch(searchQuery); return; }
  if (!unfamiliarCache[k]) {
    unfamiliarCache[k]=new Set();
    try{const s=localStorage.getItem(CHAPTERS[k].key);if(s)unfamiliarCache[k]=new Set(JSON.parse(s));}catch(e){}
  }
  const set=unfamiliarCache[k];
  if(set.has(i)) set.delete(i); else set.add(i);
  try{localStorage.setItem(CHAPTERS[k].key,JSON.stringify([...set]));}catch(e){}
  runSearch(searchQuery);
  renderTabs();
}

// ── Checkpoint: export / import / auto-load ───────────────────
function exportCheckpoint() {
  const data = {};
  for (let k = 1; k <= 10; k++) {
    const key = CHAPTERS[k].key;
    try { const s=localStorage.getItem(key); data[key]=s?JSON.parse(s):[]; } catch(e){data[key]=[];}
  }
  for (let k = 1; k <= 4; k++) {
    const key = B1_CHAPTERS[k].key;
    try { const s=localStorage.getItem(key); data[key]=s?JSON.parse(s):[]; } catch(e){data[key]=[];}
  }
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Wortschatz_Klett-Aspekte-Beruf-B2_checkpoint.json';
  a.click();
  URL.revokeObjectURL(a.href);
  setCpStatus('✓ 已匯出 Wortschatz_Klett-Aspekte-Beruf-B2_checkpoint.json');
}

function importCheckpoint(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      let count = 0;
      for (const [key, indices] of Object.entries(data)) {
        if (Array.isArray(indices)) {
          localStorage.setItem(key, JSON.stringify(indices));
          // Invalidate cache so it reloads
          for (let k = 1; k <= 10; k++) {
            if (CHAPTERS[k].key === key) {
              delete unfamiliarCache[k];
            }
          }
          count += indices.length;
        }
      }
      setCpStatus(`✓ 已匯入，共 ${count} 個標記`);
      // Refresh current view
      if (currentChapter === 'search') {
        renderTabs();
      } else {
        switchChapter(currentChapter);
      }
    } catch(err) {
      setCpStatus('✗ 檔案格式錯誤');
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // reset so same file can be re-imported
}

function setCpStatus(msg) {
  const el = document.getElementById('cpStatus');
  if (!el) return;
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 4000);
}

// Auto-load Wortschatz_Klett-Aspekte-Beruf-B2_checkpoint.json if served from a web server (GitHub Pages etc.)
async function tryAutoLoadCheckpoint() {
  // Only attempt on http/https, not file://
  if (!location.protocol.startsWith('http')) return;
  try {
    const res = await fetch('./Wortschatz_Klett-Aspekte-Beruf-B2_checkpoint.json', {cache: 'no-cache'});
    if (!res.ok) return;
    const data = await res.json();
    let count = 0;
    for (const [key, indices] of Object.entries(data)) {
      if (Array.isArray(indices)) {
        // Only load if localStorage doesn't already have data for this key
        if (!localStorage.getItem(key)) {
          localStorage.setItem(key, JSON.stringify(indices));
          for (let k = 1; k <= 10; k++) {
            if (CHAPTERS[k].key === key) delete unfamiliarCache[k];
          }
          count += indices.length;
        }
      }
    }
    if (count > 0) setCpStatus(`✓ 已自動載入 ${count} 個標記`);
  } catch(e) {
    // No Wortschatz_Klett-Aspekte-Beruf-B2_checkpoint.json found — silent fail
  }
}


tryAutoLoadCheckpoint();
if (currentChapter === 'search') {
  switchToSearch();
} else if (currentBook === 'b1') {
  switchChapterB1(typeof currentChapter === 'number' ? currentChapter : 1);
} else {
  switchChapter(typeof currentChapter === 'number' ? currentChapter : 1);
}
