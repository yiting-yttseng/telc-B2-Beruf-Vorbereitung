<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2 Forumbeitrag</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }
.page { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

/* ── Top nav (B2 tracker identical) ── */
.chapter-nav { background: #1a3a6b; padding: 10px 16px 0; }
.tab-scroll { display: flex; gap: 4px; flex-wrap: wrap; }
.chapter-tab {
  padding: 7px 18px; border-radius: 6px 6px 0 0; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; color: #a8c8f0;
  background: rgba(255,255,255,0.10); transition: all 0.15s;
  white-space: nowrap;
}
.chapter-tab:hover { background: rgba(255,255,255,0.20); color: #fff; }
.chapter-tab.active { background: #f5f5f3; color: #1a3a6b; }
.chapter-info { background: #1a3a6b; padding: 8px 20px 12px; border-bottom: 2px solid #2a5a9b; }
#pageTitle { color: #fff; font-size: 17px; font-weight: 600; margin: 0 0 2px; }
.page-subtitle { color: #a8c8f0; font-size: 11px; margin: 0; }

/* ── Checkpoint bar ── */
.checkpoint-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 20px; background: #f0f4ff; border-bottom: 1px solid #d0d8f0;
  font-size: 12px; color: #555;
}
.cp-label { color: #888; margin-right: 4px; }
.cp-btn {
  padding: 4px 12px; border-radius: 5px; border: 1px solid #b0c0e8;
  background: #fff; color: #1a3a6b; font-size: 12px;
  cursor: pointer; font-weight: 500; transition: background 0.15s;
}
.cp-btn:hover { background: #e8f0fe; }
.cp-btn.primary { background: #1a3a6b; color: #fff; border-color: #1a3a6b; }
.cp-btn.primary:hover { background: #2a5a9b; }
.cp-status { font-size: 11px; color: #5a8a5a; margin-left: 4px; }
#cpFileInput { display: none; }

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
  background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 10px 14px;
}
.toolbar-left { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-btn { padding: 5px 14px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #333; font-size: 13px; cursor: pointer; }
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.stats { font-size: 12px; color: #888; margin-left: 4px; }
.speaking-badge { display: none; align-items: center; gap: 5px; font-size: 11px; color: #666; padding: 3px 10px; border: 0.5px solid #ddd; border-radius: 20px; background: #fafaf8; }
.speaking-badge.active { display: flex; }
.speaking-dot { width: 7px; height: 7px; border-radius: 50%; background: #4a9eff; animation: pulse 0.9s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Section header ── */
.section-block { margin-bottom: 20px; }
.section-header { font-size: 11px; font-weight: 600; color: #555; padding: 8px 10px 6px; letter-spacing: 0.06em; text-transform: uppercase; background: #efefed; border-radius: 6px 6px 0 0; border: 0.5px solid #ddd; border-bottom: none; }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; background: #fff; border: 0.5px solid #ddd; border-radius: 0 0 8px 8px; overflow: hidden; table-layout: fixed; }
th { text-align: left; padding: 7px 10px; background: #fafaf8; color: #777; font-weight: 500; font-size: 11px; border-bottom: 0.5px solid #e0e0e0; letter-spacing: 0.03em; }
td { padding: 7px 10px; border-bottom: 0.5px solid #efefed; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr.fav td { background: #fff6f6; }

/* ── Fav dot ── */
.col-fav { width: 30px; }
td.mark-fav { width: 30px; text-align: center; cursor: pointer; user-select: none; vertical-align: middle; }
td.mark-fav:hover { background: #ffe0e0 !important; }
td.mark-fav:hover .mark-box { border-color: #e24b4a; }
.mark-box { display: block; width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #ccc; margin: 3px auto 0; transition: all 0.15s; }
tr.fav td.mark-fav .mark-box { background: #e24b4a; border-color: #e24b4a; }

/* ── Redemittel table cols ── */
.col-left { width: 30%; cursor: pointer; }
td.col-left:hover { background: #f0f6ff !important; }
tr.fav td.col-left:hover { background: #ffe0e0 !important; }
.r-de { font-weight: 700; font-size: 13px; color: #1a5fc8; display: block; line-height: 1.55; margin-bottom: 2px; }
.r-zh { font-size: 11px; color: #999; font-style: italic; display: block; }
.col-right { width: 70%; }
.ex-item { cursor: pointer; padding: 3px 6px; border-radius: 4px; margin-bottom: 4px; transition: background 0.1s; }
.ex-item:last-child { margin-bottom: 0; }
.ex-item:hover { background: #f0f6ff; }
tr.fav .ex-item:hover { background: #ffe0e0; }
.ex-de { font-size: 12px; color: #222; line-height: 1.6; display: block; }
.ex-zh { font-size: 11px; color: #999; font-style: italic; display: block; }

/* ── Aufbau table (3 cols) ── */
.col-aufbau-num  { width: 44px; text-align: center; font-size: 15px; font-weight: 700; color: #e24b4a; vertical-align: top; padding-top: 10px; }
.col-aufbau-step { width: 16%; font-size: 12px; font-weight: 600; color: #1a3a6b; vertical-align: top; }
.col-aufbau-de   { width: 46%; font-size: 12px; color: #222; vertical-align: top; }
.col-aufbau-zh   { width: 38%; font-size: 11px; color: #888; font-style: italic; vertical-align: top; }
.aufbau-step-zh  { font-size: 11px; color: #999; font-style: italic; display: block; margin-top: 2px; font-weight: 400; }
.hint-de { cursor: pointer; padding: 2px 4px; border-radius: 3px; margin-bottom: 3px; line-height: 1.6; display: block; transition: background 0.1s; }
.hint-de:hover { background: #f0f6ff; }
.hint-de:last-child { margin-bottom: 0; }
.hint-zh { padding: 2px 4px; margin-bottom: 3px; line-height: 1.6; display: block; }
.hint-zh:last-child { margin-bottom: 0; }
tr.aufbau-alt td { background: #f7f9fd; }

/* ── Analyse (example) table ── */
.col-label { width: 140px; }
.label-cell { background: #f5f8ff !important; text-align: center; vertical-align: middle; }
.label-num  { font-size: 20px; font-weight: 700; color: #e24b4a; display: block; }
.label-de   { font-size: 12px; font-weight: 700; color: #1a5fc8; display: block; margin-top: 2px; }
.label-zh   { font-size: 11px; color: #999; font-style: italic; display: block; }
.analysis-item { cursor: pointer; padding: 3px 6px; border-radius: 4px; margin-bottom: 4px; transition: background 0.1s; }
.analysis-item:last-child { margin-bottom: 0; }
.analysis-item:hover { background: #f0f6ff; }
.a-de { font-size: 12px; color: #222; line-height: 1.6; display: block; }
.a-zh { font-size: 11px; color: #999; font-style: italic; display: block; }

/* ── Example topic label ── */
.topic-banner {
  font-size: 12px; font-weight: 600; color: #1a3a6b;
  padding: 7px 12px; background: #e8f0fb;
  border: 0.5px solid #c0d0ec; border-radius: 6px;

<script>
// ── TTS ───────────────────────────────────────────────────────
function speak(text) {
  if (!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.92;
  const badge = document.getElementById('speakingBadge');
  if (badge) badge.classList.add('active');
  u.onend = u.onerror = () => { if (badge) badge.classList.remove('active'); };
  window.speechSynthesis.speak(u);
}
function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── TAB SWITCHING ─────────────────────────────────────────────
function switchTab(name, btn) {
  document.getElementById('tab-redemittel').style.display = name === 'redemittel' ? '' : 'none';
  document.getElementById('tab-aufbau').style.display    = name === 'aufbau'     ? '' : 'none';
  document.querySelectorAll('.chapter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const titles = { redemittel: 'B2 Forumbeitrag — Redemittel 句型庫', aufbau: 'B2 Forumbeitrag — Aufbau ＋ 範例' };
  // title is fixed in header
}

// ── STATE ─────────────────────────────────────────────────────
const state = { fav: new Set(), filter: 'all' };

// ── JSON Export / Import ──────────────────────────────────────
function exportJSON() {
  const payload = { file: 'SchreibenII_Forumsbeitrag_Redemittel_checkpoint.json', version: 1, exported: new Date().toISOString(), fav: [...state.fav] };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'SchreibenII_Forumsbeitrag_Redemittel_checkpoint.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.fav || !Array.isArray(data.fav)) throw new Error('格式錯誤');
      state.fav = new Set(data.fav.map(Number));
      saveState(); render();
      const el = document.getElementById('cpStatus');
      el.textContent = '✓ 匯入成功';
      setTimeout(() => { el.textContent = ''; }, 2500);
    } catch(err) { alert('匯入失敗：檔案格式不正確'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}
function loadState() {
  try { const f = localStorage.getItem('forum_fav'); if (f) JSON.parse(f).forEach(id => state.fav.add(id)); } catch(e){}
}
function saveState() {
  try { localStorage.setItem('forum_fav', JSON.stringify([...state.fav])); } catch(e){}
}
loadState();

{id:28, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Viele denken, dass ..., aber ...",                  left_zh:"很多人認為……，但是……",           ex:[{de:"Viele denken, dass Pendeln günstiger ist, aber langfristig kann es sehr teuer werden.",zh:"很多人認為通勤比較便宜，但長期其實可能很貴。"}]},
{id:29, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ein weiterer Aspekt dabei ist, dass ...",           left_zh:"另一個重點是……",                 ex:[{de:"Ein weiterer Aspekt dabei ist, dass ein Umzug mehr Freizeit ermöglichen kann.",zh:"另一個重點是搬家可能讓人有更多的自由時間。"}]},
{id:30, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"..., deshalb käme ... niemals in Frage.",           left_zh:"……，因此……絕對不會考慮。",       ex:[{de:"Ich möchte mehr Zeit für meine Familie haben, deshalb käme tägliches Pendeln für mich niemals in Frage.",zh:"我希望有更多時間陪家人，因此每天通勤對我來說完全不會考慮。"}]},
{id:31, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Es wäre doch völlig unlogisch.",                   left_zh:"那樣完全不合理。",               ex:[{de:"Es wäre doch völlig unlogisch, jeden Tag 150 Kilometer zu fahren, wenn man auch umziehen könnte.",zh:"如果可以搬家，卻每天開150公里通勤，那完全不合理。"}]},
// 4. Vorteile und Nachteile
{id:32, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"Dafür spricht, dass ... / Dagegen spricht, dass ...", left_zh:"支持的理由是……／反對的理由是……", ex:[{de:"Dafür spricht, dass man beim Umzug Zeit spart; dagegen spricht, dass die Miete teurer sein kann.",zh:"支持的理由是搬家可以省時間；反對的理由是房租可能更貴。"}]},
{id:33, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"Ich kann zwar verstehen, dass ..., jedoch / aber ...", left_zh:"我雖然理解……，但是……", ex:[{de:"Ich kann zwar verstehen, dass manche nicht umziehen wollen, jedoch ist tägliches Pendeln sehr belastend.",zh:"我雖然理解有些人不想搬家，但每天通勤真的很累。"}]},
{id:34, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"Hervorragend finde ich ..., weniger gut finde ich ...", left_zh:"我覺得很棒的是……，不太好的是……", ex:[{de:"Hervorragend finde ich die moderne Ausstattung, weniger gut finde ich die 75 km Entfernung.",zh:"我覺得現代化設備很棒，但75公里的距離不太好。"}]},
{id:35, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"Das wird sich positiv / negativ auf ... auswirken.", left_zh:"這會對……造成正面／負面影響。", ex:[{de:"Das wird sich negativ auf meine Work-Life-Balance auswirken.",zh:"這會對我的工作生活平衡造成負面影響。"}]},
{id:36, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"... hat den entscheidenden Vorteil, dass ...", left_zh:"……有決定性的優點：……", ex:[{de:"Ein Umzug hat den entscheidenden Vorteil, dass ich weniger Pendelzeit habe.",zh:"搬家的決定性優點是我通勤時間會變少。"}]},
{id:37, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"Ein Argument, das gegen ... spricht, ist ...", left_zh:"一個反對……的理由是……", ex:[{de:"Ein Argument, das gegen tägliches Pendeln spricht, ist der hohe Zeitverlust.",zh:"一個反對每天通勤的理由是時間浪費很大。"}]},

{id:42, sec:"6. Schluss（結尾提問／收束）", left_de:"Was ist eure Meinung zu dem Thema?",                          left_zh:"你們對這個主題的看法是什麼？",   ex:[{de:"Was ist eure Meinung dazu: Lieber pendeln oder gleich umziehen?",zh:"你們怎麼看：寧願通勤還是乾脆搬家？"}]},

{id:44, sec:"6. Schluss（結尾提問／收束）", left_de:"Wie findet ihr das?",                                         left_zh:"你們覺得如何？",                 ex:[{de:"Wie findet ihr es, wegen eines neuen Standorts umzuziehen?",zh:"你們覺得因為新地點而搬家怎麼樣？"}]},

{id:48, sec:"6. Schluss（結尾提問／收束）", left_de:"Zusammenfassend lässt sich sagen, dass ...",                  left_zh:"總結來說……",                     ex:[{de:"Zusammenfassend lässt sich sagen, dass ein Umzug bei großer Entfernung oft die bessere Lösung ist.",zh:"總結來說，距離很遠時搬家往往是更好的解決方案。"}]},

        blocks:[{de:"Natürlich gibt es auch mögliche Nachteile. Neue Arbeitsmodelle sind oft am Anfang ungewohnt, und nicht alle Mitarbeitenden stehen einer stärkeren Verlagerung ins Homeoffice positiv gegenüber. Das kann zu Kommunikationsproblemen führen, besonders wenn der persönliche Austausch fehlt. Allerdings zeigen Erfahrungen, dass sich viele Schwierigkeiten verringern, wenn klare Absprachen und Strukturen vorhanden sind.",zh:"當然也有可能的缺點。新工作模式起初往往不習慣，並非所有員工都對更多居家辦公持正面態度。這可能導致溝通問題，尤其是缺乏面對面交流時。不過，經驗顯示，當有清晰的協議和結構時，許多困難會減少。"}]},
      { num:"⑦", de:"Lösungsvorschlag", zh:"解決方案",
        blocks:[{de:"Unter bestimmten Bedingungen könnte diese Regelung jedoch besonders erfolgreich sein, wenn sie transparent kommuniziert und fair umgesetzt wird.",zh:"在某些條件下，如果這個規定能透明溝通並公平實施，它可能會特別成功。"}]},

// ════════════════════════════════════════════════════════════
// RENDER: TAB 1
// ════════════════════════════════════════════════════════════
function buildRow(entry) {
  const isFav = state.fav.has(entry.id);
  const cls = isFav ? 'fav' : '';
  const exHtml = entry.ex.map(e => {
    const deF = e.de.replace(/\n/g,'<br>');
    return `<div class="ex-item" onclick="speak('${esc(e.de.replace(/\n/g,' '))}')">
      <span class="ex-de">${deF}</span>
      <span class="ex-zh">${e.zh}</span>
    </div>`;
  }).join('');
  return `<tr class="${cls}">
    <td class="mark-fav col-fav" onclick="toggleFav(${entry.id})"><span class="mark-box"></span></td>
    <td class="col-left" onclick="speak('${esc(entry.left_de)}')">
      <span class="r-de">${entry.left_de}</span>
      <span class="r-zh">${entry.left_zh}</span>
    </td>
    <td class="col-right">${exHtml}</td>
  </tr>`;
}

function render() {
  let list = REDEMITTEL;
  if (state.filter === 'fav') list = REDEMITTEL.filter(e => state.fav.has(e.id));
  document.getElementById('stats').textContent = `共 ${REDEMITTEL.length} 句型　常用 ${state.fav.size}`;
  if (!list.length) {
    document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;font-size:13px;background:#fff;border:0.5px solid #ddd;border-radius:8px;">沒有標記為常用的句型</div>';
    return;
  }
  const sections = {}, secOrder = [];
  list.forEach(e => { if (!sections[e.sec]) { sections[e.sec]=[]; secOrder.push(e.sec); } sections[e.sec].push(e); });
  const thead = `<thead><tr>
    <th class="col-fav">常用</th>
    <th class="col-left">句型／Redemittel &nbsp;🔊 點擊朗讀</th>
    <th class="col-right">主題例句：Pendeln oder Umziehen &nbsp;🔊 點擊朗讀</th>
  </tr></thead>`;
  const html = secOrder.map(sec =>
    `<div class="section-block">
      <div class="section-header">${sec}</div>
      <table>${thead}<tbody>${sections[sec].map(buildRow).join('')}</tbody></table>
    </div>`
  ).join('');
  document.getElementById('mainContent').innerHTML = html;
}

function toggleFav(id) { if (state.fav.has(id)) state.fav.delete(id); else state.fav.add(id); saveState(); render(); }
function setFilter(f, btn) { state.filter = f; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); }

// ════════════════════════════════════════════════════════════
// RENDER: TAB 2
// ════════════════════════════════════════════════════════════
function renderAufbau() {
  // Part 1: Aufbau framework table
  const aufbauRows = AUFBAU.map((row, i) => {
    const altCls = row.alt ? ' class="aufbau-alt"' : '';
    const deHtml = row.hints.length
      ? row.hints.map(h => `<span class="hint-de" onclick="speak('${esc(h.de)}')">${h.de}</span>`).join('')
      : `<span style="color:#bbb;font-size:11px;font-style:italic;">（可自由補充論點）</span>`;
    const zhHtml = row.hints.length
      ? row.hints.map(h => `<span class="hint-zh">${h.zh}</span>`).join('')
      : '';
    return `<tr${altCls}>
      <td class="col-aufbau-num">${row.num}</td>
      <td class="col-aufbau-step">
        ${row.de}
        <span class="aufbau-step-zh">${row.zh}</span>
      </td>
      <td class="col-aufbau-de">${deHtml}</td>
      <td class="col-aufbau-zh">${zhHtml}</td>
    </tr>`;
  }).join('');

  // Part 2: example essays
  const examplesHtml = BEISPIELE.map(b => {
    const rowsHtml = b.rows.map(row => {
      const blocksHtml = row.blocks.map(bl =>
        `<div class="analysis-item" onclick="speak('${esc(bl.de.replace(/\n/g,' '))}')">
          <span class="a-de">${bl.de.replace(/\n/g,'<br>')}</span>
          <span class="a-zh">${bl.zh.replace(/\n/g,'<br>')}</span>
        </div>`
      ).join('');
      return `<tr>
        <td class="label-cell col-label">
          <span class="label-num">${row.num}</span>
          <span class="label-de">${row.de}</span>
          <span class="label-zh">${row.zh}</span>
        </td>
        <td>${blocksHtml}</td>
      </tr>`;
    }).join('');

    return `<div class="section-block">
      <div class="topic-banner">
        📝 ${b.topic}
        <span class="topic-zh">${b.topicZh}</span>
      </div>
      <div class="topic-prompt">${b.prompt}<br><span style="color:#aaa;font-style:italic;">${b.promptZh}</span></div>
      <table>
        <thead><tr>
          <th class="col-label" style="text-align:center;">段落分類</th>
          <th>範例文章（Beispieltext）&nbsp;🔊 點擊朗讀</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>`;
  }).join('');

  document.getElementById('aufbauContent').innerHTML = `
    <div class="section-block">
      <div class="section-header">論壇文章架構 Aufbau Forumsbeitrag &nbsp;·&nbsp; 常用句型速查 &nbsp;🔊 點擊朗讀</div>
      <table>
        <thead><tr>
          <th style="width:44px;text-align:center;">番號</th>
          <th style="width:16%;">步驟 / Schritt</th>
          <th style="width:46%;">常用句型（德文）&nbsp;🔊 點擊朗讀</th>
          <th style="width:38%;">中文翻譯</th>
        </tr></thead>
        <tbody>${aufbauRows}</tbody>
      </table>
    </div>
    <div style="margin:28px 0 10px; font-size:14px; font-weight:600; color:#1a3a6b; padding-bottom:6px; border-bottom:2px solid #d0ddf0;">
      範例文章 Beispieltexte
    </div>
    ${examplesHtml}
  `;
}

render();
renderAufbau();
</script>
