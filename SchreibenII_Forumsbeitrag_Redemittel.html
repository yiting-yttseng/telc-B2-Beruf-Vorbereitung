<script>
// ── TTS ──────────────────────────────────────────────────────────────────────
function speak(text) {
  if (!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.92;
  const badge = document.getElementById('speakingBadge');
  badge.classList.add('active');
  u.onend = u.onerror = () => badge.classList.remove('active');
  window.speechSynthesis.speak(u);
}
function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── STATE ────────────────────────────────────────────────────────────────────
const state = { fav: new Set(), filter: 'all' };


// ── Export / Import JSON ──────────────────────────────────────────────────────
function exportJSON() {
  const payload = {
    file: 'SchreibenI_Beschwerde_beantworten_checkpoint.json',
    version: 1,
    exported: new Date().toISOString(),
    fav: [...state.fav]
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'SchreibenI_Beschwerde_beantworten_checkpoint.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.fav || !Array.isArray(data.fav)) throw new Error('格式錯誤');
      state.fav = new Set(data.fav.map(Number));
      saveState();
      render();
      const ok = document.getElementById('cpStatus');
      el.textContent = '✓ 匯入成功';;
      setTimeout(() => { el.textContent = ''; }, 2500);
    } catch(err) {
      alert('匯入失敗：檔案格式不正確');
    }
    event.target.value = ''; // reset
  };
  reader.readAsText(file);
}

function loadState() {
  try {
    const f = localStorage.getItem('forum_fav');
    if (f) JSON.parse(f).forEach(id => state.fav.add(id));
  } catch(e){}
}
function saveState() {
  try { localStorage.setItem('forum_fav', JSON.stringify([...state.fav])); } catch(e){}
}
loadState();

// ── RENDER ────────────────────────────────────────────────────────────────────
function buildRow(entry) {
  const isFav = state.fav.has(entry.id);
  const cls = isFav ? 'fav' : '';
  const exHtml = entry.ex.map(e => {
    const deFormatted = e.de.replace(/\n/g,'<br>');
    return `<div class="ex-item" onclick="speak('${esc(e.de.replace(/\n/g,' '))}')">
      <span class="ex-de">${deFormatted}</span>
      <span class="ex-zh">${e.zh}</span>
    </div>`;
  }).join('');
  return `<tr class="${cls}">
    <td class="mark-fav col-fav" onclick="toggleFav(${entry.id})">
      <span class="mark-box"></span>
      
    </td>
    <td class="col-left" onclick="speak('${esc(entry.left_de)}')">
      <span class="r-de">${entry.left_de}</span>
      <span class="r-zh">${entry.left_zh}</span>
    </td>
    <td class="col-right">${exHtml}</td>
  </tr>`;
}

function render() {
  let list = REDEMITTEL;
  if (state.filter === 'fav') list = REDEMITTEL.filter(e => state.fav.has(e.id));

  const favCount = state.fav.size;
  document.getElementById('stats').textContent = `共 ${REDEMITTEL.length} 句型　常用 ${favCount}`;

  if (!list.length) {
    document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:40px;color:#aaa;font-size:13px;background:#fff;border:0.5px solid #ddd;border-radius:8px;">沒有標記為常用的句型</div>';
    return;
  }

  // Group by section
  const sections = {};
  const secOrder = [];
  list.forEach(e => {
    if (!sections[e.sec]) { sections[e.sec] = []; secOrder.push(e.sec); }
    sections[e.sec].push(e);
  });

  const thead = `<thead><tr>
    <th class="col-fav">常用</th>
    <th class="col-left">句型／Redemittel &nbsp;🔊 點擊朗讀</th>
    <th class="col-right">主題例句：Pendeln oder Umziehen &nbsp;🔊 點擊朗讀</th>
  </tr></thead>`;

  let html = secOrder.map(sec =>
    `<div class="section-block">
      <div class="section-title">${sec}</div>
      <table>${thead}<tbody>${sections[sec].map(buildRow).join('')}</tbody></table>
    </div>`
  ).join('');

  // Aufbau section
  html += `<div class="section-block" style="margin-top:40px;">
    <div class="section-header">Aufbau Forumsbeitrag &nbsp;·&nbsp; Thema: »Weniger Müll im Betrieb« &nbsp;(S.39 / 10b)</div>
    <table>
      <thead><tr>
        <th style="width:50px;text-align:center;">番號</th>
        <th>論壇文章架構（Aufbau）</th>
      </tr></thead>
      <tbody>
        ${[
          ["①","Einleitung（引言）"],
          ["②","Meinung klar äußern（明確表達立場）"],
          ["③","Begründung / Erklärung: warum? logisch begründen（理由說明）"],
          ["④","Beispiel（舉例）"],
          ["⑤","...（可繼續補充論點，自由發揮）"],
          ["⑥","Gegenargument（反對意見）"],
          ["⑦","Lösungsvorschlag（解決方案）"],
          ["⑧","Schluss – Frage in die Runde（結尾提問）"],
        ].map(([n,d],i) =>
          `<tr style="${i%2===1?'background:#f7f9fd':''}">
            <td class="aufbau-num">${n}</td>
            <td class="aufbau-desc">${d}</td>
          </tr>`
        ).join('')}
      </tbody>
    </table>
  </div>`;

  // Analysis section
  html += `<div class="section-block">
    <div class="section-header">文章內容分析 &nbsp;·&nbsp; ⑤ 省略；⑦ Lösungsvorschlag 本文未出現</div>
    <table>
      <thead><tr>
        <th class="col-label" style="text-align:center;">段落分類</th>
        <th>原文（Originaltext）&nbsp;🔊 點擊朗讀</th>
      </tr></thead>
      <tbody>
        ${ANALYSE.map(row => {
          const blocksHtml = row.blocks.map(b =>
            `<div class="analysis-item" onclick="speak('${esc(b.de)}')">
              <span class="a-de">${b.de}</span>
              <span class="a-zh">${b.zh}</span>
            </div>`
          ).join('');
          return `<tr>
            <td class="label-cell col-label">
              <span class="label-num">${row.num}</span>
              <span class="label-de">${row.labelDe}</span>
              <span class="label-zh">${row.labelZh}</span>
            </td>
            <td>${blocksHtml}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;

  document.getElementById('mainContent').innerHTML = html;
}

function toggleFav(id) {
  if (state.fav.has(id)) state.fav.delete(id);
  else state.fav.add(id);
  saveState();
  render();
}

function setFilter(f, btn) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

render();
</script>
