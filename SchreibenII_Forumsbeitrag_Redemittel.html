<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2 Forumbeitrag</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }
.page { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

/* ── Top nav (B2 tracker identical) ── */
.chapter-nav { background: #1a3a6b; padding: 10px 16px 0; }
.tab-scroll { display: flex; gap: 4px; flex-wrap: wrap; }
.chapter-tab {
  padding: 7px 18px; border-radius: 6px 6px 0 0; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer; color: #a8c8f0;
  background: rgba(255,255,255,0.10); transition: all 0.15s;
  white-space: nowrap;
}
.chapter-tab:hover { background: rgba(255,255,255,0.20); color: #fff; }
.chapter-tab.active { background: #f5f5f3; color: #1a3a6b; }
.chapter-info { background: #1a3a6b; padding: 8px 20px 12px; border-bottom: 2px solid #2a5a9b; }
#pageTitle { color: #fff; font-size: 17px; font-weight: 600; margin: 0 0 2px; }
.page-subtitle { color: #a8c8f0; font-size: 11px; margin: 0; }

/* ── Checkpoint bar ── */
.checkpoint-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 20px; background: #f0f4ff; border-bottom: 1px solid #d0d8f0;
  font-size: 12px; color: #555;
}
.cp-label { color: #888; margin-right: 4px; }
.cp-btn {
  padding: 4px 12px; border-radius: 5px; border: 1px solid #b0c0e8;
  background: #fff; color: #1a3a6b; font-size: 12px;
  cursor: pointer; font-weight: 500; transition: background 0.15s;
}
.cp-btn:hover { background: #e8f0fe; }
.cp-btn.primary { background: #1a3a6b; color: #fff; border-color: #1a3a6b; }
.cp-btn.primary:hover { background: #2a5a9b; }
.cp-status { font-size: 11px; color: #5a8a5a; margin-left: 4px; }
#cpFileInput { display: none; }

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
  background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 10px 14px;
}
.toolbar-left { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-btn { padding: 5px 14px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #333; font-size: 13px; cursor: pointer; }
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.stats { font-size: 12px; color: #888; margin-left: 4px; }
.speaking-badge { display: none; align-items: center; gap: 5px; font-size: 11px; color: #666; padding: 3px 10px; border: 0.5px solid #ddd; border-radius: 20px; background: #fafaf8; }
.speaking-badge.active { display: flex; }
.speaking-dot { width: 7px; height: 7px; border-radius: 50%; background: #4a9eff; animation: pulse 0.9s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Section header ── */
.section-block { margin-bottom: 20px; }
.section-header { font-size: 11px; font-weight: 600; color: #555; padding: 8px 10px 6px; letter-spacing: 0.06em; text-transform: uppercase; background: #efefed; border-radius: 6px 6px 0 0; border: 0.5px solid #ddd; border-bottom: none; }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; background: #fff; border: 0.5px solid #ddd; border-radius: 0 0 8px 8px; overflow: hidden; table-layout: fixed; }
th { text-align: left; padding: 7px 10px; background: #fafaf8; color: #777; font-weight: 500; font-size: 11px; border-bottom: 0.5px solid #e0e0e0; letter-spacing: 0.03em; }
td { padding: 7px 10px; border-bottom: 0.5px solid #efefed; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr.fav td { background: #fff6f6; }

/* ── Fav dot ── */
.col-fav { width: 30px; }
td.mark-fav { width: 30px; text-align: center; cursor: pointer; user-select: none; vertical-align: middle; }
td.mark-fav:hover { background: #ffe0e0 !important; }
td.mark-fav:hover .mark-box { border-color: #e24b4a; }
.mark-box { display: block; width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #ccc; margin: 3px auto 0; transition: all 0.15s; }
tr.fav td.mark-fav .mark-box { background: #e24b4a; border-color: #e24b4a; }

/* ── Redemittel table cols ── */
.col-left { width: 30%; cursor: pointer; }
td.col-left:hover { background: #f0f6ff !important; }
tr.fav td.col-left:hover { background: #ffe0e0 !important; }
.r-de { font-weight: 700; font-size: 13px; color: #1a5fc8; display: block; line-height: 1.55; margin-bottom: 2px; }
.r-zh { font-size: 11px; color: #999; font-style: italic; display: block; }
.col-right { width: 70%; }
.ex-item { cursor: pointer; padding: 3px 6px; border-radius: 4px; margin-bottom: 4px; transition: background 0.1s; }
.ex-item:last-child { margin-bottom: 0; }
.ex-item:hover { background: #f0f6ff; }
tr.fav .ex-item:hover { background: #ffe0e0; }
.ex-de { font-size: 12px; color: #222; line-height: 1.6; display: block; }
.ex-zh { font-size: 11px; color: #999; font-style: italic; display: block; }

/* ── Aufbau table (3 cols) ── */
.col-aufbau-num  { width: 44px; text-align: center; font-size: 15px; font-weight: 700; color: #e24b4a; vertical-align: top; padding-top: 10px; }
.col-aufbau-step { width: 16%; font-size: 12px; font-weight: 600; color: #1a3a6b; vertical-align: top; }
.col-aufbau-de   { width: 46%; font-size: 12px; color: #222; vertical-align: top; }
.col-aufbau-zh   { width: 38%; font-size: 11px; color: #888; font-style: italic; vertical-align: top; }
.aufbau-step-zh  { font-size: 11px; color: #999; font-style: italic; display: block; margin-top: 2px; font-weight: 400; }
.hint-de { cursor: pointer; padding: 2px 4px; border-radius: 3px; margin-bottom: 3px; line-height: 1.6; display: block; transition: background 0.1s; }
.hint-de:hover { background: #f0f6ff; }
.hint-de:last-child { margin-bottom: 0; }
.hint-zh { padding: 2px 4px; margin-bottom: 3px; line-height: 1.6; display: block; }
.hint-zh:last-child { margin-bottom: 0; }
tr.aufbau-alt td { background: #f7f9fd; }

/* ── Analyse (example) table ── */
.col-label { width: 140px; }
.label-cell { background: #f5f8ff !important; text-align: center; vertical-align: middle; }
.label-num  { font-size: 20px; font-weight: 700; color: #e24b4a; display: block; }
.label-de   { font-size: 12px; font-weight: 700; color: #1a5fc8; display: block; margin-top: 2px; }
.label-zh   { font-size: 11px; color: #999; font-style: italic; display: block; }
.analysis-item { cursor: pointer; padding: 3px 6px; border-radius: 4px; margin-bottom: 4px; transition: background 0.1s; }
.analysis-item:last-child { margin-bottom: 0; }
.analysis-item:hover { background: #f0f6ff; }
.a-de { font-size: 12px; color: #222; line-height: 1.6; display: block; }
.a-zh { font-size: 11px; color: #999; font-style: italic; display: block; }

/* ── Personal skeleton table (個人固定骨架) ── */
.placeholder { color: #b08020; font-style: italic; background: #fff8e8; padding: 0 3px; border-radius: 3px; }
.placeholder-pos { color: #1a7a4a; font-style: italic; background: #e8f8ee; padding: 0 3px; border-radius: 3px; font-weight: 600; }
.skeleton-func { font-size: 12px; font-weight: 600; color: #1a3a6b; vertical-align: top; width: 18%; }
.skeleton-de   { font-size: 12.5px; color: #222; line-height: 1.65; vertical-align: top; cursor: pointer; }
.skeleton-de:hover { background: #f0f6ff; }

/* ── Positive nouns reference list ── */
.pos-noun-box {
  margin-top: 10px; padding: 10px 14px; background: #f4fbf6;
  border: 1px solid #b8e0c8; border-radius: 6px;
}
.pos-noun-title { font-size: 11px; font-weight: 700; color: #1a7a4a; margin-bottom: 6px; }
.pos-noun-list { display: flex; flex-wrap: wrap; gap: 6px; }
.pos-noun-item {
  font-size: 11.5px; color: #1a7a4a; background: #e8f8ee;
  border: 1px solid #b8e0c8; border-radius: 12px; padding: 2px 10px;
  cursor: pointer; transition: background 0.1s;
}
.pos-noun-item:hover { background: #d0f0dc; }
.pos-noun-item .zh { color: #6a9a7a; font-style: italic; margin-left: 4px; }

/* ── Bold skeleton structure highlighting in example essays ── */
.a-de .skel-bold { font-weight: 700; color: #1a3a6b; }
.a-de .pos-highlight { color: #1a7a4a; font-weight: 700; background: #e8f8ee; padding: 0 2px; border-radius: 2px; }
.a-de .topic-highlight { color: #b08020; font-weight: 700; background: #fff3cc; padding: 0 2px; border-radius: 2px; }

/* ── Example topic label ── */
.topic-banner {
  font-size: 12px; font-weight: 600; color: #1a3a6b;
  padding: 7px 12px; background: #e8f0fb;
  border: 0.5px solid #c0d0ec; border-radius: 6px;
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.topic-banner .topic-zh { font-weight: 400; color: #888; font-style: italic; font-size: 11px; }
.topic-prompt { font-size: 11.5px; color: #555; background: #fff; border: 0.5px solid #ddd; border-radius: 4px; padding: 6px 10px; margin-bottom: 14px; line-height: 1.6; }

/* ── Teacher tips box ── */
.tips-box {
  background: #fffbf0; border: 1px solid #f0d080;
  border-radius: 8px; padding: 14px 18px; margin-bottom: 20px;
}
.tips-box-title {
  font-size: 12px; font-weight: 700; color: #a06000;
  letter-spacing: 0.05em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.tips-list { list-style: none; padding: 0; margin: 0; }
.tips-list li {
  font-size: 12.5px; line-height: 1.65; padding: 5px 0;
  border-bottom: 0.5px solid #f0e0b0; display: flex; gap: 8px;
}
.tips-list li:last-child { border-bottom: none; }
.tips-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
.tips-de { color: #222; display: block; font-weight: 500; }
.tips-zh { color: #999; font-style: italic; font-size: 11px; display: block; margin-top: 1px; }
.tips-wrong { color: #c0392b; text-decoration: line-through; }
.tips-right { color: #27ae60; font-weight: 700; }
</style>
</head>
<body>

<div class="chapter-info">
  <div style="display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;">
    <p id="pageTitle" style="color:#fff;font-size:17px;font-weight:600;margin:0;">B2 Forumbeitrag</p>
    <p class="page-subtitle" style="margin:0;">🔊 點擊句型或例句朗讀德文 &nbsp;&nbsp;⭕ 點圓圈標記常用句型</p>
  </div>
</div>
<div class="chapter-nav">
  <div class="tab-scroll">
    <button class="chapter-tab active" onclick="switchTab('redemittel',this)">Redemittel 句型庫</button>
    <button class="chapter-tab" onclick="switchTab('aufbau',this)">Aufbau 框架</button>
    <button class="chapter-tab" onclick="switchTab('skeleton',this)">個人骨架 ＋ 範例</button>
  </div>
</div>

<div class="checkpoint-bar">
  <span class="cp-label">💾 勾選備份：</span>
  <button class="cp-btn primary" onclick="exportJSON()">匯出</button>
  <button class="cp-btn" onclick="document.getElementById('cpFileInput').click()">匯入</button>
  <input type="file" id="cpFileInput" accept=".json" onchange="importJSON(event)">
  <span class="cp-status" id="cpStatus"></span>
</div>

<div class="page">
  <!-- TAB 1: Redemittel -->
  <div id="tab-redemittel">
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
        <button class="filter-btn" onclick="setFilter('fav',this)">常用</button>
        <span class="stats" id="stats"></span>
        <span class="speaking-badge" id="speakingBadge"><span class="speaking-dot"></span>朗讀中…</span>
      </div>
    </div>
    <div id="mainContent"></div>
  </div>

  <!-- TAB 2: Aufbau -->
  <div id="tab-aufbau" style="display:none;">
    <div id="aufbauContent"></div>
  </div>

  <!-- TAB 3: Personal skeleton + example essays -->
  <div id="tab-skeleton" style="display:none;">
    <div id="skeletonContent"></div>
  </div>
</div>

<script>
// ── TTS ───────────────────────────────────────────────────────
function speak(text) {
  if (!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.92;
  const badge = document.getElementById('speakingBadge');
  if (badge) badge.classList.add('active');
  u.onend = u.onerror = () => { if (badge) badge.classList.remove('active'); };
  window.speechSynthesis.speak(u);
}
function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── TAB SWITCHING ─────────────────────────────────────────────
function switchTab(name, btn) {
  document.getElementById('tab-redemittel').style.display = name === 'redemittel' ? '' : 'none';
  document.getElementById('tab-aufbau').style.display     = name === 'aufbau'     ? '' : 'none';
  document.getElementById('tab-skeleton').style.display   = name === 'skeleton'   ? '' : 'none';
  document.querySelectorAll('.chapter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // title is fixed in header
}

// ── STATE ─────────────────────────────────────────────────────
const state = { fav: new Set(), filter: 'all' };

// ── JSON Export / Import ──────────────────────────────────────
function exportJSON() {
  const payload = { file: 'SchreibenII_Forumsbeitrag_Redemittel_checkpoint.json', version: 1, exported: new Date().toISOString(), fav: [...state.fav] };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'SchreibenII_Forumsbeitrag_Redemittel_checkpoint.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.fav || !Array.isArray(data.fav)) throw new Error('格式錯誤');
      state.fav = new Set(data.fav.map(Number));
      saveState(); render();
      const el = document.getElementById('cpStatus');
      el.textContent = '✓ 匯入成功';
      setTimeout(() => { el.textContent = ''; }, 2500);
    } catch(err) { alert('匯入失敗：檔案格式不正確'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}
function loadState() {
  try { const f = localStorage.getItem('forum_fav'); if (f) JSON.parse(f).forEach(id => state.fav.add(id)); } catch(e){}
}
function saveState() {
  try { localStorage.setItem('forum_fav', JSON.stringify([...state.fav])); } catch(e){}
}
loadState();

// ════════════════════════════════════════════════════════════
// TAB 1 DATA: REDEMITTEL
// ════════════════════════════════════════════════════════════
const REDEMITTEL = [

{id:2,  sec:"1. Grüßen（問候）",     left_de:"Hallo an alle",                                                     left_zh:"向大家問好",                      ex:[{de:"Hallo an alle, was haltet ihr davon, für einen neuen Job 75 km zu pendeln?",zh:"大家好，你們怎麼看為了一份新工作每天通勤75公里？"}]},
{id:3,  sec:"1. Grüßen（問候）",     left_de:"Sehr geehrte Damen und Herren",                                     left_zh:"尊敬的女士們先生們",              ex:[{de:"Sehr geehrte Damen und Herren, ich möchte meine Ansicht zum Thema Pendeln oder Umziehen darstellen.",zh:"尊敬的女士們先生們，我想表達我對通勤或搬家這個主題的看法。"}]},
// 2. Einleitung
{id:4,  sec:"2. Einleitung（引言）",  left_de:"Auch ich möchte meine Meinung zum Thema sagen / mitteilen / äußern.", left_zh:"我也想對這個主題發表看法。",  ex:[{de:"Auch ich möchte meine Meinung zum Thema Pendeln oder Umziehen äußern.",zh:"我也想對通勤或搬家這個主題發表看法。"}]},
{id:5,  sec:"2. Einleitung（引言）",  left_de:"Ich habe gehört, dass wir in Zukunft ...",                           left_zh:"我聽說未來我們……",               ex:[{de:"Ich habe gehört, dass wir in Zukunft an einem neuen Standort arbeiten sollen.",zh:"我聽說未來我們要在新的工作地點上班。"}]},
{id:6,  sec:"2. Einleitung（引言）",  left_de:"In Zukunft sollten wir ... / In Zukunft gibt es ...",                left_zh:"未來我們應該……／未來會有……",    ex:[{de:"In Zukunft sollten wir überlegen, ob ein Umzug sinnvoller ist als tägliches Pendeln.",zh:"未來我們應該思考搬家是否比每天通勤更合理。"}]},
{id:7,  sec:"2. Einleitung（引言）",  left_de:"Den Vorschlag finde ich ausgezeichnet / nicht so gut.",              left_zh:"我覺得這個建議很棒／不太好。",   ex:[{de:"Den Vorschlag, näher an den Arbeitsplatz zu ziehen, finde ich ausgezeichnet.",zh:"我覺得搬到工作地點附近這個建議很棒。"}]},
{id:8,  sec:"2. Einleitung（引言）",  left_de:"Die Idee, dass ..., finde ich außerordentlich gut / problematisch.", left_zh:"我覺得……這個想法非常好／有問題。", ex:[{de:"Die Idee, täglich 75 km zu pendeln, finde ich problematisch.",zh:"我覺得每天通勤75公里這個想法有問題。"}]},
// 3. Meinung darstellen
{id:9,  sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Meiner Meinung nach ist das eine gute / schlechte Idee, weil ...", left_zh:"在我看來這是一個好／壞主意，因為……", ex:[{de:"Meiner Meinung nach ist ein Umzug eine gute Idee, weil man Zeit und Energie spart.",zh:"在我看來搬家是個好主意，因為可以節省時間和精力。"}]},

{id:11, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ich bin der Meinung, dass ...",                     left_zh:"我認為……",                       ex:[{de:"Ich bin der Meinung, dass ein Umzug langfristig sinnvoller ist als tägliches Pendeln.",zh:"我認為從長遠來看搬家比每天通勤更合理。"}]},

{id:14, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ich bin damit (nicht) einverstanden, weil ...",     left_zh:"我（不）同意，因為……",           ex:[{de:"Ich bin damit einverstanden, umzuziehen, weil ich näher bei meinen Kollegen sein möchte.",zh:"我同意搬家，因為我想更靠近我的同事。"}]},
{id:141, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ich möchte hiermit zum Ausdruck bringen, dass ...",            left_zh:"我想藉此表達……",                  ex:[{de:"Ich möchte hiermit zum Ausdruck bringen, dass diese Maßnahme sowohl für die Firma als auch für uns Mitarbeitende sinnvoll ist.",zh:"我想藉此表達，這項措施對公司和我們員工雙方都是有意義的。"}]},
{id:15, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ich finde / meine / denke / glaube, dass ...",      left_zh:"我認為／相信……",                 ex:[{de:"Ich glaube, dass ein neuer Standort mit moderner Technik viele Vorteile bietet.",zh:"我相信配備現代技術的新地點有很多優點。"}]},
{id:16, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ich habe die Erfahrung gemacht, dass ...",          left_zh:"我的經驗是……",                   ex:[{de:"Ich habe die Erfahrung gemacht, dass tägliches Pendeln auf Dauer sehr ermüdend ist.",zh:"我的經驗是每天通勤長期下來非常累。"}]},
{id:17, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ich kann mir (nicht) vorstellen, dass ...",         left_zh:"我（無法）想像……",               ex:[{de:"Ich kann mir nicht vorstellen, dass ich jeden Tag 75 km pendeln kann.",zh:"我無法想像我每天都能通勤75公里。"}]},
{id:18, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ich kann mir überhaupt nicht vorstellen, ...",      left_zh:"我完全無法想像……",               ex:[{de:"Ich kann mir überhaupt nicht vorstellen, jeden Tag zwei Stunden im Auto zu sitzen.",zh:"我完全無法想像每天要在車上坐兩小時。"}]},
{id:19, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Es stimmt (nicht), dass ...",                       left_zh:"……（不）是真的。",               ex:[{de:"Es stimmt nicht, dass Pendeln immer günstiger ist als Umziehen.",zh:"通勤一定比搬家便宜這件事並不總是正確。"}]},
{id:20, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Einerseits ..., andererseits ...",                  left_zh:"一方面……，另一方面……",           ex:[{de:"Einerseits ist Pendeln flexibel, andererseits kostet es viel Zeit.",zh:"一方面通勤比較彈性，另一方面很花時間。"}]},
{id:21, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Es klingt zunächst gut, dass ..., aber ...",        left_zh:"乍聽之下……不錯，但……",           ex:[{de:"Es klingt zunächst gut, dass der neue Standort moderner ist, aber der Weg ist sehr weit.",zh:"乍聽之下新地點更現代化不錯，但路程太遠。"}]},
{id:22, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ich befürchte, dass ...",                           left_zh:"我擔心……",                       ex:[{de:"Ich befürchte, dass ich durch das lange Pendeln weniger Zeit für Erholung habe.",zh:"我擔心因為長時間通勤，我休息時間會變少。"}]},
{id:23, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ein großer Vorteil / Nachteil wäre, dass ...",      left_zh:"一個很大的優點／缺點是……",       ex:[{de:"Ein großer Nachteil wäre, dass ich täglich im Stau stehen könnte.",zh:"一個很大的缺點是我每天可能都會塞車。"}]},
{id:24, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ich vertrete den Standpunkt / die Meinung, dass ...", left_zh:"我的立場／看法是……",           ex:[{de:"Ich vertrete den Standpunkt, dass ein Umzug langfristig sinnvoller ist.",zh:"我的立場是從長遠來看搬家更合理。"}]},
{id:25, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ich kann allen nur raten, ...",                     left_zh:"我只能建議大家……",               ex:[{de:"Ich kann allen nur raten, über einen Umzug nachzudenken, wenn der Arbeitsplatz sehr weit entfernt ist.",zh:"如果工作地點很遠，我只能建議大家考慮搬家。"}]},
{id:26, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Das ist mir ... wert.",                             left_zh:"這對我來說值得……",               ex:[{de:"Ein kurzer Arbeitsweg ist mir einen Umzug wert.",zh:"對我來說，為了更短的通勤距離而搬家是值得的。"}]},
{id:27, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Das ist zwar ..., aber ...",                        left_zh:"這雖然……，但是……",               ex:[{de:"Das ist zwar eine gute berufliche Chance, aber der Arbeitsweg ist sehr lang.",zh:"這雖然是一個好的工作機會，但通勤距離很長。"}]},
{id:28, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Viele denken, dass ..., aber ...",                  left_zh:"很多人認為……，但是……",           ex:[{de:"Viele denken, dass Pendeln günstiger ist, aber langfristig kann es sehr teuer werden.",zh:"很多人認為通勤比較便宜，但長期其實可能很貴。"}]},
{id:29, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Ein weiterer Aspekt dabei ist, dass ...",           left_zh:"另一個重點是……",                 ex:[{de:"Ein weiterer Aspekt dabei ist, dass ein Umzug mehr Freizeit ermöglichen kann.",zh:"另一個重點是搬家可能讓人有更多的自由時間。"}]},
{id:30, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"..., deshalb käme ... niemals in Frage.",           left_zh:"……，因此……絕對不會考慮。",       ex:[{de:"Ich möchte mehr Zeit für meine Familie haben, deshalb käme tägliches Pendeln für mich niemals in Frage.",zh:"我希望有更多時間陪家人，因此每天通勤對我來說完全不會考慮。"}]},
{id:31, sec:"3. Meinung darstellen（表達立場／看法）", left_de:"Es wäre doch völlig unlogisch.",                   left_zh:"那樣完全不合理。",               ex:[{de:"Es wäre doch völlig unlogisch, jeden Tag 150 Kilometer zu fahren, wenn man auch umziehen könnte.",zh:"如果可以搬家，卻每天開150公里通勤，那完全不合理。"}]},
// 4. Vorteile und Nachteile
{id:32, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"Dafür spricht, dass ... / Dagegen spricht, dass ...", left_zh:"支持的理由是……／反對的理由是……", ex:[{de:"Dafür spricht, dass man beim Umzug Zeit spart; dagegen spricht, dass die Miete teurer sein kann.",zh:"支持的理由是搬家可以省時間；反對的理由是房租可能更貴。"}]},
{id:33, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"Ich kann zwar verstehen, dass ..., jedoch / aber ...", left_zh:"我雖然理解……，但是……", ex:[{de:"Ich kann zwar verstehen, dass manche nicht umziehen wollen, jedoch ist tägliches Pendeln sehr belastend.",zh:"我雖然理解有些人不想搬家，但每天通勤真的很累。"}]},
{id:34, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"Hervorragend finde ich ..., weniger gut finde ich ...", left_zh:"我覺得很棒的是……，不太好的是……", ex:[{de:"Hervorragend finde ich die moderne Ausstattung, weniger gut finde ich die 75 km Entfernung.",zh:"我覺得現代化設備很棒，但75公里的距離不太好。"}]},
{id:35, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"Das wird sich positiv / negativ auf ... auswirken.", left_zh:"這會對……造成正面／負面影響。", ex:[
  {de:"Das wird sich negativ auf meine Work-Life-Balance auswirken.",zh:"這會對我的工作生活平衡造成負面影響。"},
  {de:"範例（「...」可填入）：\ndie Umwelt 環境 ／ die Work-Life-Balance 工作與生活平衡 ／ die Fairness / Gerechtigkeit 公平性 ／ die Flexibilität 靈活性 ／ den Pendelweg / die Pendelzeit 通勤路程／時間 ／ die Gesundheit 健康 ／ die Motivation 積極性 ／ das Arbeitsklima 工作氛圍 ／ die Produktivität 生產力 ／ die Teamarbeit 團隊合作 ／ die Kosten 成本 ／ den Zusammenhalt 凝聚力",zh:""},
]},
{id:36, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"... hat den entscheidenden Vorteil, dass ...", left_zh:"……有決定性的優點：……", ex:[{de:"Ein Umzug hat den entscheidenden Vorteil, dass ich weniger Pendelzeit habe.",zh:"搬家的決定性優點是我通勤時間會變少。"}]},
{id:37, sec:"4. Vorteile und Nachteile benennen（列舉優缺點）", left_de:"Ein Argument, das gegen ... spricht, ist ...", left_zh:"一個反對……的理由是……", ex:[{de:"Ein Argument, das gegen tägliches Pendeln spricht, ist der hohe Zeitverlust.",zh:"一個反對每天通勤的理由是時間浪費很大。"}]},
// 5. Belege
{id:38, sec:"5. Belege anführen（舉例／提出證據）", left_de:"Beispielsweise ...",                                   left_zh:"例如……",                         ex:[{de:"Beispielsweise spare ich nach einem Umzug pro Woche etwa zehn Stunden Pendelzeit.",zh:"例如，搬家後我每週大約能省下十小時通勤時間。"}]},
{id:39, sec:"5. Belege anführen（舉例／提出證據）", left_de:"Exemplarisch wird dies verdeutlicht an ...",           left_zh:"這點可由……具體看出。",           ex:[{de:"Exemplarisch wird dies verdeutlicht an meinen Benzinkosten, die durch Pendeln stark steigen.",zh:"這點可由我的油錢看出，通勤讓花費大幅上升。"}]},
{id:40, sec:"5. Belege anführen（舉例／提出證據）", left_de:"Dies zeigt sich zum Beispiel an ...",                  left_zh:"這可以從……看出。",               ex:[{de:"Dies zeigt sich zum Beispiel an den häufigen Verspätungen, wenn der Verkehr stockt.",zh:"這可以從交通堵塞時經常遲到看出。"}]},
{id:41, sec:"5. Belege anführen（舉例／提出證據）", left_de:"Klar wird dies, wenn man sich vor Augen führt, dass ...", left_zh:"當你想到……就很清楚。",        ex:[{de:"Klar wird dies, wenn man sich vor Augen führt, dass Pendeln langfristig Stress und Gesundheitsprobleme verursachen kann.",zh:"當你想到長期通勤可能帶來壓力和健康問題，就很清楚。"}]},
{id:"42b", sec:"5. Belege anführen（舉例／提出證據）", left_de:"Zahlreiche Studien zeigen, dass ...", left_zh:"許多研究表明……", ex:[
  {de:"[Arbeitszeit / Überstunden] Zahlreiche Studien zeigen, dass Menschen täglich nur etwa vier Stunden hochkonzentriert arbeiten können, weshalb Freizeitausgleich wichtiger ist als Überstunden.",zh:"許多研究表明，人們每天只能高度專注約四小時，因此補休比加班費更重要。"},
  {de:"[Arbeitszeit / Work-Life-Balance] Zahlreiche Studien zeigen, dass eine gute Work-Life-Balance die Motivation der Mitarbeitenden erhöht.",zh:"許多研究表明，良好的工作與生活平衡能提升員工積極性。"},
  {de:"[Kleidungsvorschriften] Zahlreiche Studien zeigen, dass das tägliche Treffen von Entscheidungen – wie etwa die Kleiderwahl – mentale Energie kostet und die Konzentration im Arbeitsalltag negativ beeinflusst.",zh:"許多研究表明，每天做決定（例如選擇穿什麼衣服）會消耗心理能量，並對工作中的專注力產生負面影響。"},
  {de:"[Bewegung / Gesundheit] Zahlreiche Studien zeigen, dass regelmäßige Bewegung die Konzentration und Leistungsfähigkeit bei der Arbeit deutlich verbessert.",zh:"許多研究表明，規律運動能明顯提升工作中的專注力和表現。"},
  {de:"[Schlafmangel] Zahlreiche Studien zeigen, dass Menschen, die weniger als sechs Stunden schlafen, am nächsten Tag so reagieren, als ob sie betrunken wären – die Konzentration und Entscheidungsfähigkeit nehmen stark ab.",zh:"許多研究表明，睡眠少於六小時的人，隔天的反應就好像喝醉一樣——專注力和決策能力大幅下降。"},
  {de:"[Social Media] Zahlreiche Studien zeigen, dass soziale Medien die Konzentration negativ beeinflussen können.",zh:"許多研究表明，社群媒體可能對專注力產生負面影響。"},
  {de:"[Sport / psychische Gesundheit] Zahlreiche Studien zeigen, dass regelmäßiger Sport die psychische Gesundheit verbessert.",zh:"許多研究表明，規律運動能改善心理健康。"},
  {de:"[Pendelzeit / Glück] Zahlreiche Studien zeigen, dass ein täglicher Arbeitsweg von mehr als 45 Minuten die Arbeitszufriedenheit und das Wohlbefinden erheblich verschlechtert – jede zusätzliche Stunde Pendelzeit wirkt sich auf die Arbeitszufriedenheit aus, als ob man 19 % weniger Gehalt bekäme.",zh:"許多研究表明，每天單趟通勤超過45分鐘會顯著降低工作滿意度與幸福感——每多一個小時的通勤，對工作滿意度的影響就好像薪資被砍了19%一樣。"},
  {de:"[Bewegungsmangel / als ob] Zahlreiche Studien zeigen, dass Personen, die sich kaum bewegen, körperlich so leistungsfähig sind, als ob sie zehn Jahre älter wären.",zh:"許多研究表明，幾乎不運動的人，身體表現就像老了十歲一樣。"},
  {de:"[Sitzen / als ob] Zahlreiche Studien zeigen, dass Menschen, die den ganzen Tag sitzen, ohne sich zu bewegen, ein ähnlich hohes Gesundheitsrisiko haben, als ob sie rauchen würden.",zh:"許多研究表明，整天坐著不動的人，健康風險就像在抽菸一樣。"},
  {de:"[Soziale Isolation / als ob] Zahlreiche Studien zeigen, dass soziale Isolation die Gesundheit so stark schädigt, als ob man täglich 15 Zigaretten rauchen würde.",zh:"許多研究表明，社交孤立對健康的傷害，就像每天抽15根菸一樣。"},
  {de:"[Chronischer Stress / als ob] Zahlreiche Studien zeigen, dass chronischer Stress das Gehirn so stark belastet, als ob man schneller altert.",zh:"許多研究表明，長期慢性壓力對大腦的傷害，就像讓人加速老化一樣。"},
]},
// 6. Schluss
{id:42, sec:"6. Schluss（結尾提問／收束）", left_de:"Was ist eure Meinung zu dem Thema?",                          left_zh:"你們對這個主題的看法是什麼？",   ex:[{de:"Was ist eure Meinung dazu: Lieber pendeln oder gleich umziehen?",zh:"你們怎麼看：寧願通勤還是乾脆搬家？"}]},
{id:43, sec:"6. Schluss（結尾提問／收束）", left_de:"Was denkt ihr darüber?",                                      left_zh:"你們怎麼想？",                   ex:[{de:"Was denkt ihr darüber, jeden Tag 75 km zu pendeln?",zh:"你們怎麼看每天通勤75公里？"}]},
{id:44, sec:"6. Schluss（結尾提問／收束）", left_de:"Wie findet ihr das?",                                         left_zh:"你們覺得如何？",                 ex:[{de:"Wie findet ihr es, wegen eines neuen Standorts umzuziehen?",zh:"你們覺得因為新地點而搬家怎麼樣？"}]},
{id:45, sec:"6. Schluss（結尾提問／收束）", left_de:"Was haltet ihr davon?",                                       left_zh:"你們覺得這樣如何？",             ex:[{de:"Was haltet ihr davon, erst zu pendeln und später zu entscheiden, ob man umzieht?",zh:"你們覺得先通勤、之後再決定要不要搬家如何？"}]},
{id:46, sec:"6. Schluss（結尾提問／收束）", left_de:"Ich bin gespannt auf eure Antwort.",                          left_zh:"我很期待你們的回覆。",           ex:[{de:"Ich bin gespannt auf eure Antwort: Würdet ihr pendeln oder umziehen?",zh:"我很期待你們的回覆：你們會通勤還是搬家？"}]},
{id:47, sec:"6. Schluss（結尾提問／收束）", left_de:"Abschließend möchte ich sagen, dass ...",                     left_zh:"最後我想說……",                   ex:[{de:"Abschließend möchte ich sagen, dass jeder individuell entscheiden sollte, ob er pendeln oder umziehen möchte.",zh:"最後我想說，每個人都應該依自身情況決定通勤或搬家。"}]},
{id:48, sec:"6. Schluss（結尾提問／收束）", left_de:"Zusammenfassend lässt sich sagen, dass ...",                  left_zh:"總結來說……",                     ex:[{de:"Zusammenfassend lässt sich sagen, dass ein Umzug bei großer Entfernung oft die bessere Lösung ist.",zh:"總結來說，距離很遠時搬家往往是更好的解決方案。"}]},
// 7. Gruß
{id:49, sec:"7. Gruß（署名問候語）", left_de:"Viele Grüße",                                                       left_zh:"誠摯問候",                       ex:[{de:"Viele Grüße\nYi-Ting",zh:"誠摯問候　Yi-Ting"}]},
{id:50, sec:"7. Gruß（署名問候語）", left_de:"Mit freundlichen Grüßen",                                           left_zh:"此致 敬禮",                      ex:[{de:"Mit freundlichen Grüßen\nYi-Ting",zh:"此致 敬禮　Yi-Ting"}]},
];

function highlightSkeletonAndNouns(text, topicKey) {
  let out = text;
  // bold skeleton phrases (longer phrases first to avoid double-wrapping nested matches)
  const sortedPhrases = [...SKEL_PHRASES].sort((a, b) => b.length - a.length);
  sortedPhrases.forEach(p => {
    const esc_p = p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // Negative lookahead/behind-free approach: split on existing <span> tags, only replace in plain segments
    const parts = out.split(/(<span class="skel-bold">.*?<\/span>)/g);
    out = parts.map(part => {
      if (part.startsWith('<span class="skel-bold">')) return part; // already highlighted, skip
      return part.replace(new RegExp(esc_p, 'g'), m => `<span class="skel-bold">${m}</span>`);
    }).join('');
  });
  // highlight positive nouns in green
  POSITIVE_NOUNS.forEach(n => {
    const bare = n.de.replace(/^(die|der|das|den|dem|des)\s+/, '');
    const esc_n = bare.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp('\\b' + esc_n + '\\w*\\b', 'g'), m => `<span class="pos-highlight">${m}</span>`);
  });
  // highlight topic keywords in yellow (consistent with ||Thema|| placeholder style)
  const keywords = TOPIC_KEYWORDS[topicKey] || [];
  const sortedKeywords = [...keywords].sort((a, b) => b.length - a.length);
  sortedKeywords.forEach(kw => {
    const esc_kw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(esc_kw, 'g'), m => `<span class="topic-highlight">${m}</span>`);
  });
  return out;
}

        <th>範例文章（Beispieltext）&nbsp;🔊 點擊朗讀 &nbsp;｜&nbsp; <span class="skel-bold" style="font-size:10px;">粗體＝固定骨架</span> &nbsp;｜&nbsp; <span class="pos-highlight" style="font-size:10px;">綠色＝正向名詞</span> &nbsp;｜&nbsp; <span class="topic-highlight" style="font-size:10px;">黃色＝題目關鍵字</span></th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </div>`;
}

function renderSkeleton() {
  const skeletonRows = SKELETON.map(s =>
    `<tr>
      <td class="skeleton-func">${s.func}</td>
      <td class="skeleton-de" onclick="speak('${esc(s.de.replace(/<[^>]+>/g,'').replace(/\|\|.*?\|\|/g,'').trim())}')">${s.de}</td>
    </tr>`
  ).join('');

  const posNounListHtml = POSITIVE_NOUNS.map(n =>
    `<span class="pos-noun-item" onclick="speak('${esc(n.de)}')">${n.de}<span class="zh">${n.zh}</span></span>`
  ).join('');

  const examplesHtml = BEISPIELE.map(renderPersonalExampleBlock).join('');

  document.getElementById('skeletonContent').innerHTML = `
    <div class="section-block">
      <div class="section-header">⭐ 個人固定骨架 Persönliches Gerüst &nbsp;·&nbsp; 考試套用句型（含 <span class="placeholder" style="font-size:10px;">|| Thema ||</span> 與 <span class="placeholder-pos" style="font-size:10px;">|| 正向主題 ||</span> 替換點）</div>
      <table>
        <thead><tr>
          <th style="width:18%;">功能</th>
          <th>固定句型（德文）&nbsp;🔊 點擊朗讀</th>
        </tr></thead>
        <tbody>${skeletonRows}</tbody>
      </table>
      <div class="pos-noun-box">
        <div class="pos-noun-title">🟢 「|| 正向主題 ||」常用替換詞彙（點擊朗讀）</div>
        <div class="pos-noun-list">${posNounListHtml}</div>
      </div>
      <p style="font-size:11px;color:#999;font-style:italic;padding:8px 10px 0;">
        這套骨架（開場→表態→論點一→論點二→反方→擔憂→建議→總結→提問）可直接套用在其他 Forumsbeitrag 題目，只需替換主題相關詞彙。
      </p>
    </div>

    <div style="margin:28px 0 10px; font-size:14px; font-weight:600; color:#1a3a6b; padding-bottom:6px; border-bottom:2px solid #d0ddf0;">
      範例文章 Beispieltexte（4 篇精選）
    </div>
    ${examplesHtml}
  `;
}

render();
renderAufbau();
renderSkeleton();
</script>
