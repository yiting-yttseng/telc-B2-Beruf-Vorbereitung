<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verben, Nomen und Adjektive mit Präposition</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }

.top-bar { background: #2E4057; padding: 14px 20px 10px; }
.top-bar h1 { color: #fff; font-size: 17px; font-weight: 600; margin-bottom: 3px; }
.top-bar .sub { color: #a8c8f0; font-size: 11px; }

.page { max-width: 1400px; margin: 0 auto; padding: 20px; }

.toolbar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 16px; background: #fff; border: 0.5px solid #ddd;
  border-radius: 10px; padding: 10px 14px;
}
.filter-btn { padding: 5px 14px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #333; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.stats { font-size: 12px; color: #888; margin-left: 4px; }
.speaking-badge { display: none; align-items: center; gap: 5px; font-size: 11px; color: #666; padding: 3px 10px; border: 0.5px solid #ddd; border-radius: 20px; background: #fafaf8; }
.speaking-badge.active { display: flex; }
.speaking-dot { width: 7px; height: 7px; border-radius: 50%; background: #4a9eff; animation: pulse 0.9s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.section-block { margin-bottom: 24px; }
.section-title { font-size: 12px; font-weight: 700; color: #2E4057; letter-spacing: 0.05em; text-transform: uppercase; padding: 9px 12px 7px; background: #d8e4f0; border: 0.5px solid #b0c8e0; border-bottom: none; border-radius: 6px 6px 0 0; }

table { width: 100%; border-collapse: collapse; background: #fff; border: 0.5px solid #ddd; border-radius: 0 0 8px 8px; overflow: hidden; table-layout: fixed; }
th { text-align: left; padding: 7px 10px; background: #fafaf8; color: #777; font-weight: 500; font-size: 11px; border-bottom: 0.5px solid #e0e0e0; letter-spacing: 0.03em; }
td { padding: 7px 10px; border-bottom: 0.5px solid #efefed; vertical-align: top; }
tr:last-child td { border-bottom: none; }

tr.review td     { background: #fff6f6; }
tr.key td        { background: #fffaf0; }
tr.review.key td { background: #fff2f8; }

td.mark-review { width: 36px; text-align: center; cursor: pointer; user-select: none; }
td.mark-key    { width: 36px; text-align: center; cursor: pointer; user-select: none; }
td.mark-review:hover { background: #ffe8e8 !important; }
td.mark-key:hover    { background: #fff0d0 !important; }
td.mark-review:hover .mark-box { border-color: #e24b4a; }
td.mark-key:hover    .mark-box { border-color: #d08010; }
.mark-box { display: inline-block; width: 11px; height: 11px; border: 1.5px solid #ccc; border-radius: 2px; margin-top: 3px; transition: all 0.15s; }
tr.review td.mark-review .mark-box { background: #e24b4a; border-color: #e24b4a; }
tr.key    td.mark-key    .mark-box { background: #d08010; border-color: #d08010; }

td.speak-v   { cursor: pointer; }
td.speak-n   { cursor: pointer; }
td.speak-adj { cursor: pointer; }
td.speak-v:hover   { background: #e8f0fe; }
td.speak-n:hover   { background: #e8f5ee; }
td.speak-adj:hover { background: #fdf8e1; }
tr.review td.speak-v:hover, tr.review td.speak-n:hover, tr.review td.speak-adj:hover { background: #ffe0e0; }
tr.key    td.speak-v:hover, tr.key    td.speak-n:hover, tr.key    td.speak-adj:hover { background: #fff0d0; }

.col-rev  { width: 36px; }
.col-key  { width: 36px; }
.col-v    { width: 11%; }
.col-n    { width: 13%; }
.col-adj  { width: 10%; }
.col-praep{ width: 9%; }
.col-trans{ width: 13%; }

.word-v   { font-weight: 700; font-size: 13px; color: #1a5fc8; display: block; }
.word-n   { font-weight: 700; font-size: 13px; color: #1a7840; display: block; }
.word-adj { font-weight: 700; font-size: 13px; color: #7d6000; display: block; }
.word-empty { color: #ccc; font-size: 12px; display: block; }
.word-praep { font-size: 12px; color: #6c3483; display: block; line-height: 1.8; }

.trans-zh   { font-size: 12px; color: #222; display: block; line-height: 1.5; }
.trans-note { font-size: 10px; color: #aaa; display: block; font-style: italic; }
.trans-en   { font-size: 11px; color: #999; font-style: italic; display: block; line-height: 1.5; }

.ex-group { margin-bottom: 4px; }
.ex-group:last-child { margin-bottom: 0; }
.ex-praep-label { font-size: 10px; font-weight: 600; color: #aaa; letter-spacing: 0.04em; padding: 3px 0 1px; display: block; }
.ex-item { cursor: pointer; padding: 3px 6px; border-radius: 0 3px 3px 0; margin-bottom: 3px; transition: background 0.1s; }
.ex-item:last-child { margin-bottom: 0; }
.ex-item.V   { border-left: 2px solid #aed6f1; }
.ex-item.N   { border-left: 2px solid #a9dfbf; }
.ex-item.Adj { border-left: 2px solid #f9e79f; }
.ex-item.V:hover   { background: #e8f0fe; }
.ex-item.N:hover   { background: #e8f5ee; }
.ex-item.Adj:hover { background: #fdf8e1; }
tr.review .ex-item:hover { background: #ffe0e0; }
tr.key    .ex-item:hover { background: #fff0d0; }
.ex-type { font-size: 10px; font-weight: 700; margin-right: 3px; }
.ex-type.V   { color: #1a5fc8; }
.ex-type.N   { color: #1a7840; }
.ex-type.Adj { color: #7d6000; }
.ex-de { font-size: 12px; color: #222; line-height: 1.55; display: inline; }
.ex-zh { font-size: 11px; color: #999; font-style: italic; display: block; padding-left: 2px; margin-top: 1px; }

.empty { text-align: center; padding: 40px; color: #aaa; font-size: 13px; background: #fff; border: 0.5px solid #ddd; border-radius: 8px; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Verben, Nomen und Adjektive mit Präposition</h1>
  <div class="sub">Klett Aspekte Beruf · S. 343–345 &nbsp;｜&nbsp; 🔊 點德文欄位或例句朗讀 &nbsp;｜&nbsp; 點「待複習」或「重點」欄標記</div>
</div>

<div class="page">
  <div class="toolbar">
    <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>

  <div id="mainContent"></div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const VOCAB = [
// ═══════════════════ S. 343 ═══════════════════
{ id:1, v:"abhängen", n:"die Abhängigkeit", adj:"abhängig", praep:["von + D"],

{ id:17, v:"", n:"die Anwesenheit", adj:"anwesend", praep:["bei + D"],

{ id:18, v:"arbeiten", n:"die Arbeit", adj:"", praep:["an + D","bei + D"],

// ── STATE ─────────────────────────────────────────────────────────────────────
const state = { review: new Set(), key: new Set(), filter: 'all' };

// ── TTS ───────────────────────────────────────────────────────────────────────
function speak(text) {
  if (!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.92;
  const badge = document.getElementById('speakingBadge');
  badge.classList.add('active');
  u.onend = u.onerror = () => badge.classList.remove('active');
  window.speechSynthesis.speak(u);
}

function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── RENDER ────────────────────────────────────────────────────────────────────
function buildTransCell(entry) {
  const t = entry.trans;
  if (typeof t.zh === 'object') {
    return entry.praep.map(p =>
      `<span class="trans-note">[${p}]</span><span class="trans-zh">${t.zh[p]||''}</span>`
    ).join('') + `<span class="trans-en">${t.en}</span>`;
  }
  return `<span class="trans-zh">${t.zh}</span><span class="trans-en">${t.en}</span>`;
}

function buildExCell(entry) {
  const mkItem = e =>
    `<div class="ex-item ${e.type}" onclick="speak('${esc(e.de)}')">
      <span class="ex-type ${e.type}">[${e.type}]</span><span class="ex-de">${e.de}</span>
      <span class="ex-zh">${e.zh}</span>
    </div>`;
  if (entry.praep.length === 1) return entry.ex.map(mkItem).join('');
  const groups = {};
  entry.praep.forEach(p => { groups[p] = []; });
  entry.ex.forEach(e => { if (groups[e.praep]) groups[e.praep].push(e); });
  return entry.praep.map(p =>
    `<div class="ex-group"><span class="ex-praep-label">${p}</span>${groups[p].map(mkItem).join('')}</div>`
  ).join('');
}

function buildRow(entry) {
  const isRev = state.review.has(entry.id);
  const isKey = state.key.has(entry.id);
  const cls = [isRev?'review':'', isKey?'key':''].filter(Boolean).join(' ');
  const praepHtml = entry.praep.map(p => `<span class="word-praep">${p}</span>`).join('');
  return `<tr class="${cls}">
    <td class="mark-review col-rev" onclick="toggleMark(${entry.id},'review')"><span class="mark-box"></span></td>
    <td class="mark-key col-key" onclick="toggleMark(${entry.id},'key')"><span class="mark-box"></span></td>
    <td class="speak-v col-v" ${entry.v?`onclick="speak('${esc(entry.v)}')"`:''}>
      ${entry.v?`<span class="word-v">${entry.v}</span>`:'<span class="word-empty">—</span>'}
    </td>
    <td class="speak-n col-n" ${entry.n?`onclick="speak('${esc(entry.n)}')"`:''}>
      ${entry.n?`<span class="word-n">${entry.n}</span>`:'<span class="word-empty">—</span>'}
    </td>
    <td class="speak-adj col-adj" ${entry.adj?`onclick="speak('${esc(entry.adj)}')"`:''}>
      ${entry.adj?`<span class="word-adj">${entry.adj}</span>`:'<span class="word-empty">—</span>'}
    </td>
    <td class="col-praep">${praepHtml}</td>
    <td class="col-trans">${buildTransCell(entry)}</td>
    <td>${buildExCell(entry)}</td>
  </tr>`;
}

// ── SECTION DIVIDERS ──────────────────────────────────────────────────────────
const PAGE_STARTS = { 58: 'S. 344', 110: 'S. 345' };

function render() {
  let list = VOCAB;
  if (state.filter === 'review') list = VOCAB.filter(v => state.review.has(v.id));
  else if (state.filter === 'key') list = VOCAB.filter(v => state.key.has(v.id));

  document.getElementById('stats').textContent =
    `共 ${VOCAB.length} 筆　待複習 ${state.review.size}　重點 ${state.key.size}`;

  if (!list.length) {
    document.getElementById('mainContent').innerHTML = '<div class="empty">沒有符合條件的詞彙</div>';
    return;
  }

  const thead = `<thead><tr>
    <th class="col-rev">待複習</th><th class="col-key">重點</th>
    <th class="col-v">Verb</th><th class="col-n">Nomen</th>
    <th class="col-adj">Adjektiv</th><th class="col-praep">Präp + Kasus</th>
    <th class="col-trans">中文 / English</th><th>例句</th>
  </tr></thead>`;

  // Group into sections by page
  let html = '';
  let currentPage = 'S. 343';
  let rows = '';

  function closeSection() {
    if (rows) {
      html += `<div class="section-block">
        <div class="section-title">${currentPage}</div>
        <table>${thead}<tbody>${rows}</tbody></table>
      </div>`;
      rows = '';
    }
  }

  list.forEach(entry => {
    if (PAGE_STARTS[entry.id]) {
      closeSection();
      currentPage = PAGE_STARTS[entry.id];
    }
    rows += buildRow(entry);
  });
  closeSection();

  document.getElementById('mainContent').innerHTML = html;
}

function toggleMark(id, type) {
  const s = state[type];
  if (s.has(id)) s.delete(id); else s.add(id);
  render();
}

function setFilter(f, btn) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

render();
</script>
