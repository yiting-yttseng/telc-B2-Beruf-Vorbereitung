<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作形容詞 / 名詞 Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }

/* ── Header ── */
.top-bar { background: #2E4057; padding: 14px 20px 10px; }
.top-bar h1 { color: #fff; font-size: 17px; font-weight: 600; margin-bottom: 3px; }
.top-bar .sub { color: #a8c8f0; font-size: 11px; }

.page { max-width: 1300px; margin: 0 auto; padding: 20px; }

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
  background: #fff; border: 0.5px solid #ddd; border-radius: 10px;
  padding: 10px 14px;
}
.toolbar-left { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 14px; border-radius: 6px;
  border: 0.5px solid #ccc; background: #fff;
  color: #333; font-size: 13px; cursor: pointer; transition: all 0.15s;
}
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.stats { font-size: 12px; color: #888; margin-left: 4px; }
.speaking-badge {
  display: none; align-items: center; gap: 5px;
  font-size: 11px; color: #666; padding: 3px 10px;
  border: 0.5px solid #ddd; border-radius: 20px; background: #fafaf8;
}
.speaking-badge.active { display: flex; }
.speaking-dot { width: 7px; height: 7px; border-radius: 50%; background: #4a9eff; animation: pulse 0.9s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.export-btn { padding: 5px 14px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #333; font-size: 13px; cursor: pointer; }
.export-btn:disabled { opacity: 0.35; cursor: default; }

/* ── Letter nav ── */
.letter-nav { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
.letter-btn { padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: 600; border: 0.5px solid #ccc; background: #fff; color: #333; cursor: pointer; transition: all 0.12s; }
.letter-btn:hover { background: #2E4057; color: #fff; border-color: #2E4057; }
.letter-btn.has-unfamiliar { border-color: #e24b4a; color: #e24b4a; }

/* ── Section ── */
.section-block { margin-bottom: 24px; }
.section-title {
  font-size: 12px; font-weight: 700; color: #2E4057; letter-spacing: 0.05em;
  text-transform: uppercase; padding: 9px 12px 7px;
  background: #d8e4f0; border: 0.5px solid #b0c8e0; border-bottom: none;
  border-radius: 6px 6px 0 0;
}
.letter-header {
  font-size: 11px; font-weight: 600; color: #555; padding: 6px 10px 5px;
  letter-spacing: 0.06em; background: #efefed;
  border: 0.5px solid #ddd; border-top: none; border-bottom: none;
}
.letter-header:first-of-type { border-top: 0.5px solid #ddd; }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; background: #fff; border: 0.5px solid #ddd; table-layout: fixed; }
.section-block > div:last-child table { border-radius: 0 0 8px 8px; overflow: hidden; }
th { text-align: left; padding: 7px 10px; background: #fafaf8; color: #777; font-weight: 500; font-size: 11px; border-bottom: 0.5px solid #e0e0e0; letter-spacing: 0.03em; }
td { padding: 7px 10px; border-bottom: 0.5px solid #efefed; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr.unfamiliar td { background: #fff6f6; }

/* Dot */
.dot-cell { width: 28px; cursor: pointer; user-select: none; }
.dot-cell:hover .dot { border-color: #e24b4a; }
.dot { display: block; width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #ccc; margin-top: 3px; transition: all 0.15s; }
tr.unfamiliar .dot { background: #e24b4a; border-color: #e24b4a; }

/* Speak cells */
td.speak, div.speak { cursor: pointer; }
td.speak:hover, div.speak:hover { background: #f0f6ff; }
tr.unfamiliar td.speak:hover, tr.unfamiliar div.speak:hover { background: #ffe0e0; }

/* ── Column widths — SECTION 1 (has adj + noun columns) ── */
.tbl-main .col-dot  { width: 28px; }
.tbl-main .col-adj  { width: 14%; }
.tbl-main .col-noun { width: 16%; }
.tbl-main .col-enzh { width: 20%; }
.tbl-main .col-ex   { width: 50%; }

/* ── Column widths — SECTION 2 (adj only, no noun col) ── */
.tbl-work .col-dot  { width: 28px; }
.tbl-work .col-adj  { width: 16%; }
.tbl-work .col-enzh { width: 22%; }
.tbl-work .col-ex   { width: 62%; }

/* Cell typography */
.word-adj  { font-weight: 700; font-size: 13px; color: #1a5fc8; display: block; }
.word-noun { font-weight: 700; font-size: 13px; color: #1a5fc8; display: block; }
.word-noun.empty { color: #bbb; font-weight: normal; font-size: 12px; }
.word-en   { font-size: 12px; color: #222; display: block; line-height: 1.5; }
.word-zh   { font-size: 11px; color: #999; font-style: italic; display: block; line-height: 1.5; }
.satz-de   { font-size: 12px; color: #222; line-height: 1.6; display: block; }
.satz-zh   { font-size: 11px; color: #999; font-style: italic; display: block; line-height: 1.5; margin-top: 2px; }
.satz-divider { border: none; border-top: 0.5px dashed #e0e0e0; margin: 5px 0; }
.satz-tag  { font-size: 10px; color: #aaa; font-style: italic; display: inline; margin-right: 4px; }

/* ── Kurztext / example texts ── */
.kurztext { margin: 10px 0 20px; background: #fff; border-left: 3px solid #2E4057; border-radius: 0 8px 8px 0; box-shadow: 0 1px 4px rgba(0,0,0,.04); overflow: hidden; }
.kurztext-header { font-size: 11px; font-weight: 600; color: #2E4057; padding: 7px 12px 5px; background: #f0f4f8; border-bottom: 0.5px solid #d0dde8; letter-spacing: 0.04em; }
.kurztext-body { padding: 8px 12px 10px; }
.kurztext-section { font-size: 11px; font-weight: 700; color: #2E4057; padding: 8px 0 3px; text-transform: uppercase; letter-spacing: 0.05em; }
.kurztext-section:first-child { padding-top: 2px; }
.kurztext-sent { display: flex; flex-direction: column; padding: 4px 0; border-bottom: 0.5px solid #f0f0ee; }
.kurztext-sent:last-child { border-bottom: none; }
.sent-de { font-size: 12.5px; color: #222; line-height: 1.55; cursor: pointer; border-radius: 4px; padding: 2px 4px; transition: background 0.12s; display: block; }
.sent-de:hover { background: #e8f0fe; }
.sent-zh { font-size: 11px; color: #999; font-style: italic; padding: 1px 4px 2px; display: block; }

/* ── Empty ── */
.empty { text-align: center; padding: 40px; color: #aaa; font-size: 13px; background: #fff; border: 0.5px solid #ddd; border-radius: 8px; }

/* ── Export panel ── */
.export-panel { display: none; margin-top: 24px; background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 20px; }
.export-panel.visible { display: block; }
.export-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.export-top h2 { font-size: 15px; font-weight: 500; }
.export-actions { display: flex; gap: 8px; }
.print-btn { padding: 5px 14px; border-radius: 6px; border: 0.5px solid #ccc; background: #1a1a1a; color: #fff; font-size: 12px; cursor: pointer; }
.close-export { padding: 5px 12px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #555; font-size: 12px; cursor: pointer; }

@media print {
  @page { size: A4 portrait; margin: 12mm 10mm; }
  body * { visibility: hidden; }
  #exportPanel, #exportPanel * { visibility: visible; }
  #exportPanel { position: absolute; top: 0; left: 0; width: 100%; border: none !important; padding: 0 !important; margin: 0 !important; }
  .export-top { display: none !important; }
  table { width: 100% !important; table-layout: fixed !important; font-size: 9pt !important; border-collapse: collapse !important; }
  td, th { padding: 4px 6px !important; border: 0.5px solid #ddd !important; }
  tr { page-break-inside: avoid; }
  .word-adj { font-size: 9pt; font-weight: bold; color: #1a5fc8; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .word-noun { font-size: 9pt; font-weight: bold; color: #1a5fc8; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .word-en, .satz-de { font-size: 8pt; }
  .word-zh, .satz-zh { font-size: 7pt; color: #888; font-style: italic; }
  td { background: #fff !important; }
  tr.unfamiliar td { background: #fff0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  th { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .section-title, .letter-header { background: #e8e8e6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>⚙️ 工作形容詞 / 名詞 Tracker</h1>
  <div class="sub">⭕ 點圓圈標記不熟悉 &nbsp;🔊 點德文欄位或例句朗讀 &nbsp;📝 點短文句子可朗讀</div>
</div>

<div class="page">
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('unfamiliar',this)">不熟悉</button>
      <button class="filter-btn" onclick="setFilter('familiar',this)">已掌握</button>
      <span class="stats" id="stats"></span>
      <span class="speaking-badge" id="speakingBadge"><span class="speaking-dot"></span>朗讀中…</span>
    </div>
    <button class="export-btn" id="exportBtn" onclick="toggleExport()" disabled>📋 匯出不熟悉</button>
  </div>

  <div class="letter-nav" id="letterNav"></div>
  <div id="mainContent"></div>

  <div class="export-panel" id="exportPanel">
    <div class="export-top">
      <h2>📋 不熟悉單字清單</h2>
      <div class="export-actions">
        <span id="exportCount" style="font-size:12px;color:#888;background:#f5f5f3;padding:3px 10px;border-radius:20px;"></span>
        <button class="print-btn" onclick="window.print()">列印 / 存PDF</button>
        <button class="close-export" onclick="toggleExport()">關閉</button>
      </div>
    </div>
    <div id="exportContent"></div>
  </div>
</div>

  try { const s = localStorage.getItem(STORE_KEY); return s ? new Set(JSON.parse(s)) : new Set(); }
  catch(e) { return new Set(); }
}
function saveUnfamiliar(set) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify([...set])); } catch(e) {}
}

// ── Sections config ──────────────────────────────────────
const SECTIONS = [
  { id: 'main', label: 'Soft Skills / Charaktereigenschaften', vocab: VOCAB1, type: 'main', textIndex: 0 },
  { id: 'work', label: 'Arbeitsbeschreibung – Tätigkeit & Aufgaben', vocab: VOCAB2, type: 'work', textIndex: 1 },
];

function allVocab() {
  return SECTIONS.flatMap((sec, si) =>
    sec.vocab.map((v, vi) => ({ v, key: `${si}_${vi}`, si, vi, type: sec.type }))
  );
}

// ── Speech ────────────────────────────────────────────────
function speakText(text) {
  if (!text || !text.trim()) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE'; u.rate = 0.92;
  const badge = document.getElementById('speakingBadge');
  badge.classList.add('active');
  u.onend = u.onerror = () => badge.classList.remove('active');
  window.speechSynthesis.speak(u);
}

// ── Filter ────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Toggle unfamiliar ─────────────────────────────────────
function toggleMark(key) {
  if (unfamiliar.has(key)) unfamiliar.delete(key); else unfamiliar.add(key);
  saveUnfamiliar(unfamiliar);
  render(); renderLetterNav();
}

// ── Letter nav ────────────────────────────────────────────
function letterOf(v) {
  const c = (v[0] || '').toUpperCase()[0] || '';
  if (c === 'Ä') return 'A'; if (c === 'Ö') return 'O'; if (c === 'Ü') return 'U';
  return c;
}

function renderLetterNav() {
  const letters = {};
  allVocab().forEach(({v, key}) => {
    const l = letterOf(v);
    if (!letters[l]) letters[l] = false;
    if (unfamiliar.has(key)) letters[l] = true;
  });
  document.getElementById('letterNav').innerHTML = Object.keys(letters).sort().map(l =>
    `<button class="letter-btn ${letters[l] ? 'has-unfamiliar' : ''}" onclick="scrollToLetter('${l}')">${l}</button>`
  ).join('');
}

function scrollToLetter(l) {
  const el = document.getElementById('letter-' + l);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Build rows ────────────────────────────────────────────
function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function buildRowMain(entry, compact) {
  const { v, key } = entry;
  const [adj, noun, en, zh, ex_adj_de, ex_adj_zh, ex_noun_de, ex_noun_zh] = v;
  const isUnf = unfamiliar.has(key);
  const dotCell = compact ? '' :
    `<td class="dot-cell" onclick="toggleMark('${key}')"><span class="dot"></span></td>`;
  return `<tr class="${isUnf ? 'unfamiliar' : ''}">
    ${dotCell}
    <td class="speak" onclick="speakText('${esc(adj || noun)}')" title="🔊">
      <span class="word-adj">${adj || '—'}</span>
    </td>
    <td class="speak" onclick="speakText('${esc(noun)}')" title="${noun ? '🔊' : ''}">
      <span class="word-noun${noun ? '' : ' empty'}">${noun || '—'}</span>
    </td>
    <td>
      <span class="word-en">${en}</span>
      <span class="word-zh">${zh}</span>
    </td>
    <td style="padding:0;">
      <div class="speak" onclick="speakText('${esc(ex_adj_de)}')" style="padding:7px 10px 5px;">
        <span class="satz-tag">Adj.</span><span class="satz-de">${ex_adj_de}</span>
        <span class="satz-zh">${ex_adj_zh}</span>
      </div>
      <hr class="satz-divider" style="margin:0;">
      <div class="speak" onclick="speakText('${esc(ex_noun_de)}')" style="padding:5px 10px 7px;">
        <span class="satz-tag">Nomen</span><span class="satz-de">${ex_noun_de}</span>
        <span class="satz-zh">${ex_noun_zh}</span>
      </div>
    </td>
  </tr>`;
}

function buildRowWork(entry, compact) {
  const { v, key } = entry;
  const [adj, en, zh, ex_de, ex_zh] = v;
  const isUnf = unfamiliar.has(key);
  const dotCell = compact ? '' :
    `<td class="dot-cell" onclick="toggleMark('${key}')"><span class="dot"></span></td>`;
  return `<tr class="${isUnf ? 'unfamiliar' : ''}">
    ${dotCell}
    <td class="speak" onclick="speakText('${esc(adj)}')" title="🔊">
      <span class="word-adj">${adj}</span>
    </td>
    <td>
      <span class="word-en">${en}</span>
      <span class="word-zh">${zh}</span>
    </td>
    <td class="speak" onclick="speakText('${esc(ex_de)}')" title="🔊">
      <span class="satz-de">${ex_de}</span>
      <span class="satz-zh">${ex_zh}</span>
    </td>
  </tr>`;
}

function buildTable(entries, compact, type) {
  const dotTh = compact ? '' : '<th class="col-dot"></th>';
  if (type === 'main') {
    return `<table class="tbl-main"><thead><tr>${dotTh}
      <th class="col-adj">德文（形容詞）</th>
      <th class="col-noun">德文（名詞）</th>
      <th class="col-enzh">英文 / 中文</th>
      <th class="col-ex">造句</th>
    </tr></thead><tbody>${entries.map(e => buildRowMain(e, compact)).join('')}</tbody></table>`;
  } else {
    return `<table class="tbl-work"><thead><tr>${dotTh}
      <th class="col-adj">德文（形容詞）</th>
      <th class="col-enzh">英文 / 中文</th>
      <th class="col-ex">造句</th>
    </tr></thead><tbody>${entries.map(e => buildRowWork(e, compact)).join('')}</tbody></table>`;
  }
}

// ── Group by letter ───────────────────────────────────────
function groupByLetter(entries) {
  const out = {};
  entries.forEach(e => {
    const l = letterOf(e.v);
    if (!out[l]) out[l] = [];
    out[l].push(e);
  });
  return out;
}

// ── Render ────────────────────────────────────────────────
function render() {
  const allEntries = allVocab();
  const filtered = allEntries.filter(({key}) => {
    if (currentFilter === 'unfamiliar') return unfamiliar.has(key);
    if (currentFilter === 'familiar')   return !unfamiliar.has(key);
    return true;
  });

  document.getElementById('stats').textContent = `不熟悉 ${unfamiliar.size} / ${allEntries.length} 個`;
  document.getElementById('exportBtn').disabled = unfamiliar.size === 0;

  if (!filtered.length) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">沒有符合條件的單字</div>`;
    return;
  }

  let html = '';
  SECTIONS.forEach((sec, si) => {
    const secEntries = filtered.filter(e => e.si === si);
    if (!secEntries.length) return;
    const byLetter = groupByLetter(secEntries);
    let inner = '';
    Object.keys(byLetter).sort().forEach(l => {
      inner += `<div id="letter-${l}" style="scroll-margin-top:60px;">
        <div class="letter-header">${l}</div>
        ${buildTable(byLetter[l], false, sec.type)}
      </div>`;
    });
    html += `<div class="section-block">
      <div class="section-title">${sec.label}</div>
      ${inner}
    </div>`;
    // Attach kurztext directly below this section (only when showing all)
    if (currentFilter === 'all' && sec.textIndex !== undefined) {
      html += buildKurztext(sec.textIndex);
    }
  });

  document.getElementById('mainContent').innerHTML = html;
}

// ── Kurztext (by index) ───────────────────────────────────
function buildKurztext(i) {
  const t = TEXTS[i];
  if (!t) return '';
  const rows = t.sentences.map(([de, zh]) =>
    `<div class="kurztext-sent">
      <span class="sent-de" onclick="speakText('${esc(de)}')" title="🔊 點擊朗讀">${de}</span>
      <span class="sent-zh">${zh}</span>
    </div>`
  ).join('');
  return `<div class="kurztext">
    <div class="kurztext-header">📝 ${t.title} <span style="font-weight:400;opacity:.7;">${t.subtitle}</span> — 點擊句子朗讀</div>
    <div class="kurztext-body">${rows}</div>
  </div>`;
}

// ── Export ────────────────────────────────────────────────
function toggleExport() {
  const p = document.getElementById('exportPanel');
  p.classList.toggle('visible');
  if (p.classList.contains('visible')) renderExport();
}

function renderExport() {
  const words = allVocab().filter(({key}) => unfamiliar.has(key));
  document.getElementById('exportCount').textContent = `共 ${words.length} 個單字`;
  if (!words.length) {
    document.getElementById('exportContent').innerHTML = '<p style="color:#aaa;font-size:13px;padding:12px 0;">尚未標記任何不熟悉的單字。</p>';
    return;
  }
  let html = '';
  SECTIONS.forEach((sec, si) => {
    const sw = words.filter(e => e.si === si);
    if (!sw.length) return;
    html += `<div class="section-block">
      <div class="section-title">${sec.label}</div>
      ${buildTable(sw, true, sec.type)}
    </div>`;
  });
  document.getElementById('exportContent').innerHTML = html;
}

// ── Init ──────────────────────────────────────────────────
renderLetterNav();
render();
</script>
