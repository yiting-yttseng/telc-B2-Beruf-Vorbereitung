<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作形容詞 / 名詞 Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }

/* ── Header ── */
.top-bar { background: #2E4057; padding: 14px 20px 10px; }
.top-bar h1 { color: #fff; font-size: 17px; font-weight: 600; margin-bottom: 3px; }
.top-bar .sub { color: #a8c8f0; font-size: 11px; }

.page { max-width: 1300px; margin: 0 auto; padding: 16px 20px 20px; }

/* ── Tabs ── */
.tab-bar {
  display: flex; gap: 0; margin-bottom: 16px;
  border-bottom: 2px solid #2E4057;
}
.tab-btn {
  padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
  border: none; background: transparent; color: #888;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all 0.15s; letter-spacing: 0.02em;
}
.tab-btn:hover { color: #2E4057; }
.tab-btn.active { color: #2E4057; border-bottom-color: #2E4057; }
.tab-btn.has-unfamiliar::after {
  content: ''; display: inline-block; width: 6px; height: 6px;
  background: #e24b4a; border-radius: 50%; margin-left: 5px; vertical-align: middle;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
  background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 10px 14px;
}
.toolbar-left { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 14px; border-radius: 6px; border: 0.5px solid #ccc;
  background: #fff; color: #333; font-size: 13px; cursor: pointer; transition: all 0.15s;
}
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.stats { font-size: 12px; color: #888; margin-left: 4px; }
.speaking-badge {
  display: none; align-items: center; gap: 5px; font-size: 11px; color: #666;
  padding: 3px 10px; border: 0.5px solid #ddd; border-radius: 20px; background: #fafaf8;
}
.speaking-badge.active { display: flex; }
.speaking-dot { width: 7px; height: 7px; border-radius: 50%; background: #4a9eff; animation: pulse 0.9s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.export-btn { padding: 5px 14px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #333; font-size: 13px; cursor: pointer; }
.export-btn:disabled { opacity: 0.35; cursor: default; }

/* ── Letter nav ── */
.letter-nav { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
.letter-btn { padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: 600; border: 0.5px solid #ccc; background: #fff; color: #333; cursor: pointer; transition: all 0.12s; }
.letter-btn:hover { background: #2E4057; color: #fff; border-color: #2E4057; }
.letter-btn.has-unfamiliar { border-color: #e24b4a; color: #e24b4a; }

/* ── Section / letter headers ── */
.section-block { margin-bottom: 24px; }
.section-title {
  font-size: 12px; font-weight: 700; color: #2E4057; letter-spacing: 0.05em;
  text-transform: uppercase; padding: 9px 12px 7px;
  background: #d8e4f0; border: 0.5px solid #b0c8e0; border-bottom: none;
  border-radius: 6px 6px 0 0;
}
/* Emotion group header — coloured per group */
.section-title.emo-0 { background: #fde8a0; border-color: #f0c840; color: #7a5800; }
.section-title.emo-1 { background: #fdd5cc; border-color: #f09080; color: #8b1a00; }
.section-title.emo-2 { background: #d6f0e0; border-color: #80c8a0; color: #1a5c30; }
.section-title.emo-3 { background: #d8e8ff; border-color: #80aaf0; color: #1a2e80; }
.section-title.emo-4 { background: #e8d8f8; border-color: #b090e0; color: #3a1060; }
.section-title.emo-5 { background: #f0e8d8; border-color: #c8a870; color: #5c3800; }
.letter-header {
  font-size: 11px; font-weight: 600; color: #555; padding: 6px 10px 5px;
  letter-spacing: 0.06em; background: #efefed;
  border: 0.5px solid #ddd; border-top: none; border-bottom: none;
}

/* ── Table ── */
table { width: 100%; border-collapse: collapse; background: #fff; border: 0.5px solid #ddd; table-layout: fixed; }
.section-block > div:last-child table,
.section-block > table { border-radius: 0 0 8px 8px; overflow: hidden; }
th { text-align: left; padding: 7px 10px; background: #fafaf8; color: #777; font-weight: 500; font-size: 11px; border-bottom: 0.5px solid #e0e0e0; letter-spacing: 0.03em; }
td { padding: 7px 10px; border-bottom: 0.5px solid #efefed; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr.unfamiliar td { background: #fff6f6; }

/* Dot */
.dot-cell { width: 28px; cursor: pointer; user-select: none; }
.dot-cell:hover .dot { border-color: #e24b4a; }
.dot { display: block; width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid #ccc; margin-top: 3px; transition: all 0.15s; }
tr.unfamiliar .dot { background: #e24b4a; border-color: #e24b4a; }

/* Speak cells */
td.speak, div.speak { cursor: pointer; }
td.speak:hover, div.speak:hover { background: #f0f6ff; }
tr.unfamiliar td.speak:hover, tr.unfamiliar div.speak:hover { background: #ffe0e0; }
/* English speak cell — subtle green tint on hover */
td.speak-en:hover { background: #f0faf4; }
tr.unfamiliar td.speak-en:hover { background: #fff0e8; }

/* ── Column widths ── */
.tbl-main .col-dot  { width: 28px; }
.tbl-main .col-adj  { width: 13%; }
.tbl-main .col-noun { width: 15%; }
.tbl-main .col-enzh { width: 18%; }
.tbl-main .col-ex   { width: 54%; }

.tbl-work .col-dot  { width: 28px; }
.tbl-work .col-adj  { width: 16%; }
.tbl-work .col-enzh { width: 22%; }
.tbl-work .col-ex   { width: 62%; }

.tbl-emo .col-dot  { width: 28px; }
.tbl-emo .col-adj  { width: 14%; }
.tbl-emo .col-noun { width: 16%; }
.tbl-emo .col-enzh { width: 20%; }
.tbl-emo .col-ex   { width: 50%; }

/* ── Cell typography ── */
.word-adj  { font-weight: 700; font-size: 13px; color: #1a5fc8; display: block; }
.word-noun { font-weight: 700; font-size: 13px; color: #1a5fc8; display: block; }
.word-noun.empty { color: #bbb; font-weight: normal; font-size: 12px; }
.word-en   { font-size: 12px; color: #222; display: block; line-height: 1.5; }
.word-zh   { font-size: 11px; color: #999; font-style: italic; display: block; line-height: 1.5; }
.satz-de   { font-size: 12px; color: #222; line-height: 1.6; display: block; }
.satz-zh   { font-size: 11px; color: #999; font-style: italic; display: block; line-height: 1.5; margin-top: 2px; }
.satz-divider { border: none; border-top: 0.5px dashed #e0e0e0; margin: 0; }
.satz-tag  { font-size: 10px; color: #aaa; font-style: italic; display: inline; margin-right: 4px; }

/* ── Kurztext ── */
.kurztext { margin: 10px 0 20px; background: #fff; border-left: 3px solid #2E4057; border-radius: 0 8px 8px 0; box-shadow: 0 1px 4px rgba(0,0,0,.04); overflow: hidden; }
.kurztext-header { font-size: 11px; font-weight: 600; color: #2E4057; padding: 7px 12px 5px; background: #f0f4f8; border-bottom: 0.5px solid #d0dde8; letter-spacing: 0.04em; }
.kurztext-body { padding: 8px 12px 10px; }
.kurztext-sent { display: flex; flex-direction: column; padding: 4px 0; border-bottom: 0.5px solid #f0f0ee; }
.kurztext-sent:last-child { border-bottom: none; }
.sent-de { font-size: 12.5px; color: #222; line-height: 1.55; cursor: pointer; border-radius: 4px; padding: 2px 4px; transition: background 0.12s; display: block; }
.sent-de:hover { background: #e8f0fe; }
.sent-zh { font-size: 11px; color: #999; font-style: italic; padding: 1px 4px 2px; display: block; }

/* ── Empty / export ── */
.empty { text-align: center; padding: 40px; color: #aaa; font-size: 13px; background: #fff; border: 0.5px solid #ddd; border-radius: 8px; }
.export-panel { display: none; margin-top: 24px; background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 20px; }
.export-panel.visible { display: block; }
.export-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.export-top h2 { font-size: 15px; font-weight: 500; }
.export-actions { display: flex; gap: 8px; align-items: center; }
.print-btn { padding: 5px 14px; border-radius: 6px; border: 0.5px solid #ccc; background: #1a1a1a; color: #fff; font-size: 12px; cursor: pointer; }
.close-export { padding: 5px 12px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #555; font-size: 12px; cursor: pointer; }

@media print {
  @page { size: A4 landscape; margin: 10mm 8mm; }
  body * { visibility: hidden; }
  #exportPanel, #exportPanel * { visibility: visible; }
  #exportPanel { position: absolute; top: 0; left: 0; width: 100%; border: none !important; padding: 0 !important; margin: 0 !important; }
  .export-top { display: none !important; }
  table { width: 100% !important; table-layout: fixed !important; font-size: 8.5pt !important; border-collapse: collapse !important; }
  td, th { padding: 3px 5px !important; border: 0.5px solid #ddd !important; }
  tr { page-break-inside: avoid; }
  .word-adj, .word-noun { font-size: 8.5pt; font-weight: bold; color: #1a5fc8; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .word-en, .satz-de { font-size: 7.5pt; }
  .word-zh, .satz-zh { font-size: 7pt; color: #888; font-style: italic; }
  td { background: #fff !important; }
  tr.unfamiliar td { background: #fff0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  th { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .section-title { background: #e8e8e6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>

<div class="top-bar">
  <h1>📋 Adjektiv / Nomen Tracker</h1>
  <div class="sub">⭕ 點圓圈標記不熟悉 &nbsp;🔊 點德文欄位朗讀德文 &nbsp;🔊 點英文欄位朗讀英文 &nbsp;🔊 點例句上半/下半分別朗讀</div>

</div><!-- /page -->

// STORAGE
// ════════════════════════════════════════════════════════════
const STORE_KEYS = ['adj_soft_v1', 'adj_work_v1', 'adj_emo_v1'];

  try { const s = localStorage.getItem(STORE_KEYS[ti]); return s ? new Set(JSON.parse(s)) : new Set(); }
  catch(e) { return new Set(); }
}
function saveSet(ti, set) {
  try { localStorage.setItem(STORE_KEYS[ti], JSON.stringify([...set])); } catch(e) {}
}

// ════════════════════════════════════════════════════════════
// SPEECH
// ════════════════════════════════════════════════════════════
function speak(text, lang) {
  if (!text || !text.trim()) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang || 'de-DE';
  u.rate = lang === 'en-US' ? 0.9 : 0.92;
  const badge = document.getElementById('speakingBadge');
  badge.classList.add('active');
  u.onend = u.onerror = () => badge.classList.remove('active');
  window.speechSynthesis.speak(u);
}
function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ════════════════════════════════════════════════════════════
// TAB SWITCHING
// ════════════════════════════════════════════════════════════
function switchTab(ti) {
  activeTab = ti;
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', i===ti));
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===ti));
  // reset filter buttons appearance for the new tab
  document.querySelectorAll(`#tab${ti} .filter-btn`).forEach(b => b.classList.remove('active'));
  document.querySelector(`#tab${ti} .filter-btn`).classList.add('active');
  filters[ti] = 'all';
  render(ti);
  if (ti < 2) renderLetterNav(ti);
}

// ════════════════════════════════════════════════════════════
// FILTER
// ════════════════════════════════════════════════════════════
function setFilter(ti, f, btn) {
  filters[ti] = f;
  document.querySelectorAll(`#tab${ti} .filter-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(ti);
}

// ════════════════════════════════════════════════════════════
// MARK UNFAMILIAR
// ════════════════════════════════════════════════════════════
function toggleMark(ti, key) {
  if (unfamiliar[ti].has(key)) unfamiliar[ti].delete(key);
  else unfamiliar[ti].add(key);
  saveSet(ti, unfamiliar[ti]);
  render(ti);
  if (ti < 2) renderLetterNav(ti);
  updateTabDots();
}

function updateTabDots() {
  [0,1,2].forEach(ti => {
    document.getElementById('tabBtn'+ti).classList.toggle('has-unfamiliar', unfamiliar[ti].size > 0);
  });
}

// ════════════════════════════════════════════════════════════
// LETTER NAV (Tab 0 & 1 only)
// ════════════════════════════════════════════════════════════
function letterOf(word) {
  const c = (word||'').toUpperCase()[0] || '';
  if (c==='Ä') return 'A'; if (c==='Ö') return 'O'; if (c==='Ü') return 'U';
  return c;
}

function renderLetterNav(ti) {
  const vocab = ti === 0 ? VOCAB0 : VOCAB1;
  const letters = {};
  vocab.forEach((v,vi) => {
    const l = letterOf(v[0]);
    if (!letters[l]) letters[l] = false;
    if (unfamiliar[ti].has(`${ti}_${vi}`)) letters[l] = true;
  });
  document.getElementById('letterNav'+ti).innerHTML =
    Object.keys(letters).sort().map(l =>
      `<button class="letter-btn${letters[l]?' has-unfamiliar':''}" onclick="scrollToLetter('${l}')">${l}</button>`
    ).join('');
}

function scrollToLetter(l) {
  const el = document.getElementById('letter-' + l);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ════════════════════════════════════════════════════════════
// BUILD ROWS
// ════════════════════════════════════════════════════════════

// Tab 0 & emotion rows (8-field with adj+noun)
function buildRowMain(ti, v, key) {
  const [adj, noun, en, zh, ex_adj_de, ex_adj_zh, ex_noun_de, ex_noun_zh] = v;
  const isUnf = unfamiliar[ti].has(key);
  return `<tr class="${isUnf?'unfamiliar':''}">
    <td class="dot-cell" onclick="toggleMark(${ti},'${key}')"><span class="dot"></span></td>
    <td class="speak" onclick="speak('${esc(adj||noun)}','de-DE')"><span class="word-adj">${adj||'—'}</span></td>
    <td class="speak" onclick="speak('${esc(noun)}','de-DE')"><span class="word-noun${noun?'':' empty'}">${noun||'—'}</span></td>
    <td class="speak speak-en" onclick="speak('${esc(en)}','en-US')">
      <span class="word-en">${en}</span>
      <span class="word-zh">${zh}</span>
    </td>
    <td style="padding:0;">
      <div class="speak" onclick="speak('${esc(ex_adj_de)}','de-DE')" style="padding:7px 10px 5px;">
        <span class="satz-tag">Adj.</span><span class="satz-de">${ex_adj_de}</span>
        <span class="satz-zh">${ex_adj_zh}</span>
      </div>
      <hr class="satz-divider">
      <div class="speak" onclick="speak('${esc(ex_noun_de)}','de-DE')" style="padding:5px 10px 7px;">
        <span class="satz-tag">Nomen</span><span class="satz-de">${ex_noun_de}</span>
        <span class="satz-zh">${ex_noun_zh}</span>
      </div>
    </td>
  </tr>`;
}

// Tab 1 rows (5-field, adj only)
function buildRowWork(ti, v, key) {
  const [adj, en, zh, ex_de, ex_zh] = v;
  const isUnf = unfamiliar[ti].has(key);
  return `<tr class="${isUnf?'unfamiliar':''}">
    <td class="dot-cell" onclick="toggleMark(${ti},'${key}')"><span class="dot"></span></td>
    <td class="speak" onclick="speak('${esc(adj)}','de-DE')"><span class="word-adj">${adj}</span></td>
    <td class="speak speak-en" onclick="speak('${esc(en)}','en-US')">
      <span class="word-en">${en}</span>
      <span class="word-zh">${zh}</span>
    </td>
    <td class="speak" onclick="speak('${esc(ex_de)}','de-DE')">
      <span class="satz-de">${ex_de}</span>
      <span class="satz-zh">${ex_zh}</span>
    </td>
  </tr>`;
}

function buildTableMain(ti, entries, compact) {
  const dotTh = compact ? '' : '<th class="col-dot"></th>';
  const cls = ti === 0 ? 'tbl-main' : 'tbl-emo';
  const rows = entries.map(({v,key}) => compact
    ? buildRowMain(ti, v, key).replace(/<td class="dot-cell"[^<]*<\/td>/,'')
    : buildRowMain(ti, v, key)
  ).join('');
  return `<table class="${cls}"><thead><tr>${compact?'':dotTh}
    <th class="col-adj">德文（形容詞）</th>
    <th class="col-noun">德文（名詞）</th>
    <th class="col-enzh">英文 / 中文 🔊</th>
    <th class="col-ex">造句</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function buildTableWork(entries, compact) {
  const rows = entries.map(({v,key}) => compact
    ? buildRowWork(1, v, key).replace(/<td class="dot-cell"[^<]*<\/td>/,'')
    : buildRowWork(1, v, key)
  ).join('');
  return `<table class="tbl-work"><thead><tr>${compact?'':'<th class="col-dot"></th>'}
    <th class="col-adj">德文（形容詞）</th>
    <th class="col-enzh">英文 / 中文 🔊</th>
    <th class="col-ex">造句</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ════════════════════════════════════════════════════════════
// GROUP BY LETTER
// ════════════════════════════════════════════════════════════
function groupByLetter(entries) {
  const out = {};
  entries.forEach(e => {
    const l = letterOf(e.v[0]);
    if (!out[l]) out[l] = [];
    out[l].push(e);
  });
  return out;
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════
function render(ti) {
  if (ti === 0) renderTab0();
  else if (ti === 1) renderTab1();
  else renderTab2();
  updateTabDots();
}

function allEntries(ti, vocab) {
  return vocab.map((v, vi) => ({ v, key: `${ti}_${vi}` }));
}

function filterEntries(ti, entries) {
  const f = filters[ti];
  if (f === 'unfamiliar') return entries.filter(e => unfamiliar[ti].has(e.key));
  if (f === 'familiar')   return entries.filter(e => !unfamiliar[ti].has(e.key));
  return entries;
}

function renderTab0() {
  const all = allEntries(0, VOCAB0);
  const filtered = filterEntries(0, all);
  const total = all.length, unf = unfamiliar[0].size;
  document.getElementById('stats0').textContent = `不熟悉 ${unf} / ${total} 個`;
  document.getElementById('exportBtn0').disabled = unf === 0;

  if (!filtered.length) { document.getElementById('content0').innerHTML = '<div class="empty">沒有符合條件的單字</div>'; return; }

  const byLetter = groupByLetter(filtered);
  let html = '<div class="section-block">';
  Object.keys(byLetter).sort().forEach(l => {
    html += `<div id="letter-${l}" style="scroll-margin-top:60px;">
      <div class="letter-header">${l}</div>
      ${buildTableMain(0, byLetter[l], false)}
    </div>`;
  });
  html += '</div>';
  if (filters[0] === 'all') html += buildKurztext(0);
  document.getElementById('content0').innerHTML = html;
}

function renderTab1() {
  const all = allEntries(1, VOCAB1);
  const filtered = filterEntries(1, all);
  const total = all.length, unf = unfamiliar[1].size;
  document.getElementById('stats1').textContent = `不熟悉 ${unf} / ${total} 個`;
  document.getElementById('exportBtn1').disabled = unf === 0;

  if (!filtered.length) { document.getElementById('content1').innerHTML = '<div class="empty">沒有符合條件的單字</div>'; return; }

  const byLetter = groupByLetter(filtered);
  let html = '<div class="section-block">';
  Object.keys(byLetter).sort().forEach(l => {
    html += `<div id="letter-${l}" style="scroll-margin-top:60px;">
      <div class="letter-header">${l}</div>
      ${buildTableWork(byLetter[l], false)}
    </div>`;
  });
  html += '</div>';
  if (filters[1] === 'all') html += buildKurztext(1);
  document.getElementById('content1').innerHTML = html;
}

function renderTab2() {
  const f = filters[2];
  const total = EMO_GROUPS.reduce((s,g) => s + g.words.length, 0);
  const unf = unfamiliar[2].size;
  document.getElementById('stats2').textContent = `不熟悉 ${unf} / ${total} 個`;
  document.getElementById('exportBtn2').disabled = unf === 0;

  let html = '';
  EMO_GROUPS.forEach((grp, gi) => {
    const entries = allEntries(2, grp.words).map((e,wi) => ({
      ...e, key: `2_${gi}_${wi}`
    }));
    const filtered = entries.filter(e => {
      if (f === 'unfamiliar') return unfamiliar[2].has(e.key);
      if (f === 'familiar')   return !unfamiliar[2].has(e.key);
      return true;
    });
    if (!filtered.length) return;
    html += `<div class="section-block">
      <div class="section-title ${grp.colorClass}">${grp.label}</div>
      ${buildTableMain(2, filtered, false)}
    </div>`;
  });
  if (!html) html = '<div class="empty">沒有符合條件的單字</div>';
  document.getElementById('content2').innerHTML = html;
}

// ════════════════════════════════════════════════════════════
// KURZTEXT
// ════════════════════════════════════════════════════════════
function buildKurztext(i) {
  const t = TEXTS[i];
  if (!t) return '';
  const rows = t.sentences.map(([de, zh]) =>
    `<div class="kurztext-sent">
      <span class="sent-de" onclick="speak('${esc(de)}','de-DE')">${de}</span>
      <span class="sent-zh">${zh}</span>
    </div>`
  ).join('');
  return `<div class="kurztext">
    <div class="kurztext-header">📝 ${t.title} <span style="font-weight:400;opacity:.7;">${t.subtitle}</span> — 點擊句子朗讀</div>
    <div class="kurztext-body">${rows}</div>
  </div>`;
}

// ════════════════════════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════════════════════════
function toggleExport(ti) {
  const p = document.getElementById('exportPanel'+ti);
  p.classList.toggle('visible');
  if (p.classList.contains('visible')) renderExport(ti);
}

function renderExport(ti) {
  if (ti === 0) {
    const words = allEntries(0, VOCAB0).filter(e => unfamiliar[0].has(e.key));
    document.getElementById('exportCount0').textContent = `共 ${words.length} 個`;
    document.getElementById('exportContent0').innerHTML = words.length
      ? buildTableMain(0, words, true)
      : '<p style="color:#aaa;font-size:13px;">尚未標記。</p>';
  } else if (ti === 1) {
    const words = allEntries(1, VOCAB1).filter(e => unfamiliar[1].has(e.key));
    document.getElementById('exportCount1').textContent = `共 ${words.length} 個`;
    document.getElementById('exportContent1').innerHTML = words.length
      ? buildTableWork(words, true)
      : '<p style="color:#aaa;font-size:13px;">尚未標記。</p>';
  } else {
    let html = '', total = 0;
    EMO_GROUPS.forEach((grp, gi) => {
      const words = allEntries(2, grp.words)
        .map((e,wi) => ({...e, key:`2_${gi}_${wi}`}))
        .filter(e => unfamiliar[2].has(e.key));
      if (!words.length) return;
      total += words.length;
      html += `<div class="section-block">
        <div class="section-title ${grp.colorClass}">${grp.label}</div>
        ${buildTableMain(2, words, true)}
      </div>`;
    });
    document.getElementById('exportCount2').textContent = `共 ${total} 個`;
    document.getElementById('exportContent2').innerHTML = html || '<p style="color:#aaa;font-size:13px;">尚未標記。</p>';
  }
}

renderLetterNav(0);
