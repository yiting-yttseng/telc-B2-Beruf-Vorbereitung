// ── TTS ───────────────────────────────────────────────────────────────────────
let currentUtt = null;
function speak(text, id){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if(currentUtt && currentUtt._id === id){ currentUtt=null; hideBadge(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=0.9; u._id=id;
  currentUtt=u;
  showBadge(text.substring(0,20));
  u.onend=u.onerror=()=>{ currentUtt=null; hideBadge(); };
  window.speechSynthesis.speak(u);
}
function speakPara(el,text){
  document.querySelectorAll('.para-de.speaking').forEach(e=>e.classList.remove('speaking'));
  if(currentUtt&&currentUtt._el===el){window.speechSynthesis.cancel();currentUtt=null;hideBadge();return;}
  el.classList.add('speaking');
  const u=new SpeechSynthesisUtterance(text);
  u.lang='de-DE';u.rate=0.9;u._el=el;currentUtt=u;
  showBadge(text.substring(0,20));
  u.onend=u.onerror=()=>{el.classList.remove('speaking');currentUtt=null;hideBadge();};
  window.speechSynthesis.speak(u);
}
function showBadge(t){const b=document.getElementById('speakingBadge');b.classList.add('active');document.getElementById('speakLabel').textContent=t+'…';}
function hideBadge(){document.getElementById('speakingBadge').classList.remove('active');}

const RD_LS='sbt2_rd';
let rdMarked=new Set(JSON.parse(localStorage.getItem(RD_LS)||'[]'));
let rdCurrentFilter='all';

function rdSave(){localStorage.setItem(RD_LS,JSON.stringify([...rdMarked]));}
function rdToggleMark(i){if(rdMarked.has(i))rdMarked.delete(i);else rdMarked.add(i);rdSave();rdRender();}
function rdFilter(f,btn){
  rdCurrentFilter=f;
  ['rdFA','rdFM','rdFC'].forEach(id=>{const b=document.getElementById(id);if(b)b.classList.remove('active');});
  btn.classList.add('active');
  rdRender();
}
function rdClear(){if(!confirm('確定清除所有 Redemittel 標記？'))return;rdMarked.clear();rdSave();rdRender();}

const RD_VRE=/\b(stellen|einholen|aufgeben|bitten|einhalten|erfolgen|bestätigen|gewähren|anbieten|versichern|unterbreiten|verweisen|einreichen|feststellen|melden|beheben|zugeben|entschuldigen|berücksichtigen|sichern|optimieren|ansprechen|annehmen|finden|formulieren|entgegenkommen|erkundigen|garantieren|führen|verbinden|hinterlassen|ausrichten|bewerben|erfüllen|sammeln|ablegen|treffen|schreiben|halten|erstellen|fassen|diskutieren|abbauen|vereinbaren|prüfen|zurückschicken|liefern|austauschen)\b/g;
function rdHlV(t){return t.replace(RD_VRE,m=>`<span class="koll-verb">${m}</span>`);}

function rdBuildRow(v,i,compact){
  const m=rdMarked.has(i);
  const kP=rdHlV(v.k);
  const dot=compact?'':
    `<td class="dot-cell" onclick="event.stopPropagation();rdToggleMark(${i})"><span class="dot"></span></td>`;
  const sc=compact?'':'speak-td';
  return `<tr class="${m?'marked':''}">
    ${dot}
    <td class="${sc}" onclick="${compact?'':`speak(REDEMITTEL[${i}].k,'rdk${i}')`}">
      <span class="koll-main">${kP}</span><span class="koll-zh">${v.kz}</span>
    </td>
    <td><span class="en-main">${v.en}</span></td>
    <td class="${sc}" onclick="${compact?'':`speak(REDEMITTEL[${i}].ex,'rde${i}')`}">
      <span class="satz-de">${v.ex}</span><span class="satz-zh">${v.ez}</span>
    </td>
  </tr>`;
}
function rdBuildTable(items,compact){
  const dTh=compact?'':'<th class="col-dot"></th>';
  return `<table><thead><tr>${dTh}
    <th class="col-koll">搭配詞（點擊朗讀）</th>
    <th class="col-en">English</th>
    <th class="col-satz">例句＋翻譯（點擊朗讀）</th>
  </tr></thead><tbody>${items.map(([v,i])=>rdBuildRow(v,i,compact)).join('')}</tbody></table>`;
}

function rdRender(){
  const secMap={};
  REDEMITTEL.forEach((v,i)=>{if(!secMap[v.s])secMap[v.s]=[];secMap[v.s].push([v,i]);});
  let html='';
  RD_SECTIONS.forEach((sec,si)=>{
    const all=secMap[sec.title]||[];
    const list=all.filter(([v,i])=>{
      if(rdCurrentFilter==='marked')return rdMarked.has(i);
      if(rdCurrentFilter==='clear')return !rdMarked.has(i);
      return true;
    });
    const mCnt=all.filter(([v,i])=>rdMarked.has(i)).length;
    const tbl=list.length
      ?`<div class="vocab-wrap">${rdBuildTable(list,false)}</div>`
      :`<div class="vocab-wrap" style="padding:12px;text-align:center;font-size:12px;color:#aaa;background:#fff;border-radius:0 0 8px 8px">（此篩選條件下無項目）</div>`;
    html+=`<div class="section-block" id="rd-sec-${si}">
      <div class="section-title" style="background:${sec.color}">${sec.title}</div>
      <div class="vocab-toolbar"><span class="vocab-count">共 ${all.length} 個搭配詞${mCnt>0?` ‧ 已標記 ${mCnt} 個`:''}</span></div>
      ${tbl}
    </div>`;
  });
  document.getElementById('rdContent').innerHTML=html;
  const btn=document.getElementById('rdExportBtn');
  if(btn)btn.disabled=(rdMarked.size===0);
}

function rdToggleExport(){
  const p=document.getElementById('rdExportPanel');
  p.classList.toggle('visible');
  if(p.classList.contains('visible')){
    const items=REDEMITTEL.map((v,i)=>[v,i]).filter(([v,i])=>rdMarked.has(i));
    document.getElementById('rdExportCount').textContent=`共 ${items.length} 個搭配詞`;
    if(!items.length){document.getElementById('rdExportContent').innerHTML='<p style="color:#aaa;font-size:13px;padding:12px 0">尚未標記任何搭配詞。</p>';return;}
    const byS={};items.forEach(([v,i])=>{if(!byS[v.s])byS[v.s]=[];byS[v.s].push([v,i]);});
    let h='';
    for(const[s,ws]of Object.entries(byS)){
      const col=RD_SECTIONS.find(x=>x.title===s)?.color||'#1F4E79';
      h+=`<div class="section-block"><div class="section-title" style="background:${col}">${s}</div>
        <div class="vocab-wrap">${rdBuildTable(ws,true)}</div></div>`;
    }
    document.getElementById('rdExportContent').innerHTML=h;
  }
}

function rdBuildNav(){
  const c=document.getElementById('rdNavBtns');
  RD_SECTIONS.forEach((sec,i)=>{
    const label=sec.title.replace(/（[^）]*）/,'').trim();
    const btn=document.createElement('button');
    btn.className='nav-btn';btn.textContent=label;
    btn.style.cssText=`border-color:${sec.color};`;
    btn._col=sec.color;
    btn.onclick=()=>{
      document.querySelectorAll('#rdNavBtns .nav-btn').forEach(b=>{b.classList.remove('active');b.style.cssText=`border-color:${b._col};`;});
      btn.classList.add('active');btn.style.cssText=`background:${sec.color};border-color:${sec.color};`;
      document.getElementById('rd-sec-'+i)?.scrollIntoView({behavior:'smooth',block:'start'});
    };
    c.appendChild(btn);
  });
}

function revealAnswer(qaId){

function buildTextCard(tb,si,ti){

    const zh=zhA[pi]||'';
    const pe=p.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
    pH+=`<div class="para-block">
      <div class="para-de" onclick="speakPara(this,\`${pe}\`)">${p}</div>
      ${zh?`<div class="para-zh">${zh}</div>`:''}
    </div>`;
  });
  let qH='';
  if(tb.qa&&tb.qa.length){
    let its='';
    tb.qa.forEach((qa,qi)=>{
      const qid=`${id}_q${qi}`;
      const opts=qa.options.map((o,oi)=>`<div class="qa-opt" data-qa="${qid}" data-idx="${oi}">${o}</div>`).join('');

      <span class="text-src">${tb.src}</span>
    </div>

  </div>`;
}

function ueBuildNav(){
  const c=document.getElementById('ueNavBtns');
  SECTIONS.forEach((sec,i)=>{
    const label=sec.title.replace(/（[^）]*）/,'').trim();
    const btn=document.createElement('button');
    btn.className='nav-btn';btn.textContent=label;
    btn.style.cssText=`border-color:${sec.color};`;
    btn._col=sec.color;
    btn.onclick=()=>{
      document.querySelectorAll('#ueNavBtns .nav-btn').forEach(b=>{b.classList.remove('active');b.style.cssText=`border-color:${b._col};`;});
      btn.classList.add('active');btn.style.cssText=`background:${sec.color};border-color:${sec.color};`;
      document.getElementById('ue-sec-'+i)?.scrollIntoView({behavior:'smooth',block:'start'});
    };
    c.appendChild(btn);
  });
}

// ── JSON 匯出 / 匯入 ─────────────────────────────────────────────────────────
function cpExport(){
  const data = {
    rd: [...rdMarked],
    ue: [...ueMarked]
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'SprachbausteineII_Anfragen_Reagieren_checkpoint.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function cpImport(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const data = JSON.parse(e.target.result);
      if(!Array.isArray(data.rd) || !Array.isArray(data.ue)){
        alert('格式錯誤：JSON 檔案缺少 rd 或 ue 欄位。');
        return;
      }
      rdMarked = new Set(data.rd);
      ueMarked = new Set(data.ue);
      localStorage.setItem(RD_LS, JSON.stringify([...rdMarked]));
      localStorage.setItem(UE_LS, JSON.stringify([...ueMarked]));
      rdRender();
      ueRender();
      const ok = document.getElementById('cpImportOk');
      ok.classList.add('show');
      setTimeout(()=> ok.classList.remove('show'), 3000);
    } catch(err) {
      alert('格式錯誤：無法解析 JSON 檔案。');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── Init ──────────────────────────────────────────────────────────────────────
rdBuildNav();
ueBuildNav();
rdRender();
ueRender();
</script>
