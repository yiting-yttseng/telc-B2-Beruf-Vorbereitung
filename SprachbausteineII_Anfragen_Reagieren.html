<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTB B2: Sprachbausteine – Redemittel &amp; Übungstexte</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f0f0ee;color:#1a1a1a;font-size:14px}

/* ── Nav bar：雙排設計 ─────────────────────────────────────────────────── */
.nav-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #ddd;padding:6px 14px 6px}
.nav-row{display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-height:28px}
.nav-row + .nav-row{margin-top:4px;padding-top:4px;border-top:0.5px solid #f0f0ee}
.nav-label{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;margin-right:2px;padding:2px 0}
.nav-btn{padding:3px 9px;border-radius:14px;border:1.5px solid #ccc;background:#fff;
  color:#444;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.nav-btn:hover{border-color:#888;color:#1a1a1a}
.nav-btn.active{color:#fff;border-color:transparent}
.nav-right{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:3px 9px;border-radius:13px;border:0.5px solid #ccc;background:#fff;color:#333;font-size:11px;cursor:pointer}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.clear-btn{padding:3px 8px;border-radius:13px;border:0.5px solid #f0c0c0;background:#fff;color:#c0392b;font-size:11px;cursor:pointer}
.export-btn-nav{padding:3px 9px;border-radius:13px;border:0.5px solid #ccc;background:#fff;color:#333;font-size:11px;cursor:pointer}
.export-btn-nav:disabled{opacity:.35;cursor:default}
/* spacer 把右側控制區推到最右 */
.nav-spacer{flex:1}
.page{max-width:1200px;margin:0 auto;padding:18px 16px 60px}
.page-header{margin-bottom:16px}
.page-header h1{font-size:17px;font-weight:600;color:#1F4E79;margin-bottom:3px}
.page-header p{font-size:11px;color:#999;line-height:1.7}
.section-block{margin-bottom:30px;scroll-margin-top:90px}
.section-title{font-size:13px;font-weight:700;color:#fff;padding:7px 13px;
  border-radius:8px 8px 0 0;letter-spacing:.02em}
.vocab-toolbar{display:flex;align-items:center;gap:8px;padding:7px 12px;
  background:#f5f5f3;border:0.5px solid #ccc;border-bottom:none}
.vocab-count{font-size:11px;color:#888}
.vocab-wrap{border:0.5px solid #ccc;overflow:hidden;margin-bottom:0}
table{width:100%;border-collapse:collapse;background:#fff;table-layout:fixed}
th{text-align:left;padding:6px 10px;background:#f5f5f3;color:#777;font-weight:500;
  font-size:11px;border-bottom:0.5px solid #e0e0e0;letter-spacing:.03em}
td{padding:7px 10px;border-bottom:0.5px solid #efefed;vertical-align:top}
tr:last-child td{border-bottom:none}
tr.unfamiliar td{background:#fff6f6}
.dot-cell{width:26px;cursor:pointer;user-select:none}
.dot-cell:hover .dot{border-color:#e24b4a}
.dot{display:block;width:9px;height:9px;border-radius:50%;border:1.5px solid #ccc;margin-top:4px;transition:all .15s}
tr.unfamiliar .dot{background:#e24b4a;border-color:#e24b4a}
.speak-td{cursor:pointer}
.speak-td:hover{background:#f0f6ff!important}
tr.unfamiliar .speak-td:hover{background:#ffe4e4!important}
.col-dot{width:26px}.col-de{width:16%}.col-enzh{width:18%}.col-koll{width:28%}.col-satz{width:38%}
.artikel{font-size:11px;color:#aaa;font-style:italic;display:block;line-height:1.4}
.word-de{font-weight:700;font-size:13px;color:#1a5fc8;display:block}
.plural{font-size:11px;color:#bbb;display:block;line-height:1.4}
.word-en{font-size:12px;color:#222;line-height:1.6;display:block}
.word-zh{font-size:11px;color:#999;font-style:italic;display:block}
.koll-de{font-size:12px;color:#222;line-height:1.6;display:block}
.koll-verb{color:#1a5fc8;font-weight:700}
.koll-zh{font-size:11px;color:#999;font-style:italic;display:block}
.satz-de{font-size:12px;color:#222;line-height:1.6;display:block}
.satz-zh{font-size:11px;color:#999;font-style:italic;display:block}
.text-card{background:#fff;border:0.5px solid #ccc;border-top:none;overflow:hidden}
.text-card:last-child{border-radius:0 0 8px 8px}
.text-card-header{display:flex;align-items:center;gap:8px;padding:8px 13px;
  background:#fafaf8;border-bottom:0.5px solid #eee;border-top:1px solid #e0e0e0}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;white-space:nowrap}
.badge-klett{background:#ddeafb;color:#1F4E79}
.badge-cornelsen{background:#dff0df;color:#2E7D32}
.badge-telc{background:#fde8e8;color:#B71C1C}
.text-src{font-size:12px;color:#444;font-weight:500}
.text-body{padding:10px 14px 4px}
.para-block{margin-bottom:8px}
.para-de{font-size:13px;color:#1a1a1a;line-height:1.75;cursor:pointer;
  padding:3px 7px;margin:-3px -7px;border-radius:5px;transition:background .1s;display:inline-block;width:calc(100% + 14px)}
.para-de:hover{background:#eef4ff}
.para-de.speaking{background:#deeafc;outline:2px solid #1a5fc8;outline-offset:-1px}
.para-zh{font-size:11px;color:#999;font-style:italic;line-height:1.6;margin-top:3px;padding-left:2px}
.gap{display:inline-block;min-width:60px;border-bottom:1.5px solid #888;text-align:center;
  font-weight:700;color:#1a5fc8;padding:0 4px;margin:0 2px;font-size:13px}
.gap-blank{color:#aaa;font-weight:400;font-style:italic}
.options-block{padding:6px 14px 10px;background:#fafaf8;border-top:0.5px solid #eee}
.options-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px 16px;margin-top:6px}
.opt-item{font-size:12px;color:#444;padding:3px 8px;border-radius:5px;border:0.5px solid #e0e0e0;background:#fff;line-height:1.5}
.opt-item.correct{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32;font-weight:600}
.opt-label{font-size:11px;color:#aaa;margin-right:4px}
.qa-block{border-top:0.5px solid #e8e8e8;padding:10px 14px 14px;background:#fafaf8}
.qa-label{font-size:10px;font-weight:700;color:#999;letter-spacing:.07em;margin-bottom:8px;text-transform:uppercase}
.qa-item{margin-bottom:14px}
.qa-item:last-child{margin-bottom:0}
.qa-q{font-size:12px;color:#666;margin-bottom:6px;line-height:1.5}
.reveal-btn{font-size:11px;color:#888;border:0.5px solid #ccc;background:#fff;
  border-radius:6px;padding:3px 10px;cursor:pointer;transition:all .15s}
.reveal-btn:hover{border-color:#1a5fc8;color:#1a5fc8}
.answer-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.answer-badge{font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;
  background:#e8f5e9;color:#2e7d32;border:0.5px solid #a5d6a7;white-space:nowrap}
.explain-text{font-size:11px;color:#888;font-style:italic;line-height:1.5;
  margin-top:5px;padding:5px 10px;background:#f5f5f3;border-radius:5px;width:100%}
.hidden{display:none}
.speaking-badge{position:fixed;bottom:18px;right:18px;display:none;align-items:center;gap:6px;
  font-size:12px;color:#fff;padding:6px 14px;border-radius:20px;
  background:#1a5fc8;box-shadow:0 2px 10px rgba(26,95,200,.35);z-index:200}
.speaking-badge.active{display:flex}
.speaking-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse .9s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.export-panel{display:none;margin-top:20px;background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:18px}
.export-panel.visible{display:block}
.export-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.export-top h2{font-size:14px;font-weight:600}
.export-actions{display:flex;gap:8px;align-items:center}
.print-btn{padding:5px 14px;border-radius:6px;border:none;background:#1a1a1a;color:#fff;font-size:12px;cursor:pointer}
.close-btn{padding:5px 12px;border-radius:6px;border:0.5px solid #ccc;background:#fff;color:#555;font-size:12px;cursor:pointer}
.export-count{font-size:11px;color:#888;background:#f5f5f3;padding:2px 10px;border-radius:14px}

/* Redemittel styles */
.col-rd-dot{width:26px}.col-rd-koll{width:28%}.col-rd-en{width:18%}.col-rd-satz{width:calc(54% - 26px)}
.koll-main{font-weight:700;font-size:13px;color:#1a5fc8;display:block;line-height:1.5}
.koll-zh-rd{font-size:11px;color:#999;font-style:italic;display:block;line-height:1.5;margin-top:1px}
.en-cell{font-size:12px;color:#222;line-height:1.6;display:block}

/* Section divider between Redemittel and Übungstexte */
.section-divider{margin:36px 0 28px;padding:10px 14px;background:#1F4E79;color:#fff;
  border-radius:8px;font-size:14px;font-weight:700;letter-spacing:.03em}
@media print{
  @page{size:A4 portrait;margin:12mm 10mm}
  body *{visibility:hidden}
  #exportPanel,#exportPanel *{visibility:visible}
  #exportPanel{position:absolute;top:0;left:0;width:100%;height:auto!important;border:none!important;padding:0!important;overflow:visible!important}
  html,body{height:auto!important;overflow:hidden!important}
  .export-top{display:none!important}
  table{width:100%!important;table-layout:fixed!important;font-size:9pt!important;border-collapse:collapse!important}
  tr{page-break-inside:avoid}
  td,th{padding:4px 6px!important;border:0.5px solid #ddd!important}
  .artikel{display:block;font-size:8pt;color:#999;font-style:italic}
  .word-de{display:block;font-size:10pt;font-weight:bold;color:#1a5fc8;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .koll-verb{color:#1a5fc8;font-weight:bold;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td{background:#fff!important}
  tr.unfamiliar td{background:#fff0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th{background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .section-title{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div class="nav-bar">
  <!-- 第一排：Redemittel 情境按鈕 -->
  <div class="nav-row">
    <span class="nav-label">📚 Redemittel</span>
    <div id="rdNavBtns" style="display:contents"></div>
    <span class="nav-spacer"></span>
    <button class="filter-btn active" id="rdFilterAll" onclick="rdSetFilter('all',this)">全部</button>
    <button class="filter-btn" id="rdFilterMark" onclick="rdSetFilter('marked',this)">已標記</button>
    <button class="filter-btn" id="rdFilterClear" onclick="rdSetFilter('clear',this)">未標記</button>
    <button class="clear-btn" onclick="rdClearAll()">清除</button>
    <button class="export-btn-nav" id="rdExportBtn" onclick="toggleRdExport()" disabled>匯出 ↗</button>
  </div>
  <!-- 第二排：Übungstexte 情境按鈕 -->
  <div class="nav-row">
    <span class="nav-label">📝 Übungstexte</span>
    <div id="ueNavBtns" style="display:contents"></div>
    <span class="nav-spacer"></span>
    <button class="filter-btn active" id="ueFilterAll" onclick="setFilter('all',this)">全部單字</button>
    <button class="filter-btn" id="ueFilterUf" onclick="setFilter('unfamiliar',this)">不熟悉</button>
    <button class="filter-btn" id="ueFilterFm" onclick="setFilter('familiar',this)">已掌握</button>
    <button class="clear-btn" onclick="clearAll()">清除</button>
    <button class="export-btn-nav" id="exportBtn" onclick="toggleExport()" disabled>匯出 ↗</button>
  </div>
</div>

<div class="speaking-badge" id="speakingBadge">
  <span class="speaking-dot"></span><span id="speakLabel">朗讀中…</span>
</div>

<div class="page">

  <!-- ── Redemittel ──────────────────────────────────────────────────── -->
  <div class="page-header">
    <h1>DTB B2: Redemittel – Kollokationen nach Situation</h1>
    <p>⭕ 點圓圈標記需要複習 &nbsp;|&nbsp; 🔊 點「搭配詞」欄朗讀搭配詞、點「例句」欄朗讀例句</p>
  </div>
  <div id="rdContent"></div>
  <div class="export-panel" id="rdExportPanel">
    <div class="export-top">
      <h2>已標記搭配詞清單</h2>
      <div class="export-actions">
        <span class="export-count" id="rdExportCount"></span>
        <button class="print-btn" onclick="window.print()">列印／PDF</button>
        <button class="close-btn" onclick="toggleRdExport()">關閉</button>
      </div>
    </div>
    <div id="rdExportContent"></div>
  </div>

  <!-- ── Übungstexte ─────────────────────────────────────────────────── -->
  <div class="section-divider" id="ue-anchor">📝 Übungstexte – Sprachbausteine Teil 2</div>
  <div class="page-header">
    <p>⭕ 點圓圈標記不熟悉 &nbsp;|&nbsp; 🔊 點德文欄朗讀單字、點搭配欄朗讀搭配詞、點例句欄朗讀例句 &nbsp;|&nbsp; 答案點「顯示答案」才出現</p>
  </div>
  <div id="mainContent"></div>
  <div class="export-panel" id="exportPanel">
    <div class="export-top">
      <h2>不熟悉單字清單</h2>
      <div class="export-actions">
        <span class="export-count" id="exportCount"></span>
        <button class="print-btn" onclick="window.print()">列印／PDF</button>
        <button class="close-btn" onclick="toggleExport()">關閉</button>
      </div>
    </div>
    <div id="exportContent"></div>
  </div>

</div>

// S1 Anfrage, S2 Angebot, S3 Auftragserteilung, S4 Kostenvoranschlag, S5 Reklamation

// ── State ─────────────────────────────────────────────────────────────────────
const LS_KEY = 'sbt2_uf';
let unfamiliar = new Set(JSON.parse(localStorage.getItem(LS_KEY)||'[]'));
let currentFilter = 'all';

function saveUF(){ localStorage.setItem(LS_KEY, JSON.stringify([...unfamiliar])); }
function toggleMark(i){
  if(unfamiliar.has(i)) unfamiliar.delete(i); else unfamiliar.add(i);
  saveUF(); renderAll();
}
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function clearAll(){
  if(!confirm('確定清除所有標記？')) return;
  unfamiliar.clear(); saveUF(); renderAll();
}

// ── TTS ───────────────────────────────────────────────────────────────────────
let currentUtt = null;
function speak(text, id){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if(currentUtt && currentUtt._id === id){ currentUtt=null; hideSpeakBadge(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=0.9;
  u._id = id;
  currentUtt = u;
  showSpeakBadge(text.substring(0,20));
  u.onend = u.onerror = ()=>{ currentUtt=null; hideSpeakBadge(); };
  window.speechSynthesis.speak(u);
}
function speakWord(i){ speak(VOCAB[i].w, 'w'+i); }
function speakKoll(i){ speak(VOCAB[i].k, 'k'+i); }
function speakSatz(i){ speak(VOCAB[i].ex, 'e'+i); }
function speakPara(el, text){
  document.querySelectorAll('.para-de.speaking').forEach(e=>e.classList.remove('speaking'));
  if(currentUtt && currentUtt._el===el){ window.speechSynthesis.cancel(); currentUtt=null; hideSpeakBadge(); return; }
  el.classList.add('speaking');
  const u = new SpeechSynthesisUtterance(text);
  u.lang='de-DE'; u.rate=0.9; u._el=el;
  currentUtt=u;
  showSpeakBadge(text.substring(0,20));
  u.onend=u.onerror=()=>{ el.classList.remove('speaking'); currentUtt=null; hideSpeakBadge(); };
  window.speechSynthesis.speak(u);
}
function showSpeakBadge(t){ const b=document.getElementById('speakingBadge'); b.classList.add('active'); document.getElementById('speakLabel').textContent=t+'…'; }
function hideSpeakBadge(){ document.getElementById('speakingBadge').classList.remove('active'); }

// ── Verb highlight ─────────────────────────────────────────────────────────────
const VRE=/\b(einholen|stellen|richten|erlaeutern|erweitern|ueberzeugen|erfolgen|bitten|auftreten|korrigieren|gewaehren|versichern|ausgleichen|abbuchen|hinweisen|beruecksichtigen|eingehen|ueberpruefen|entsprechen|enthalten|verweisen|verstehen|stehen|aufmerksam|ansprechen|aufnehmen|empfehlen|versichern|entgegenkommen|garantieren|schicken|gehen|davon ausgehen|aufgeben)\b/g;
function hlV(t){ return t.replace(VRE, m=>`<span class="koll-verb">${m}</span>`); }

// ── Vocab row ─────────────────────────────────────────────────────────────────
function buildRow(v,i,compact){
  const uf = unfamiliar.has(i);
  const kP = hlV(v.k);
  const dotTd = compact ? '' :
    `<td class="dot-cell" onclick="event.stopPropagation();toggleMark(${i})"><span class="dot"></span></td>`;
  const sc = compact ? '' : 'speak-td';
  return `<tr class="${uf?'unfamiliar':''}">
    ${dotTd}
    <td class="${sc}" onclick="${compact?'':`speakWord(${i})`}">
      ${v.a?`<span class="artikel">${v.a}</span>`:''}<span class="word-de">${v.w}</span>${v.p?`<span class="plural">${v.p}</span>`:''}
    </td>
    <td class="${sc}">
      <span class="word-en">${v.en}</span><span class="word-zh">${v.zh}</span>
    </td>
    <td class="${sc}" onclick="${compact?'':`speakKoll(${i})`}">
      <span class="koll-de">${kP}</span><span class="koll-zh">${v.kz}</span>
    </td>
    <td class="${sc}" onclick="${compact?'':`speakSatz(${i})`}">
      <span class="satz-de">${v.ex}</span><span class="satz-zh">${v.ez}</span>
    </td>
  </tr>`;
}
function buildVocabTable(items, compact){
  const dTh = compact ? '' : '<th class="col-dot"></th>';
  return `<table>
    <thead><tr>${dTh}
      <th class="col-de">德文</th>
      <th class="col-enzh">英文＋中文</th>
      <th class="col-koll">固定搭配＋中文</th>
      <th class="col-satz">例句＋翻譯</th>
    </tr></thead>
    <tbody>${items.map(([v,i])=>buildRow(v,i,compact)).join('')}</tbody>
  </table>`;
}

// ── Text card ─────────────────────────────────────────────────────────────────
function revealAnswer(qaId){
  document.getElementById('reveal-'+qaId).classList.add('hidden');
  document.getElementById('answer-'+qaId).classList.remove('hidden');
  document.getElementById('explain-'+qaId).classList.remove('hidden');
  const correctIdx = parseInt(document.getElementById('answer-'+qaId).dataset.correct);
  document.querySelectorAll(`.qa-opt[data-qa="${qaId}"]`).forEach((opt,i)=>{
    if(i===correctIdx) opt.classList.add('correct');
  });
}
function buildTextCard(tb, secIdx, textIdx){
  const cardId = `c${secIdx}_${textIdx}`;
  const zhArr = tb.paragraphs_zh || [];
  let parasHtml = '';
  tb.paragraphs.forEach((para, pi)=>{
    const pid = `${cardId}_p${pi}`;
    const zhLine = zhArr[pi] || '';
    const paraEsc = para.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
    parasHtml += `<div class="para-block">
      <div class="para-de" id="${pid}" onclick="speakPara(this,\`${paraEsc}\`)">${para}</div>
      ${zhLine?`<div class="para-zh">${zhLine}</div>`:''}
    </div>`;
  });
  let qaHtml = '';
  if(tb.qa && tb.qa.length){
    let items = '';
    tb.qa.forEach((qa, qi)=>{
      const qaId = `${cardId}_q${qi}`;
      const optsHtml = qa.options.map((opt, oi)=>
        `<div class="qa-opt" data-qa="${qaId}" data-idx="${oi}">${opt}</div>`
      ).join('');
      items += `<div class="qa-item">
        <div class="qa-q">${qa.q}</div>
        <div class="qa-options">${optsHtml}</div>
        <div class="answer-row">
          <button class="reveal-btn" id="reveal-${qaId}" onclick="revealAnswer('${qaId}')">顯示答案</button>
          <div class="hidden" id="answer-${qaId}" data-correct="${qa.answer}">
            <span class="answer-badge">✓ ${qa.label}</span>
          </div>
        </div>
        <div class="explain-text hidden" id="explain-${qaId}">${qa.explain}</div>
      </div>`;
    });
    qaHtml = `<div class="qa-block"><div class="qa-label">📝 練習題</div>${items}</div>`;
  }
  return `<div class="text-card">
    <div class="text-card-header">
      <span class="badge badge-${tb.badgeCls}">${tb.badgeLabel}</span>
      <span class="text-src">${tb.src}</span>
    </div>
    <div class="text-body">${parasHtml}</div>
    ${qaHtml}
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll(){
  const indexed = VOCAB.map((v,i)=>[v,i]);
  const secVocab = {};
  indexed.forEach(([v,i])=>{ if(!secVocab[v.s]) secVocab[v.s]=[]; secVocab[v.s].push([v,i]); });

  let html = '';
  SECTIONS.forEach((sec, si)=>{
    const col = sec.color;
    const allV = secVocab[sec.title] || [];
    const filtered = allV.filter(([v,i])=>{
      if(currentFilter==='unfamiliar') return unfamiliar.has(i);
      if(currentFilter==='familiar') return !unfamiliar.has(i);
      return true;
    });
    const ufCnt = allV.filter(([v,i])=>unfamiliar.has(i)).length;
    const tableHtml = filtered.length
      ? `<div class="vocab-wrap">${buildVocabTable(filtered,false)}</div>`
      : `<div class="vocab-wrap" style="padding:14px;text-align:center;font-size:12px;color:#aaa;background:#fff;border-radius:0 0 8px 8px">（此篩選條件下無單字）</div>`;
    const textsHtml = sec.texts.map((tb,ti)=>buildTextCard(tb,si,ti)).join('');
    html += `<div class="section-block" id="sec-${si}">
      <div class="section-title" style="background:${col}">${sec.title}</div>
      <div class="vocab-toolbar">
        <span class="vocab-count">單字 ${allV.length} 個${ufCnt>0?` ‧ 不熟悉 ${ufCnt} 個`:''}</span>
      </div>
      ${tableHtml}
      ${textsHtml}
    </div>`;
  });
  const ueBtn = document.getElementById('exportBtn');
  if(ueBtn) ueBtn.disabled = (unfamiliar.size===0);
  document.getElementById('mainContent').innerHTML = html;
}


// ── Export ────────────────────────────────────────────────────────────────────
function groupBySec(items){
  const out = {};
  items.forEach(([v,i])=>{ if(!out[v.s]) out[v.s]=[]; out[v.s].push([v,i]); });
  return out;
}
function toggleExport(){
  const p = document.getElementById('exportPanel');
  p.classList.toggle('visible');
  if(p.classList.contains('visible')) renderExport();
}
function renderExport(){
  const words = VOCAB.map((v,i)=>[v,i]).filter(([v,i])=>unfamiliar.has(i));
  document.getElementById('exportCount').textContent = `共 ${words.length} 個單字`;
  if(!words.length){
    document.getElementById('exportContent').innerHTML = '<p style="color:#aaa;font-size:13px;padding:12px 0">尚未標記任何不熟悉的單字。</p>';
    return;
  }
  let html = '';
  for(const [sec,ws] of Object.entries(groupBySec(words))){
    const col = SECTIONS.find(s=>s.title===sec)?.color||'#1F4E79';
    html += `<div class="section-block">
      <div class="section-title" style="background:${col}">${sec}</div>
      <div class="vocab-wrap">${buildVocabTable(ws,true)}</div>
    </div>`;
  }
  document.getElementById('exportContent').innerHTML = html;
}

{s:`R12: Konflikte und Zusammenarbeit（衝突處理與協作）`,k:`dem Kunden entgegenkommen`,kz:`向客戶讓步、通融`,en:`to accommodate the customer`,ex:`In diesem Fall sollten wir dem Kunden etwas entgegenkommen.`,ez:`在這種情況下，我們應該對客戶有所通融。`},

const RD_SECTIONS = [
  {title:`R1: Anfrage stellen（詢價與詢問）`,       color:`#2E7D32`},
  {title:`R2: Angebot machen（報價與提案）`,         color:`#1565C0`},
  {title:`R3: Bestellung aufgeben（下訂單）`,        color:`#6A1B9A`},
  {title:`R4: Lieferung und Empfang（收貨與物流）`,  color:`#00695C`},
  {title:`R5: Reklamation und Beschwerde（投訴與抱怨）`, color:`#BF360C`},
  {title:`R6: Entschuldigung und Entschaedigung（道歉與補償）`, color:`#37474F`},
  {title:`R7: Telefon und Kommunikation（電話溝通）`, color:`#4527A0`},
  {title:`R8: Bewerbung（求職與應徵）`,               color:`#1B5E20`},
  {title:`R9: Krankmeldung und Arbeitsrecht（請病假與勞動法規）`, color:`#880E4F`},
  {title:`R10: Praesentation und Meetings（報告與會議）`, color:`#E65100`},
  {title:`R11: Qualitaet und Gesundheit（品質管理與職場健康）`, color:`#0D47A1`},
  {title:`R12: Konflikte und Zusammenarbeit（衝突處理與協作）`, color:`#4E342E`},
];


const RD_LS_KEY = 'sbt2_rd_marked';
let rdMarked = new Set(JSON.parse(localStorage.getItem(RD_LS_KEY)||'[]'));
let rdFilter = 'all';

function rdSaveMark(){ localStorage.setItem(RD_LS_KEY, JSON.stringify([...rdMarked])); }
function rdToggleMark(i){
  if(rdMarked.has(i)) rdMarked.delete(i); else rdMarked.add(i);
  rdSaveMark(); rdRenderAll();
}
function rdSetFilter(f, btn){
  rdFilter = f;
  document.querySelectorAll('#rdFilterAll,#rdFilterMark,#rdFilterClear').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  rdRenderAll();
}
function rdClearAll(){
  if(!confirm('確定清除所有 Redemittel 標記？')) return;
  rdMarked.clear(); rdSaveMark(); rdRenderAll();
}

// ── Nav builders ──────────────────────────────────────────────────────────────
function buildRdNav(){
  const c = document.getElementById('rdNavBtns');
  RD_SECTIONS.forEach((sec,i)=>{
    const label = sec.title.replace(/（[^）]*）/,'').trim();
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.textContent = label;
    btn.style.cssText = `border-color:${sec.color};`;
    btn.onclick = ()=>{
      document.querySelectorAll('#rdNavBtns .nav-btn').forEach(b=>{ b.classList.remove('active'); b.style.cssText=`border-color:${b._color};`; });
      btn.classList.add('active');
      btn.style.cssText = `background:${sec.color};border-color:${sec.color};`;
      document.getElementById('rd-sec-'+i)?.scrollIntoView({behavior:'smooth',block:'start'});
    };
    btn._color = sec.color;
    c.appendChild(btn);
  });
}
function buildUeNav(){
  const c = document.getElementById('ueNavBtns');
  SECTIONS.forEach((sec,i)=>{
    const label = sec.title.replace(/（[^）]*）/,'').trim();
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.textContent = label;
    btn.style.cssText = `border-color:${sec.color};`;
    btn.onclick = ()=>{
      document.querySelectorAll('#ueNavBtns .nav-btn').forEach(b=>{ b.classList.remove('active'); b.style.cssText=`border-color:${b._color};`; });
      btn.classList.add('active');
      btn.style.cssText = `background:${sec.color};border-color:${sec.color};`;
      document.getElementById('sec-'+i)?.scrollIntoView({behavior:'smooth',block:'start'});
    };
    btn._color = sec.color;
    c.appendChild(btn);
  });
}


// ── Redemittel verb highlight ─────────────────────────────────────────────────
const RD_VRE=/\b(stellen|einholen|aufgeben|bitten|einhalten|erfolgen|bestaetigen|gewaehren|anbieten|versichern|unterbreiten|verweisen|einreichen|feststellen|melden|beheben|zugeben|entschuldigen|beruecksichtigen|sichern|optimieren|ansprechen|annehmen|finden|ueben|zeigen|formulieren|beharren|entgegenkommen|erkundigen|garantieren|fuehren|verbinden|hinterlassen|ausrichten|zusammenfassen|bewerben|erfuellen|sammeln|ablegen|treffen|schreiben|halten|erstellen|fassen|diskutieren|abbauen|vereinbaren|pruefen|annehmen|zurueckschicken|liefern|austauschen)\b/g;
function rdHlV(t){ return t.replace(RD_VRE, m=>`<span class="koll-verb">${m}</span>`); }

// ── Redemittel TTS ────────────────────────────────────────────────────────────
function speakRdKoll(i){ speak(REDEMITTEL[i].k, 'rdk'+i); }
function speakRdSatz(i){ speak(REDEMITTEL[i].ex, 'rde'+i); }

// ── Redemittel row builder ─────────────────────────────────────────────────────
function buildRdRow(v, i, compact){
  const m = rdMarked.has(i);
  const kP = rdHlV(v.k);
  const dotTd = compact ? '' :
    `<td class="dot-cell" onclick="event.stopPropagation();rdToggleMark(${i})"><span class="dot"></span></td>`;
  const sc = compact ? '' : 'speak-td';
  return `<tr class="${m?'unfamiliar':''}">
    ${dotTd}
    <td class="${sc}" onclick="${compact?'':`speakRdKoll(${i})`}">
      <span class="koll-main">${kP}</span>
      <span class="koll-zh-rd">${v.kz}</span>
    </td>
    <td>
      <span class="en-cell">${v.en}</span>
    </td>
    <td class="${sc}" onclick="${compact?'':`speakRdSatz(${i})`}">
      <span class="satz-de">${v.ex}</span>
      <span class="satz-zh">${v.ez}</span>
    </td>
  </tr>`;
}
function buildRdTable(items, compact){
  const dTh = compact ? '' : '<th class="col-rd-dot"></th>';
  return `<table>
    <thead><tr>${dTh}
      <th class="col-rd-koll">搭配詞（點擊朗讀）</th>
      <th class="col-rd-en">English</th>
      <th class="col-rd-satz">例句＋翻譯（點擊朗讀）</th>
    </tr></thead>
    <tbody>${items.map(([v,i])=>buildRdRow(v,i,compact)).join('')}</tbody>
  </table>`;
}

// ── Redemittel render ──────────────────────────────────────────────────────────
function rdRenderAll(){
  if(!window.REDEMITTEL || !window.RD_SECTIONS) return;
  const indexed = REDEMITTEL.map((v,i)=>[v,i]);
  const secData = {};
  indexed.forEach(([v,i])=>{ if(!secData[v.s]) secData[v.s]=[]; secData[v.s].push([v,i]); });

  let html = '';
  RD_SECTIONS.forEach((sec, si)=>{
    const col = sec.color;
    const allV = secData[sec.title] || [];
    const filtered = allV.filter(([v,i])=>{
      if(rdFilter==='marked') return rdMarked.has(i);
      if(rdFilter==='clear') return !rdMarked.has(i);
      return true;
    });
    const mCnt = allV.filter(([v,i])=>rdMarked.has(i)).length;
    const tableHtml = filtered.length
      ? `<div class="vocab-wrap">${buildRdTable(filtered,false)}</div>`
      : `<div class="vocab-wrap" style="padding:14px;text-align:center;font-size:12px;color:#aaa;background:#fff;border-radius:0 0 8px 8px">（此篩選條件下無項目）</div>`;
    html += `<div class="section-block rd-section-block" id="rd-sec-${si}">
      <div class="section-title" style="background:${col}">${sec.title}</div>
      <div class="vocab-toolbar">
        <span class="vocab-count">共 ${allV.length} 個搭配詞${mCnt>0?` ‧ 已標記 ${mCnt} 個`:''}</span>
      </div>
      ${tableHtml}
    </div>`;
  });
  document.getElementById('rdContent').innerHTML = html;
  // update export button state
  const btn = document.getElementById('rdExportBtn');
  if(btn) btn.disabled = (rdMarked.size===0);
}

// ── Redemittel export ──────────────────────────────────────────────────────────
function toggleRdExport(){
  const p = document.getElementById('rdExportPanel');
  p.classList.toggle('visible');
  if(p.classList.contains('visible')) renderRdExport();
}
function renderRdExport(){
  const items = REDEMITTEL.map((v,i)=>[v,i]).filter(([v,i])=>rdMarked.has(i));
  document.getElementById('rdExportCount').textContent = `共 ${items.length} 個搭配詞`;
  if(!items.length){
    document.getElementById('rdExportContent').innerHTML = '<p style="color:#aaa;font-size:13px;padding:12px 0">尚未標記任何搭配詞。</p>';
    return;
  }
  const bySection = {};
  items.forEach(([v,i])=>{ if(!bySection[v.s]) bySection[v.s]=[]; bySection[v.s].push([v,i]); });
  let html = '';
  for(const [sec,ws] of Object.entries(bySection)){
    const col = RD_SECTIONS.find(s=>s.title===sec)?.color||'#1F4E79';
    html += `<div class="section-block">
      <div class="section-title" style="background:${col}">${sec}</div>
      <div class="vocab-wrap">${buildRdTable(ws,true)}</div>
    </div>`;
  }
  document.getElementById('rdExportContent').innerHTML = html;
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildRdNav();
buildUeNav();
rdRenderAll();
renderAll();

</script>
