<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTB B2: Lesen Teil 2 – Wortschatz Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f0f0ee;color:#1a1a1a;font-size:14px}

/* Nav */
.nav-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #ddd;
  padding:8px 14px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.nav-title{font-size:12px;font-weight:700;color:#555;margin-right:4px;white-space:nowrap;letter-spacing:.01em}
.nav-btn{padding:4px 10px;border-radius:16px;border:1.5px solid #ccc;background:#fff;
  color:#444;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.nav-btn:hover{border-color:#888;color:#1a1a1a}
.nav-btn.active{color:#fff;border-color:transparent}
.nav-right{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:4px 10px;border-radius:14px;border:0.5px solid #ccc;background:#fff;color:#333;font-size:11px;cursor:pointer}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.clear-btn{padding:4px 9px;border-radius:14px;border:0.5px solid #f0c0c0;background:#fff;color:#c0392b;font-size:11px;cursor:pointer}
.export-btn-nav{padding:4px 10px;border-radius:14px;border:0.5px solid #ccc;background:#fff;color:#333;font-size:11px;cursor:pointer}
.export-btn-nav:disabled{opacity:.35;cursor:default}

/* Page */
.page{max-width:1200px;margin:0 auto;padding:18px 16px 60px}
.page-header{margin-bottom:16px}
.page-header h1{font-size:17px;font-weight:600;color:#1F4E79;margin-bottom:3px}
.page-header p{font-size:11px;color:#999;line-height:1.7}

/* Section */
.section-block{margin-bottom:30px;scroll-margin-top:65px}
.section-title{font-size:13px;font-weight:700;color:#fff;padding:7px 13px;
  border-radius:8px 8px 0 0;letter-spacing:.02em}

/* Vocab toolbar */
.vocab-toolbar{display:flex;align-items:center;gap:8px;padding:7px 12px;
  background:#f5f5f3;border:0.5px solid #ccc;border-bottom:none;margin-top:0}
.vocab-count{font-size:11px;color:#888}

/* Vocab table */
.vocab-wrap{border:0.5px solid #ccc;border-radius:0 0 8px 8px;overflow:hidden;margin-bottom:0}
table{width:100%;border-collapse:collapse;background:#fff;table-layout:fixed}
th{text-align:left;padding:6px 10px;background:#f5f5f3;color:#777;font-weight:500;
  font-size:11px;border-bottom:0.5px solid #e0e0e0;letter-spacing:.03em}
td{padding:7px 10px;border-bottom:0.5px solid #efefed;vertical-align:top}
tr:last-child td{border-bottom:none}
tr.unfamiliar td{background:#fff6f6}
.dot-cell{width:26px;cursor:pointer;user-select:none}
.dot-cell:hover .dot{border-color:#e24b4a}
.dot{display:block;width:9px;height:9px;border-radius:50%;border:1.5px solid #ccc;margin-top:4px;transition:all .15s}
tr.unfamiliar .dot{background:#e24b4a;border-color:#e24b4a}
.speak-td{cursor:pointer}
.speak-td:hover{background:#f0f6ff!important}
tr.unfamiliar .speak-td:hover{background:#ffe4e4!important}
.col-dot{width:26px}.col-de{width:14%}.col-enzh{width:17%}.col-koll{width:26%}.col-satz{width:43%}
.artikel{font-size:11px;color:#aaa;font-style:italic;display:block;line-height:1.4}
.word-de{font-weight:700;font-size:13px;color:#1a5fc8;display:block}
.plural{font-size:11px;color:#bbb;display:block;line-height:1.4}
.word-en{font-size:12px;color:#222;line-height:1.6;display:block}
.word-zh{font-size:11px;color:#999;font-style:italic;display:block}
.koll-de{font-size:12px;color:#222;line-height:1.6;display:block}
.koll-verb{color:#1a5fc8;font-weight:700}
.koll-zh{font-size:11px;color:#999;font-style:italic;display:block}
.satz-de{font-size:12px;color:#222;line-height:1.6;display:block}
.satz-zh{font-size:11px;color:#999;font-style:italic;display:block}

/* Text card */
.text-card{background:#fff;border:0.5px solid #ccc;border-top:none;overflow:hidden}
.text-card:last-child{border-radius:0 0 8px 8px}
.text-card-header{display:flex;align-items:center;gap:8px;padding:8px 13px;
  background:#fafaf8;border-bottom:0.5px solid #eee;border-top:1px solid #e0e0e0}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;white-space:nowrap}
.badge-klett{background:#ddeafb;color:#1F4E79}
.badge-cornelsen{background:#dff0df;color:#2E7D32}
.badge-telc{background:#fde8e8;color:#B71C1C}
.text-src{font-size:12px;color:#444;font-weight:500}

.text-body{padding:10px 14px 4px}

/* Paragraph — click to speak, ZH below */
.para-block{margin-bottom:8px}
.para-de{font-size:13px;color:#1a1a1a;line-height:1.75;cursor:pointer;
  padding:3px 7px;margin:-3px -7px;border-radius:5px;transition:background .1s;display:inline-block;width:calc(100% + 14px)}
.para-de:hover{background:#eef4ff}
.para-de.speaking{background:#deeafc;outline:2px solid #1a5fc8;outline-offset:-1px}
.para-zh{font-size:11px;color:#999;font-style:italic;line-height:1.6;margin-top:3px;padding-left:2px}

/* QA */
.qa-block{border-top:0.5px solid #e8e8e8;padding:10px 14px 14px;background:#fafaf8}
.qa-label{font-size:10px;font-weight:700;color:#999;letter-spacing:.07em;margin-bottom:8px;text-transform:uppercase}
.qa-item{margin-bottom:14px}
.qa-item:last-child{margin-bottom:0}
.qa-q{font-size:13px;color:#1a1a1a;font-weight:500;margin-bottom:6px;line-height:1.5}
.qa-options{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.qa-opt{font-size:12px;color:#444;padding:4px 10px;border-radius:6px;
  border:0.5px solid #ddd;background:#fff;line-height:1.5}
.qa-opt.correct{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32;font-weight:600}
.reveal-btn{font-size:11px;color:#888;border:0.5px solid #ccc;background:#fff;
  border-radius:6px;padding:3px 10px;cursor:pointer;transition:all .15s}
.reveal-btn:hover{border-color:#1a5fc8;color:#1a5fc8}
.answer-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.answer-badge{font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;
  background:#e8f5e9;color:#2e7d32;border:0.5px solid #a5d6a7;white-space:nowrap}
.explain-text{font-size:11px;color:#888;font-style:italic;line-height:1.5;
  margin-top:5px;padding:5px 10px;background:#f5f5f3;border-radius:5px;width:100%}
.hidden{display:none}

/* Speaking badge */
.speaking-badge{position:fixed;bottom:18px;right:18px;display:none;align-items:center;gap:6px;
  font-size:12px;color:#fff;padding:6px 14px;border-radius:20px;
  background:#1a5fc8;box-shadow:0 2px 10px rgba(26,95,200,.35);z-index:200}
.speaking-badge.active{display:flex}
.speaking-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse .9s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Export panel */
.export-panel{display:none;margin-top:20px;background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:18px}
.export-panel.visible{display:block}
.export-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.export-top h2{font-size:14px;font-weight:600}
.export-actions{display:flex;gap:8px;align-items:center}
.print-btn{padding:5px 14px;border-radius:6px;border:none;background:#1a1a1a;color:#fff;font-size:12px;cursor:pointer}
.close-btn{padding:5px 12px;border-radius:6px;border:0.5px solid #ccc;background:#fff;color:#555;font-size:12px;cursor:pointer}
.export-count{font-size:11px;color:#888;background:#f5f5f3;padding:2px 10px;border-radius:14px}

@media print{
  @page{size:A4 portrait;margin:12mm 10mm}
  body *{visibility:hidden}
  #exportPanel,#exportPanel *{visibility:visible}
  #exportPanel{position:absolute;top:0;left:0;width:100%;height:auto!important;border:none!important;padding:0!important;overflow:visible!important}
  html,body{height:auto!important;overflow:hidden!important}
  .export-top{display:none!important}
  table{width:100%!important;table-layout:fixed!important;font-size:9pt!important;border-collapse:collapse!important}
  tr{page-break-inside:avoid}
  td,th{padding:4px 6px!important;border:0.5px solid #ddd!important}
  .artikel{display:block;font-size:8pt;color:#999;font-style:italic}
  .word-de{display:block;font-size:10pt;font-weight:bold;color:#1a5fc8;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .plural{display:block;font-size:8pt;color:#bbb}
  .word-en{display:block;font-size:8pt;color:#222}
  .word-zh{display:block;font-size:7pt;color:#888;font-style:italic}
  .koll-de,.satz-de{display:block;font-size:8pt;color:#222}
  .koll-verb{color:#1a5fc8;font-weight:bold;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .koll-zh,.satz-zh{display:block;font-size:7pt;color:#888;font-style:italic}
  td{background:#fff!important}
  tr.unfamiliar td{background:#fff0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th{background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .section-title{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .col-de{width:14%}.col-enzh{width:17%}.col-koll{width:26%}.col-satz{width:43%}
}

/* ── Backup bar ── */
.backup-bar{display:flex;align-items:center;gap:10px;padding:6px 14px;
  background:#f0f4ff;border-bottom:1px solid #d0d8f0;flex-wrap:wrap}
.backup-label{font-size:12px;color:#3a5fc8;font-weight:500;white-space:nowrap}
.cp-btn{padding:4px 14px;border-radius:6px;font-size:12px;cursor:pointer;
  border:1.5px solid #3a5fc8;background:#fff;color:#3a5fc8;transition:all .15s}
.cp-btn:hover{background:#eef2ff}
.cp-btn.primary{background:#3a5fc8;color:#fff}
.cp-btn.primary:hover{background:#2d4fb0}
.import-success{font-size:12px;color:#2e7d32;font-weight:500;
  opacity:0;transition:opacity .3s}
.import-success.show{opacity:1}
</style>
</head>

const SECTIONS=[
{title:`T1a: Allgemeine Regelungen am Arbeitsplatz（工作場所一般規定）`,color:`#1F4E79`,texts:[{src:`[Klett] Text 1 – Gesundheit am Arbeitsplatz`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`Die Gesundheit unserer Mitarbeiterinnen und Mitarbeiter ist uns ein großes Anliegen. So sind in allen Büros moderne, ergonomische Arbeitsplätze eingerichtet.`,`Um die Schreibtischhöhe, den Bürostuhl und den Abstand zum Bildschirm auf Ihre Körpergröße einstellen zu lassen, kontaktieren Sie bitte bereits in der ersten Arbeitswoche unseren Gesundheitsbeauftragten Anton Meisner unter der Durchwahl -039.`,`Die Temperatur und Luftfeuchtigkeit in den Räumen wird zentral geregelt. Bei Änderungswünschen kontaktieren Sie bitte umgehend Herrn Meisner. Für ein besseres Raumklima sorgen außerdem unsere Pflanzen.`,`Um allen ein konzentriertes Arbeiten zu ermöglichen, sollte der Lärmpegel in den Büros möglichst niedrig gehalten werden. Sollten Sie Gespräche führen müssen, die länger dauern, suchen Sie eine der Kommunikationsboxen auf, die sich in jedem Stockwerk befinden.`],paragraphs_zh:[`我們非常重視員工的健康。因此所有辦公室都配備了現代化的人體工學工作站。`,`如需調整書桌高度、辦公椅和螢幕距離，請在第一週工作期間聯繫我們的健康專員Anton Meisner，分機-039。`,`房間的溫度和濕度由中央統一調節。如需更改，請立即聯繫Meisner先生。我們的植栽也有助於改善室內環境。`,`為了讓所有人都能專注工作，辦公室的噪音應盡量保持低水平。如需進行較長的對話，請使用每層樓都設有的溝通隔間。`],qa:[{q:`1. Die Mitarbeiter/innen richten sich ihren Arbeitsplatz bei Arbeitsbeginn selbst ein.`,type:`tf`,options:[`richtig`,`falsch`],answer:1,label:`falsch`,explain:`Der Gesundheitsbeauftragte hilft dabei – man soll ihn in der ersten Arbeitswoche kontaktieren.`},{q:`2. Die Firma bittet die Mitarbeiter/innen, ...`,type:`mc`,options:[`a) die Temperatur in den Büros selbst einzustellen.`,`b) ihre Schreibtische für längere Unterhaltungen zu verlassen.`,`c) sich um die Pflanzen zu kümmern.`],answer:1,label:`b`,explain:`Für längere Gespräche soll man die Kommunikationsboxen aufsuchen, also den Schreibtisch verlassen.`}]},{src:`[Cornelsen] Regelungen am Arbeitsplatz (AKO.KG)`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Es ist wichtig, dass auf dem Betriebsgelände der AKO.KG alle Maßnahmen eingehalten werden, damit Sie sich selbst und andere nicht gefährden. Bei der Bedienung der Maschinen sind die jeweiligen Sicherheitsbestimmungen zu befolgen, angepasst an die neuen Richtlinien laut Arbeitsschutzgesetz vom Januar dieses Jahres.`,`Die Sicherheitsbestimmungen finden Sie in der Anlage zu dieser Willkommensmappe und zusammengefasst auch auf Informationsblättern an den Maschinen. Sollten Sie hierzu Fragen haben, setzen Sie sich bitte mit unserer Sicherheitsbeauftragten Frau Scholz, Zimmer 122, Durchwahl -308, in Verbindung.`,`Dies ist auch die Kontaktstelle für alle Störungen, Unfälle, Brand oder bei für Sie unklaren Situationen. In diesen Fällen kontaktieren Sie bitte auch immer den Empfang, Durchwahl -100.`,`Nach Verlassen der Werkstätten sind diese immer ordnungsgemäß abzuschließen, damit sich kein Unbefugter den Anlagen und Maschinen nähern kann. Umherliegender Unrat kann zur Gefahrenquelle werden – achten Sie auf die vorgeschriebene Trennung der Abfälle. Auf dem gesamten Betriebsgelände ist Filmen und Fotografieren sowie der Konsum von Alkohol nicht gestattet.`],paragraphs_zh:[`在AKO.KG的廠區內，所有措施都必須被遵守，以免傷害自己和他人。操作機器時必須遵守相關安全規定，已依照今年一月份勞動保護法的新指導方針進行調整。`,`安全規定可在入職手冊附件及機器旁的說明頁中找到。如有疑問，請與安全負責人Scholz女士（122室，分機-308）聯繫。`,`這也是所有故障、事故、火災或不明情況的聯繫窗口。遇到這類情況，也請務必聯繫前台，分機-100。`,`離開車間後必須按規定鎖好，以防未授權人員靠近設備和機器。散落的垃圾可能成為危險源——請遵守規定的垃圾分類。整個廠區內禁止拍照錄像及飲酒。`],qa:[{q:`6. Die Regelungen am Arbeitsplatz wurden aktualisiert.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Die Sicherheitsbestimmungen wurden angepasst an die neuen Richtlinien laut Arbeitsschutzgesetz vom Januar.`},{q:`7. Auf dem Firmengelände ...`,type:`mc`,options:[`a) darf kein Abfall entsorgt werden.`,`b) ist bei Gefahr Frau Scholz zu informieren.`,`c) ist es verboten, Nahrungsmittel zu sich zu nehmen.`],answer:1,label:`b`,explain:`Frau Scholz ist die Kontaktstelle für Störungen, Unfälle, Brand und unklare Situationen.`}]}]},
{title:`T1b: Laborkleidung & Sicherheit（實驗室服裝與安全）`,color:`#37474F`,texts:[{src:`[Klett] Text 2 – Hygiene- und Verhaltensrichtlinien in der Produktion`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`Der Eintritt in den Produktionsbereich darf nur mit entsprechender Schutzkleidung erfolgen. Die vom Betrieb zur Verfügung gestellte Schutzkleidung ist korrekt anzuziehen: Der Kittel muss geschlossen und die Haare vom Kopfschutz vollständig bedeckt sein. Die Schuhe sind sauber zu halten. Außerdem ist das Tragen von Schmuck im Produktionsbereich nicht gestattet.`,`Das Essen und Trinken ist nur in den Pausenräumen erlaubt. Bei Arbeitsbeginn und nach den Pausen sind die Hände gründlich zu reinigen. Wenn Sie Plastikhandschuhe tragen, müssen diese mindestens dreimal täglich bzw. bei jedem Wechsel der Tätigkeit ausgetauscht werden.`,`Welche Tätigkeiten Plastikhandschuhe erfordern, sehen Sie auf dem Plan auf Seite 10. Der Eintritt in den Produktionsbereich erfolgt immer über die Hygieneschleuse. Dort werden Hände und Schuhe desinfiziert bzw. gereinigt.`,`Das Betreten des Produktionsbereichs ist nur über diesen Eingang erlaubt. Die gesamte Schutzkleidung muss nach Arbeitsende für eine professionelle Reinigung in den dafür vorgesehenen Container geworfen werden. Die Einhaltung der Hygieneregeln wird durch den Abteilungsleiter kontrolliert. In regelmäßigen Abständen finden Hygieneschulungen statt – die Anwesenheit ist dabei für alle Pflicht.`],paragraphs_zh:[`進入生產區域只能穿著相應的防護服。公司提供的防護服必須正確穿著：實驗衣必須扣好，頭髮必須完全被頭套蓋住。鞋子必須保持乾淨。此外，在生產區域不允許佩戴飾品。`,`飲食只允許在休息室進行。上班開始時及休息後必須徹底清洗雙手。如果您佩戴塑膠手套，每天至少必須更換三次，或在每次換工作任務時更換。`,`哪些工作需要佩戴塑膠手套，請參見第10頁的計劃表。進入生產區域必須經由衛生閘口。在那裡，雙手和鞋子將被消毒或清洗。`,`只允許通過這個入口進入生產區域。所有防護服在下班後必須投入指定的容器進行專業清洗。衛生規定的遵守情況由部門主管負責監督。定期舉辦衛生培訓——所有員工均必須出席。`],qa:[{q:`3. Man darf den Produktionsbereich nur durch eine bestimmte Tür betreten.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Der Eintritt erfolgt immer über die Hygieneschleuse – das ist der einzige erlaubte Eingang.`},{q:`4. Mitarbeiter/innen im Produktionsbereich müssen ...`,type:`mc`,options:[`a) an Hygieneschulungen teilnehmen.`,`b) ihre Schutzkleidung regelmäßig waschen.`,`c) jederzeit Plastikhandschuhe anhaben.`],answer:0,label:`a`,explain:`Die Anwesenheit bei Hygieneschulungen ist für alle Mitarbeiter/innen im Produktionsbereich Pflicht.`}]},{src:`[Telc DTB] Sicherheit im Labor – Laborkleidung`,badgeCls:`telc`,badgeLabel:`[Telc DTB]`,paragraphs:[`Beim Arbeiten im Labor muss eine angemessene Kleidung getragen werden, um einerseits sich selbst, andererseits auch bestimmte Materialien zu schützen. Dazu gehört zunächst ein weißer Schutzkittel aus Baumwolle, der immer geschlossen und sauber sein muss.`,`Da ein Kittel nicht den ganzen Körper schützt, ist darauf zu achten, dass stets geschlossenes, festes Schuhwerk (keine hohen Absätze oder offene Sandalen) sowie lange Hosen zu tragen sind. Das feste, flache Schuhwerk dient nebenbei auch dem Zweck, in Notsituationen das Labor zügig verlassen zu können.`,`Aus hygienischen Gründen müssen auch die Haare durch eine Haube bedeckt sein. Lange Haare müssen zusätzlich zu einem Zopf zusammengebunden werden. Häufig kommt auch noch eine Schutzbrille zum Einsatz.`,`Beim Hantieren mit empfindlichen oder gefährlichen Substanzen sind Handschuhe zu tragen, um die Hände vor Kontamination zu schützen. Da die Handschuhe verunreinigt sein könnten, sollten diese nach durchgeführter Arbeit stets abgelegt werden. Auf keinen Fall darf das Labor mit Handschuhen verlassen werden.`],paragraphs_zh:[`在實驗室工作時必須穿著合適的服裝，一方面保護自己，另一方面保護某些材料。首先需要一件永遠保持扣好且乾淨的白色棉質防護服。`,`由於實驗衣不能保護全身，必須注意始終穿著密閉的固定鞋類（不可穿高跟鞋或涼鞋）及長褲。固定的平底鞋此外也有助於在緊急情況下迅速離開實驗室。`,`出於衛生原因，頭髮也必須用帽子蓋住。長頭髮必須另外綁成馬尾。通常還會使用護目鏡。`,`在處理敏感或危險物質時必須佩戴手套，以保護雙手免受污染。由於手套可能被化學物質污染，應在完成工作後立即脫下。絕對不可以戴著手套離開實驗室。`],qa:[{q:`8. Beim Arbeiten im Labor darf man weder kurze Hosen tragen noch längere Haare offen lassen.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Es sind lange Hosen zu tragen und die Haare müssen durch eine Haube bedeckt bzw. zu einem Zopf gebunden sein.`},{q:`9. Im Labor müssen Handschuhe ...`,type:`mc`,options:[`a) bei allen Arbeiten getragen werden.`,`b) gleich bei Arbeitsantritt angelegt werden.`,`c) nach Arbeiten mit Chemikalien ausgezogen werden.`],answer:2,label:`c`,explain:`Nach durchgeführter Arbeit mit chemischen Substanzen sollten die Handschuhe stets abgelegt werden.`}]}]},
{title:`T2: Betriebliche Veranstaltungen & Sport（公司活動與運動）`,color:`#2E7D32`,texts:[{src:`[Telc DTB] Gemeinschaftsveranstaltungen & Betriebssport`,badgeCls:`telc`,badgeLabel:`[Telc DTB]`,paragraphs:[`Neben zahlreichen Sozialleistungen bietet unser Unternehmen alljährlich zwei Gemeinschaftsveranstaltungen an. Immer am dritten Mittwoch im Mai findet unser eintägiger Betriebsausflug statt, der sowohl einen kulturellen als auch einen sportlichen Teil enthält und mit einem Essen abschließt.`,`Den Organisationsausschuss bilden stets zwei langjährige und zwei neue Mitarbeiterinnen oder Mitarbeiter. Die Geschäftsleitung stellt ein festgelegtes Budget zur Verfügung, die Kosten für alkoholische Getränke trägt jeder Mitarbeiter selbst.`,`Nach einer Umfrage unter unseren Mitarbeiterinnen und Mitarbeitern entschieden wir uns aufgrund der Arbeitsdichte zum Jahresabschluss, der religiösen Vielfalt in unseren Teams und der hohen Termindichte in der Vorweihnachtszeit dazu, ein Sommerfest statt einer Weihnachtsfeier zu veranstalten. Feste Programmpunkte sind dabei ein gutes Essen, das Überreichen eines Preises an den Mitarbeiter mit der Idee des Jahres und Tanz zu Live-Musik.`,`Anders als beim Betriebsausflug können wichtige Geschäftspartner als geladene Gäste daran teilnehmen. Sportliche Aktivitäten werden bei uns großgeschrieben. Die Laufgruppe hat sogar schon an einem Marathon teilgenommen.`],paragraphs_zh:[`除眾多員工福利外，我們公司每年還提供兩次集體活動。每年五月第三個星期三舉行一日公司郊遊，包含文化和體育兩個環節，並以晚餐收尾。`,`組委會由兩名資深員工和兩名新員工組成。管理層提供固定預算，酒精飲料的費用由員工個人自付。`,`根據員工問卷調查，由於年底工作密度高、團隊宗教多元性以及聖誕前夕行程密集，我們決定舉辦夏日派對而非聖誕晚會。固定節目包括美食、頒發年度最佳創意獎和現場音樂舞蹈。`,`與公司郊遊不同，重要合作夥伴可作為受邀嘉賓參加夏日派對。體育活動在我們公司非常重要。跑步小組甚至已經參加過馬拉松比賽。`],qa:[{q:`6. Zu allen Gemeinschaftsveranstaltungen dürfen Gäste mitgebracht werden.`,type:`tf`,options:[`richtig`,`falsch`],answer:1,label:`falsch`,explain:`Nur beim Sommerfest können Geschäftspartner als geladene Gäste teilnehmen – beim Betriebsausflug nicht.`},{q:`7. Der Arbeitgeber veranstaltet ein Sommerfest, ...`,type:`mc`,options:[`a) da man in den Betriebsferien gut feiern kann.`,`b) das von ausgewählten Mitarbeitern organisiert wird.`,`c) weil die meisten Mitarbeiter im Dezember viele Termine haben.`],answer:2,label:`c`,explain:`Aufgrund der hohen Termindichte in der Vorweihnachtszeit wurde das Sommerfest gewählt.`}]},{src:`[Cornelsen] Betriebliche Veranstaltungen – Infotag`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Nicht nur durch unser Sommerfest und unseren Betriebsausflug möchten wir dazu beitragen, dass alle unsere Mitarbeitenden sich in unserem Unternehmen wohlfühlen. Anfang des kommenden Jahres, im Februar oder März, soll nach fünfjähriger Pause wieder einmal ein Infotag stattfinden.`,`Wie der Name schon sagt, wollen wir uns und unsere Produkte und Dienstleistungen der Öffentlichkeit vorstellen. Nach den Erfahrungen unseres letzten Info-Tags möchten wir dieses Mal längerfristig planen und alle Mitarbeitenden in die Planung dieser Veranstaltung mitbeziehen.`,`Dazu haben wir jetzt schon eine Projektgruppe ins Leben gerufen, die sich zum ersten Mal am 10. September um 12.30 Uhr in Raum 010 treffen wird. Neben einem Terminvorschlag sollen hier mögliche Programmschwerpunkte besprochen werden.`,`Der informative Teil, also die Präsentation unserer Produkte und Erzeugnisse, wird von der Geschäftsleitung erstellt. Vielleicht können wir ein Preisausschreiben veranstalten, andere Gewinnspiele oder einen Wettbewerb für die Kinder. Teilen Sie allen Familienangehörigen mit, dass unsere Firma ein großes Fest plant – alle sind herzlich eingeladen!`],paragraphs_zh:[`我們不僅希望透過夏日派對和公司郊遊，讓所有員工在公司感到舒適。明年初，二月或三月，在中斷五年後，將再度舉辦一次資訊日。`,`顧名思義，我們希望向公眾介紹我們的公司、產品和服務。根據上次資訊日的經驗，我們這次希望提前規劃，並讓所有員工參與活動策劃。`,`為此，我們已成立了一個專案小組，將於9月10日中午12:30在010室首次開會。除了時間提案外，還將討論可能的活動重點。`,`公司資訊和產品展示部分由管理層負責準備。也許我們可以舉辦有獎競賽、抽獎或兒童比賽。請通知所有家屬，我們公司正在籌辦一場大型活動——歡迎所有人參加！`],qa:[{q:`8. Der Infotag dient der Außenpräsentation und Unterhaltung.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Wir wollen uns und unsere Produkte der Öffentlichkeit vorstellen (Information) und es gibt Unterhaltungsprogramm.`},{q:`9. Die Mitarbeitenden sollen ...`,type:`mc`,options:[`a) für die Durchführung der Veranstaltung verantwortlich sein.`,`b) der Geschäftsführung ihre Terminvorschläge bekanntgeben.`,`c) aktiv bei der Vorbereitung mitmachen.`],answer:2,label:`c`,explain:`Alle Mitarbeitenden sollen in die Planung mitbezogen werden – sie sollen aktiv bei der Vorbereitung mitmachen.`}]}]},
{title:`T3: Arbeitszeiten（工作時間）`,color:`#7B3F00`,texts:[{src:`[Cornelsen] Arbeitszeiten`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Die wöchentliche Arbeitszeit beträgt 40 Stunden – bei einem Arbeitstag von acht Stunden, wobei die Pausen nicht mitgerechnet werden. Betriebsbedingt ist es möglich, dass Sie bis zu zehn Stunden pro Tag arbeiten. Diese Mehrarbeit ist aber nur in Ausnahmefällen erlaubt und muss innerhalb von sechs Monaten ausgeglichen werden.`,`Wir haben flexible Arbeitszeiten. Zwischen 10 und 15 Uhr, in der sogenannten Kernzeit, müssen Sie jedoch anwesend sein. Gleitzeitzeiten sind zwischen 8 und 10 Uhr und 15 und 17 Uhr.`,`Unser elektronisches Zeiterfassungssystem registriert täglich die Zahl der geleisteten Arbeitsstunden auf Ihrem persönlichen Arbeitszeitkonto. Ihre Überstunden sollten vor Monatsende abgebaut werden.`,`Wenn ein Abbau nicht möglich ist, wird mit der Geschäftsführung eine rasche Lösung besprochen. Aus betrieblichen Gründen kann der Arbeitgeber die Gleitzeitregelung vorübergehend aussetzen.`],paragraphs_zh:[`每週工作時間為40小時——每工作日8小時，不含休息時間。因業務需要，您可能每天工作最多十小時。但這些額外工作只在特殊情況下才被允許，必須在六個月內補回。`,`我們提供彈性工時。但上午10點至下午3點的核心時間內，您必須出勤。彈性工時時間為早上8至10點及下午3至5點。`,`我們的電子工時記錄系統每天記錄您的工時。加班時數應在月底前消化完畢。`,`若無法做到，將與管理層討論快速解決方案。基於業務原因，彈性工時規定可能暫時暫停。`],qa:[{q:`6. Die Beschäftigten dürfen mit der Arbeit anfangen, wann sie wollen.`,type:`tf`,options:[`richtig`,`falsch`],answer:1,label:`falsch`,explain:`In der Kernzeit (10–15 Uhr) müssen alle anwesend sein – man kann also nicht beliebig anfangen.`},{q:`7. Ergibt sich auf einem Arbeitszeitkonto ein Plus, ...`,type:`mc`,options:[`a) kann der Betrieb den Acht-Stunden-Tag verlängern oder verkürzen.`,`b) ist schnellstmöglich ein Ausgleich zu finden.`,`c) kann der Betrieb die Gleitzeitregelungen ändern.`],answer:1,label:`b`,explain:`Überstunden sollten vor Monatsende abgebaut werden; wenn nicht möglich, wird schnellstmöglich eine Lösung besprochen.`}]},{src:`[Klett] Arbeitszeit und Arbeitszeitgestaltung (Sabbatical)`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`Die wöchentliche Arbeitszeit in der Produktion beträgt 36,5 Stunden. Für den Verwaltungsbereich gelten 39 Stunden. Von Ihnen geleistete Mehrarbeit wird auf Ihrem Arbeitszeitkonto gutgeschrieben. Nach Absprache mit Ihrer Teamleitung können Sie einen Freizeitausgleich vornehmen.`,`Als einer der ersten Arbeitgeber in der Region haben wir als Instrument der flexiblen Arbeitszeitgestaltung das Sabbatical eingeführt. Das Sabbatical ist eine befristete Unterbrechung des Arbeitslebens, die von drei Monaten bis zu einem Jahr reichen kann.`,`Das Arbeitsentgelt in dieser Zeit kann durch unterschiedliche Möglichkeiten finanziert werden, z.B. durch freiwilligen Lohnverzicht, die Umwandlung in eine Teilzeitbeschäftigung oder das Ansparen von Arbeitszeitguthaben.`,`Stimmt die Geschäftsleitung zu, kann das Sabbatical beliebig oft wiederholt werden. Nach Ihrer Rückkehr tritt Ihr ursprünglicher Arbeitsvertrag wieder in Kraft und Sie werden in der gleichen Position weiterbeschäftigt.`],paragraphs_zh:[`生產部門的每週工作時間為36.5小時。行政部門為39小時。您完成的額外工作將記入您的工時帳戶。與您的團隊主管協商後，您可以進行補休。`,`作為該地區最早的雇主之一，我們引入了職業中斷假作為彈性工時管理工具。職業中斷假是一種有期限的職業生涯中斷，可從三個月至一年。`,`此期間的薪資可通過不同方式籌措，例如自願放棄薪資、轉為兼職工作或積攢工時儲蓄。`,`如果管理層同意，職業中斷假可以重複申請任意次數。回來後，您原來的勞動合約重新生效，您將在相同職位繼續工作。`],qa:[{q:`8. In diesem Betrieb gibt es unterschiedliche Arbeitszeitmodelle.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Es gibt verschiedene Wochenstunden (36,5 für Produktion, 39 für Verwaltung) und das Sabbatical als Sondermodell.`},{q:`9. Wer ein Sabbatical macht, ...`,type:`mc`,options:[`a) arbeitet zwei Monate weniger im Jahr.`,`b) kehrt danach an den alten Arbeitsplatz zurück.`,`c) verdient in dieser Zeit kein Geld.`],answer:1,label:`b`,explain:`Nach der Rückkehr tritt der ursprüngliche Arbeitsvertrag wieder in Kraft – man wird in der gleichen Position weiterbeschäftigt.`}]}]},
{title:`T4: Datenschutz（資料保護）`,color:`#6A1B9A`,texts:[{src:`[Cornelsen] Datenschutz`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Unser Betrieb legt auf Datenschutz großen Wert. Die Mitarbeitenden sind verpflichtet, alle Firmenereignisse vertraulich zu behandeln. Die private E-Mail-Nutzung ist nicht erlaubt, und im gesamten Betrieb dürfen keine privaten Fotos gemacht werden.`,`Ihre bei der Personalstelle gespeicherten Daten werden an niemand anderen weitergegeben. Sollte der Betrieb Fotos für Werbezwecke machen wollen, geht das nur mit Ihrer persönlichen Zustimmung.`,`Da der Datenschutz ein sehr komplexer Bereich ist, bieten wir für alle neuen Mitarbeitenden Datenschutzschulungen an – die Teilnahme ist verpflichtend.`,`In den Seminaren erfahren Sie, in welchen Abteilungen Sie spezielle Zugangscodes benötigen und wie mit Passwörtern umzugehen ist. Gerade in Zeiten zunehmender Cyberkriminalität ist IT-Sicherheit absolut notwendig. Fragen beantwortet unsere Datenschutzbeauftragte Frau Herz, Durchwahl -111.`],paragraphs_zh:[`我們公司非常重視資料保護。員工有義務將所有公司事務保密處理。私人電子郵件的使用不被允許，公司內不得拍攝私人照片。`,`您的個人資料不會被轉交給任何其他人。若公司欲拍攝廣告照片，必須取得您的個人同意。`,`由於資料保護很複雜，我們為所有新員工提供強制性資料保護培訓。`,`在研討會上，您將學習存取碼管理和密碼處理。在網路犯罪日益增加的時代，IT安全絕對必要。如有疑問，請聯繫Herz女士，分機-111。`],qa:[{q:`8. Sowohl betriebliche Daten als auch die Daten der Mitarbeitenden sollen geschützt werden.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Der Text betont sowohl den Schutz von Firmendaten als auch den Schutz persönlicher Daten der Mitarbeitenden.`},{q:`9. Die Mitarbeitenden ...`,type:`mc`,options:[`a) müssen Schulungen zum Datenschutz besuchen.`,`b) werden auf Schulungen Passwörter für ihre Arbeit bekommen.`,`c) dürfen aus Sicherheitsgründen im Betrieb weder ihre Smartphones benutzen noch persönliche E-Mails schreiben.`],answer:0,label:`a`,explain:`Die Teilnahme an den Datenschutzschulungen ist verpflichtend.`}]}]},
{title:`T5: Fortbildungen & Schulungen（進修與培訓）`,color:`#B71C1C`,texts:[{src:`[Cornelsen] Fortbildungen, Schulungen, Seminare`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Wir freuen uns, mitteilen zu können, dass im September im Nebengebäude unser eigenes Schulungs- und Seminarzentrum eröffnet hat. Wir haben ein umfassendes Fortbildungsprogramm entwickelt, mit Kursen, die Sie befähigen, sich für Ihre Arbeit weiterzuqualifizieren.`,`Ihre Teilnahme an diesen Fortbildungen ist erforderlich. Sie finden während der Arbeitszeit statt und wir übernehmen selbstverständlich die Kosten.`,`Außerdem gibt es im Rahmen der betrieblichen Gesundheitsförderung in Zusammenarbeit mit den Krankenkassen ein reichhaltiges Angebot an Seminaren. Diese Veranstaltungen werden von uns bezuschusst.`,`In unserer Broschüre geben wir einen Überblick über die im nächsten Halbjahr stattfindenden Gesundheitskurse.`],paragraphs_zh:[`我們很高興地通知您，九月我們自己的培訓和研討中心已在附屬樓開幕。我們制訂了全面的進修計劃，使您能夠持續提升工作資格。`,`您的參加是必要的。進修在工作時間內進行，我們當然承擔所有費用。`,`此外，在公司健康促進計劃框架內，與保險公司合作提供了豐富的研討會。這些活動由我們資助。`,`在我們的小冊子中，提供了下半年健康課程的概覽。`],qa:[{q:`6. Die Kosten für die Kurse und Seminare übernimmt der Arbeitgeber.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Die Fortbildungen finden während der Arbeitszeit statt und der Betrieb übernimmt selbstverständlich die Kosten.`},{q:`7. Die Mitarbeitenden können selbst entscheiden, ...`,type:`mc`,options:[`a) welcher Gesundheitskurs für sie der passende ist.`,`b) welche Schulungen eingerichtet werden.`,`c) ob sie an den Fortbildungsveranstaltungen teilnehmen.`],answer:0,label:`a`,explain:`Man kann den Gesundheitskurs wählen, der den eigenen Bedürfnissen entspricht. Die Fortbildungen selbst sind verpflichtend.`}]}]},
{title:`T6: Fuhrpark & Firmenparkplatz（公務車隊與停車場）`,color:`#00695C`,texts:[{src:`[Cornelsen] Fuhrpark und Firmenparkplatz`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Für notwendige Fahrten stehen den Mitarbeitenden des Außendienstszehn Firmenwagen und drei E-Bikes zur Verfügung. Die Fahrzeuge dürfen nur dienstlich genutzt werden. Wenn Sie einen Firmenwagen benötigen, melden Sie sich beim Empfang und tragen Sie sich in eine Liste ein.`,`Auf dem Firmenparkplatz im Innenhof können Sie ohne Parkgebühr parken – die Plätze 15–20 sind jedoch für Kunden reserviert.`,`An beiden Seiten gibt es überdachte Fahrradstellplätze; Ladeoptionen für E-Bike-Akkus befinden sich neben den Duschräumen.`,`Da immer mehr Mitarbeitende auf das Fahrrad umgestiegen sind, gibt es zurzeit keine größeren Engpässe – die Nutzung bleibt kostenlos. Bitte schauen Sie aber auch nach öffentlichen Parkplätzen rund um den Kaiserplatz.`],paragraphs_zh:[`公司有十輛公務車和三輛電動自行車供外勤員工用於必要出行。車輛只能用於公務目的。如需公務車，請到前台登記並填寫預約表。`,`在內院的公司停車場可以免費停車——但15至20號車位為客戶保留。`,`兩側有帶頂棚的自行車停放點；電動自行車電池的充電設施位於淋浴室旁。`,`由於越來越多員工改騎自行車，目前沒有嚴重的停車位不足——停車場暫時仍免費使用。也請留意凱澤廣場周邊的公共停車場。`],qa:[{q:`8. Es ist nicht sicher, ob die Nutzung des Firmenparkplatzes kostenlos bleiben kann.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Es heißt "zurzeit noch kostenlos" – das impliziert, dass es sich ändern könnte.`},{q:`9. Auf dem Firmenparkplatz ...`,type:`mc`,options:[`a) dürfen nur Mitarbeitende der Firma parken.`,`b) darf geparkt werden, wenn es keine öffentlichen Parkplätze mehr gibt.`,`c) können Fahrräder auch bei schlechtem Wetter geschützt abgestellt werden.`],answer:2,label:`c`,explain:`Es gibt überdachte Fahrradstellplätze an beiden Seiten des Firmenparkplatzes.`}]}]},
{title:`T7: Mitarbeitersuche（招募人才）`,color:`#0277BD`,texts:[{src:`[Klett] Mitarbeitersuche`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`Wir sind sehr stolz darauf, dass unsere Firma seit 20 Jahren stetig wächst. Bundesweit haben wir mittlerweile ein Netz aus 32 Filialen mit etwa 400 Mitarbeitenden aufgebaut. In den nächsten Jahren ist unser großes Ziel, uns auf den internationalen Markt zu vergrößern. Daher ist unser Unternehmen ständig auf der Suche nach qualifizierten und motivierten Mitarbeitenden.`,`Auch im Nachbarland sind bereits Stellen ausgeschrieben und Bewerbungsprozesse laufen. Wenn Sie Interesse haben, sich zu verändern, wenden Sie sich bitte direkt an die Personalabteilung.`,`Das Vertrauen, das wir in Sie haben, haben wir auch in Ihr Netzwerk. Deshalb möchten wir Sie auf ein neues Angebot hinweisen: Machen Sie Freunde und Bekannte auf unsere Stellenanzeigen aufmerksam und sichern Sie sich eine Prämie!`,`Als Dank erhalten Sie eine Vermittlungsprämie von bis zu 300 Euro. Die genauen Voraussetzungen können Sie dem Dokument im Intranet entnehmen. Weitere Fragen beantwortet Ihnen gerne Frau Helga Jahn aus der Personalabteilung.`],paragraphs_zh:[`我們非常自豪，公司已穩定成長了20年。我們在全國建立了一個擁有約400名員工的32家分公司網絡。未來幾年，我們的重大目標是向國際市場擴展。因此，我們公司一直在尋找有資格且有積極性的員工。`,`在鄰國也已發布職缺並啟動了招募流程。如果您有興趣轉換工作，請直接聯繫人事部門。`,`我們對您的信任也延伸到您的人際網絡。因此我們想介紹一個新優惠：請讓朋友和熟人注意我們的徵才廣告，為自己爭取一筆獎金！`,`作為感謝，您將獲得高達300歐元的介紹獎金。詳細的領取條件您可以從內網文件中查閱。如有其他問題，人事部門的Helga Jahn女士樂意為您解答。`],qa:[{q:`1. Die Firma sucht Mitarbeiter/innen im In- und Ausland.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Auch im Nachbarland sind bereits Stellen ausgeschrieben – die Firma sucht also international.`},{q:`2. Wenn man eine Belohnung bekommen will, ...`,type:`mc`,options:[`a) der Firma einen neuen Mitarbeiter/eine neue Mitarbeiterin vermittelt.`,`b) in einer neuen Filiale der Firma anfängt.`,`c) Stellenangebote der Firma weiterleitet.`],answer:0,label:`a`,explain:`Man erhält eine Vermittlungsprämie, wenn man erfolgreich neue Mitarbeitende wirbt und ein Arbeitsvertrag abgeschlossen wird.`}]}]},
{title:`T8: Verpflegung & Kantine（飲食與餐廳）`,color:`#E65100`,texts:[{src:`[Telc online 02] Verpflegung`,badgeCls:`telc`,badgeLabel:`[Telc DTB]`,paragraphs:[`Im ersten Stock des Hauptgebäudes befindet sich unsere Kantine. Dort werden täglich drei warme Hauptgerichte angeboten. Einen Salat kann man sich am reichhaltigen Salatbuffet nach Belieben selbst zusammenstellen. Täglich bietet die Küche eine Suppe und verschiedene Süßspeisen an. In der Personalabteilung können hierfür Essensmarken käuflich erworben werden.`,`In jedem Stockwerk befindet sich außerdem ein Pausenraum. Diese Räume sind jeweils mit einer Kaffeemaschine, einer Mikrowelle, einem Kühlschrank und einer Spülmaschine ausgestattet. Geschirr, Gläser und Besteck stehen ebenfalls zur Verfügung und befinden sich in den dafür vorgesehenen Schränken.`,`Bitte achten Sie darauf, benutztes Geschirr in die Spülmaschine zu räumen und den Raum sauber zu halten. Die Spülmaschine ist von den Kolleginnen und Kollegen regelmäßig anzustellen bzw. auszuräumen.`,`Kaffee, Milch und Mineralwasser werden von der Firma kostenfrei zur Verfügung gestellt und vom Hausmeister regelmäßig aufgefüllt. Außerdem stehen in den Pausenräumen Obstkörbe, die einmal wöchentlich mit frischen Früchten der Saison bestückt werden.`],paragraphs_zh:[`主樓一樓設有我們的員工餐廳。每天提供三道熱主菜。您可以在豐富的沙拉自助吧隨意搭配沙拉。廚房每天還提供湯品和各種甜點。餐券可在人事部門購買。`,`此外每層樓都有一個休息室。這些休息室各配備一台咖啡機、微波爐、冰箱和洗碗機。餐具、玻璃杯和刀叉也可取用，存放在指定的櫃子裡。`,`請注意將用過的餐具放入洗碗機並保持房間整潔。洗碗機需要同事們定期啟動和清空。`,`咖啡、牛奶和礦泉水由公司免費提供，並由管理員定期補充。此外，休息室還設有水果籃，每週一次補充當季新鮮水果。`],qa:[{q:`6. Das Unternehmen organisiert die Verpflegung für die Mitarbeitenden.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Das Unternehmen betreibt die Kantine, stellt Pausenräume mit Geräten bereit und stellt Kaffee, Milch und Wasser kostenfrei zur Verfügung.`},{q:`7. Die Mitarbeitenden ...`,type:`mc`,options:[`a) kaufen jede Woche frisches Obst.`,`b) müssen ihr eigenes Geschirr mitbringen.`,`c) sollen den Geschirrspüler selbst bedienen.`],answer:2,label:`c`,explain:`Die Spülmaschine ist von den Kolleginnen und Kollegen regelmäßig anzustellen bzw. auszuräumen.`}]},{src:`[Klett] Essensgutscheine`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`Um in der Mittagspause vergünstigt zu essen, können Sie Gutscheine im Wert von 6,50 Euro erwerben. Diese sind uneingeschränkt in unserer Cafeteria sowie im Restaurant Krönchen in der Sigmundstraße 12 einlösbar, dort allerdings nur für das Tagesmenü.`,`Sie können die Essensgutscheine über unser Internetportal anfordern. Geben Sie bis zum 25. jeden Monats die Anzahl der Gutscheine an, die Sie für den Folgemonat einlösen möchten. Die Abrechnung erfolgt über die Gehaltsabrechnung.`,`Gutscheine, die Sie nicht einlösen, sind auch in den nächsten Monaten noch gültig. Bis jeweils zum Donnerstag der Vorwoche müssen Sie außerdem angeben, welche Mittagsmenüs Sie in der folgenden Woche in der Cafeteria essen möchten.`,`Bitte beachten Sie, dass die Gutscheine nur durch Mitarbeiter eingelöst werden dürfen. Für Geschäftsbesuch sind Gästekarten über die jeweilige Assistenz oder direkt in der Personalabteilung erhältlich.`],paragraphs_zh:[`為了在午休時以優惠價格用餐，您可以購買價值6.50歐元的折扣券。這些折扣券可在我們的咖啡廳及Sigmundstraße 12號的Krönchen餐廳無限制使用，但在後者只能用於當日特餐。`,`您可以通過我們的網路入口申請餐飲折扣券。請在每月25日前告知您下個月希望使用的折扣券數量。費用通過薪資結算。`,`未使用的折扣券在之後幾個月仍然有效。您還必須在前一週的週四之前告知您下週在咖啡廳想吃的午餐菜單。`,`請注意折扣券只能由員工兌換。商務訪客的賓客卡可通過相關助理或直接在人事部門獲取。`],qa:[{q:`6. Das Mittagessen muss in der Woche vorher gewählt werden.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Bis zum Donnerstag der Vorwoche muss man angeben, welche Mittagsmenüs man in der folgenden Woche essen möchte.`},{q:`7. Die Gutscheine für das vergünstigte Essen ...`,type:`mc`,options:[`a) kann man am Monatsende abholen.`,`b) sind nur für Angestellte der Firma erhältlich.`,`c) verfallen nach einem Monat.`],answer:1,label:`b`,explain:`Die Gutscheine dürfen nur durch Mitarbeiter eingelöst werden. Für Gäste gibt es Gästekarten.`}]},{src:`[Klett] Gemeinschaftsküchen`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`In unserem Betrieb haben wir zwei kleine Gemeinschaftsküchen, die alle Mitarbeitenden nutzen können. Für die Benutzung der Küchen gelten folgende Regeln: Die Küchen sind mit Geschirrspülautomaten, Kaffeevollautomaten und Wasserkochern ausgestattet, die Küche im 2. OG verfügt auch über eine Mikrowelle.`,`Die Geräte werden von einer externen Firma gewartet. Das Be- und Entladen des Geschirrspülers sowie das Nachfüllen von Kaffee, Wasser und Milch sind jeweils zwei Mitarbeitende verantwortlich. Wer Küchendienst hat, wird auf Plänen in den Küchen ausgehängt.`,`Die Einteilung erfolgt automatisch in alphabetischer Reihenfolge nach den Nachnamen der Mitarbeitenden und berücksichtigt Urlaubszeiten, soweit sie frühzeitig eingereicht wurden. Wenn Änderungen notwendig sind, bitten wir diese schnellstmöglich an Frau Schubert zu melden.`,`In beiden Küchen stehen Wasserspender für gekühltes Wasser. Das Wasser ist für alle Mitarbeitenden kostenlos. Die Tanks werden täglich einmal am Abend von Herrn Nguyen vom externen Facilitymanagement ausgetauscht.`],paragraphs_zh:[`我們公司有兩個所有員工都可以使用的小型共用廚房。廚房使用規則如下：廚房配備洗碗機、全自動咖啡機和電熱水壺，2樓的廚房還配有微波爐。`,`設備由一家外部公司維護。每個廚房各有兩名員工負責洗碗機的裝卸以及咖啡、水和牛奶的補充。誰值廚房班，計劃表張貼在廚房。`,`值班安排按員工姓氏字母順序自動排列，並考慮提前提交的休假時間。如需更改，請盡快通知Schubert女士。`,`兩個廚房都有冷水飲水機。水對所有員工免費。水箱每天晚上由外部設施管理的Nguyen先生更換一次。`],qa:[{q:`6. In beiden Küchen ist eine Kochmöglichkeit vorhanden.`,type:`tf`,options:[`richtig`,`falsch`],answer:1,label:`falsch`,explain:`Nur die Küche im 2. OG verfügt über eine Mikrowelle – die andere Küche hat keine Kochmöglichkeit.`},{q:`7. Der Küchendienst ...`,type:`mc`,options:[`a) erfolgt nach einem festen System.`,`b) ist für die Mitarbeitenden freiwillig.`,`c) wird von einer Mitarbeiterin eingeteilt.`],answer:0,label:`a`,explain:`Die Einteilung erfolgt automatisch in alphabetischer Reihenfolge nach den Nachnamen – das ist ein festes System.`}]}]},
{title:`T9: Krankmeldung & Urlaubsvertretung（病假與休假代理）`,color:`#AD1457`,texts:[{src:`[Telc online 02] Krankmeldung`,badgeCls:`telc`,badgeLabel:`[Telc DTB]`,paragraphs:[`Wenn Sie aus Krankheitsgründen nicht in der Lage sind, zur Arbeit zu kommen, ist dies dem Arbeitgeber unverzüglich mitzuteilen. Das heißt, dass Sie einem bzw. einer Vorgesetzten am ersten Tag Ihrer Krankheit spätestens zu Beginn Ihrer Arbeitszeit von Ihrer Arbeitsunfähigkeit berichten. Außerdem müssen Sie ihn oder sie über die voraussichtliche Dauer Ihrer Abwesenheit informieren.`,`Dies kann formlos per Telefon oder per E-Mail erfolgen. Bitte beachten Sie, dass eine Mitteilung an die Kollegen nicht ausreicht! Dauert die Arbeitsunfähigkeit länger als drei Tage, ist in unserem Unternehmen eine Arbeitsunfähigkeitsbescheinigung (AU) vom Arzt vorzulegen. Diese muss spätestens am vierten Tag nach Krankheitsbeginn im Unternehmen ankommen.`,`Wichtig ist, dass hierbei die Kalendertage, nicht die Arbeitstage berücksichtigt werden. In Ausnahmefällen kann der Arbeitgeber auch eine Krankmeldung bereits ab dem ersten Tag fordern, ohne dafür Gründe angeben zu müssen.`,`Sollten Sie im Urlaub krank werden, müssen Sie sich ebenfalls unverzüglich bei Ihrer bzw. Ihrem Vorgesetzten melden. Der Urlaub in den Tagen der Krankheit gilt dann als nicht angetreten und Sie bekommen diese Urlaubstage gutgeschrieben. Wenn Sie sich um ein krankes Kind kümmern müssen, ist der Arbeitgeber ebenfalls sofort zu informieren. In diesem Fall ist ein Nachweis vom Kinderarzt notwendig.`],paragraphs_zh:[`若您因病無法上班，必須立即通知雇主。即在生病第一天最遲在您的上班時間開始前，向一位主管報告您無法工作。此外，您還必須告知預計缺席的時間長度。`,`這可以通過電話或電子郵件非正式地進行。請注意，通知同事是不夠的！若無法工作超過三天，必須向公司出示醫生開具的病假證明（AU）。這份證明最遲必須在生病後第四天到達公司。`,`重要：此處計算的是日曆天數，而非工作天數。特殊情況下，雇主也可以要求從第一天起提交病假通知，無需說明原因。`,`若您在休假期間生病，也必須立即通知您的主管。生病期間的假期視為未使用，這些假期天數將歸還給您。若您需要照顧生病的孩子，也必須立即通知雇主，並需要兒科醫生的證明。`],qa:[{q:`8. Im Krankheitsfall ist man verpflichtet, umgehend den Arbeitgeber in Kenntnis zu setzen.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Die Krankmeldung muss unverzüglich erfolgen – spätestens zu Beginn der Arbeitszeit am ersten Krankheitstag.`},{q:`9. Bei Krankheit ...`,type:`mc`,options:[`a) bekommt man zusätzliche Urlaubstage.`,`b) kann man bis zu drei Tage ohne ärztliches Attest zu Hause bleiben.`,`c) muss man bereits am ersten Tag einen Arzt aufsuchen.`],answer:1,label:`b`,explain:`Erst nach mehr als drei Tagen Arbeitsunfähigkeit ist eine Arbeitsunfähigkeitsbescheinigung (AU) vorzulegen.`}]},{src:`[Klett] Urlaubsvertretung`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`Um sicherzustellen, dass der Arbeitsalltag auch während Ihrer Abwesenheit störungsfrei funktioniert, wird zusammen mit der Teamleitung eine Vertretung bestimmt. In einem gemeinsamen Gespräch wird geklärt, welche Aufgaben Priorität haben. Falls nötig, werden mehrere Personen mit der Vertretung beauftragt.`,`Einige Tage vor Ihrem Urlaubsbeginn findet eine Übergabe statt, bei der Sie in einem persönlichen Gespräch mit Ihrer Vertretung die Aufgaben durchgehen und wichtige Informationen austauschen. Denken Sie bitte daran, Ihrer Vertretung alle relevanten Zugangsdaten mitzuteilen, damit sie auf wichtige Informationen und Dokumente zugreifen kann. Wir empfehlen zusätzlich ein Übergabeprotokoll zu erstellen.`,`Damit Kundenanfragen innerhalb der vorgesehenen 48 Stunden beantwortet werden können, werden E-Mails bei Abwesenheit grundsätzlich weitergeleitet. Verwenden Sie dafür bitte ausschließlich unseren Standardtext (siehe S. 6) und denken Sie daran, die Abwesenheitsnotiz rechtzeitig zu aktivieren.`,`Damit der Wiedereinstieg nach dem Urlaub gut gelingt, vereinbaren Sie für den ersten Arbeitstag bitte einen Termin mit Ihrer Vertretung. Dort bringt die Kollegin oder der Kollege Sie auf den aktuellen Stand.`],paragraphs_zh:[`為確保您不在期間工作正常進行，將與團隊主管共同確定一位代理人。在共同會議中，確定哪些工作優先處理。若有需要，可指定多人代理。`,`假期開始前幾天進行工作交接，您將與代理人當面逐一交接工作任務並交換重要信息。請記得將所有相關登入資料告知代理人，以便其能訪問重要信息和文件。我們建議另外製作交接記錄。`,`為確保客戶詢問能在規定的48小時內得到回覆，缺席期間的電子郵件原則上將被轉發。請務必使用我們的標準文本（見第6頁），並記得及時啟動自動回覆通知。`,`為使假期後重返工作順利，請在第一個工作日與您的代理人約好時間。同事會讓您了解最新情況。`],qa:[{q:`3. Die Firma erwartet, dass vor und nach dem Urlaub eine persönliche Übergabe gemacht wird.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Vor dem Urlaub findet eine Übergabe statt; nach dem Urlaub soll man einen Termin mit der Vertretung vereinbaren, um auf den aktuellen Stand gebracht zu werden.`},{q:`4. Die Angestellten entscheiden selbst, ...`,type:`mc`,options:[`a) ob sie ein Übergabeprotokoll schreiben möchten.`,`b) ob sie ihre E-Mails an die Vertretung weiterleiten.`,`c) wie sie die Abwesenheitsnotiz formulieren.`],answer:2,label:`c`,explain:`Für die Abwesenheitsnotiz wird ein Standardtext empfohlen – die genaue Formulierung können die Mitarbeitenden aber selbst gestalten.`}]}]},
{title:`T10: Büro & Arbeitsplatz（辦公室與工作環境）`,color:`#4527A0`,texts:[{src:`[Klett] Bürostrukturen – Desk-Sharing`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`Wie Sie wissen, haben Sie Anspruch auf drei Tage Homeoffice pro Woche. Für die Zeit, in der Sie im Unternehmen arbeiten (Präsenztage), bieten wir Ihnen im Rahmen des Desk-Sharings flexible Arbeitsplätze.`,`In unserem Großraumbüro stehen acht Schreibtische mit gleicher Ausstattung inklusive Steckdosen und USB-Anschlüssen, die von allen Teammitgliedern genutzt werden können. Die Schreibtische sind frei wählbar – nach dem Prinzip Wer zuerst kommt, mahlt zuerst.`,`Damit das Desk-Sharing funktioniert, bitten wir Sie, einige Richtlinien zu beachten: Belegen Sie einen Schreibtisch bitte nur, wenn Sie wirklich daran arbeiten. Das heißt, dass der Arbeitsplatz auch für längere Pausen wieder geräumt werden muss. Für Ihre Unterlagen und Ihre persönlichen Gegenstände erhalten Sie einen Rollcontainer zur alleinigen Nutzung.`,`Neben dem Großraumbüro stehen Ihnen im ersten Stock mehrere Besprechungsräume und kleine Büros, in denen Sie Telefonate führen können, zur Verfügung. Auch der Pausenraum kann außerhalb der Mittagszeit für informelle Meetings genutzt werden.`],paragraphs_zh:[`如您所知，您每週有權享有三天居家辦公。在您到公司上班的日子（到場日），我們在「共用辦公桌」制度框架內提供靈活的工作站。`,`我們的開放式辦公室設有八張配備相同的辦公桌，包括插座和USB接口，所有團隊成員都可以使用。辦公桌可自由選擇——按照先到先得的原則。`,`為使「共用辦公桌」制度順利運作，請您遵守幾項規定：只有在您真正要在辦公桌前工作時才佔用它。也就是說，較長時間的休息也必須清空工作站。您將獲得一個專屬的活動櫃，用於存放文件和個人物品。`,`除了開放式辦公室外，一樓還有幾個會議室和小辦公室供您使用。休息室在午餐時間以外也可用於非正式會議。`],qa:[{q:`1. Die Angestellten werden gebeten, die Schreibtische nicht unnötig zu blockieren.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Ein Schreibtisch soll nur belegt werden, wenn man wirklich daran arbeitet – bei längeren Pausen muss er geräumt werden.`},{q:`2. Sie dürfen ...`,type:`mc`,options:[`a) Meetings auch außerhalb der Besprechungsräume abhalten.`,`b) ihre Sachen während der Pausen auf dem Schreibtisch lassen.`,`c) persönliche Dinge nicht mit ins Großraumbüro bringen.`],answer:0,label:`a`,explain:`Der Pausenraum kann außerhalb der Mittagszeit für informelle Meetings genutzt werden.`}]},{src:`[Klett] Arbeiten im Großraumbüro`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`In unserem Unternehmen gibt es in der dritten Etage einen großen Raum, in dem mehrere Schreibtische stehen. Jeder Schreibtisch hat ein Telefon und Anschlüsse für mobile digitale Arbeitsgeräte. Der Raum steht Teilzeitkräften ohne eigenes Büro sowie Gästen zur Verfügung.`,`Die Schreibtische sind nach drei Seiten durch Stellwände abgetrennt, sodass man auch in einem Großraumbüro konzentriert arbeiten kann. Außerdem gibt es einen extra Tisch, auf dem Unterlagen oder größere Pläne abgelegt werden können. Büromaterialien und Kopierer befinden sich in einem Nebenraum am Eingang.`,`Bitte räumen Sie am Ende des Arbeitstages alle Unterlagen auf und hinterlassen Sie den Schreibtisch sauber. Getränke sind am Arbeitsplatz erlaubt. Essen dagegen dürfen Sie nur in den Pausenräumen und in der Kantine.`,`Achten Sie bitte darauf, beim Telefonieren oder Kommunizieren per Videokonferenz nicht zu laut zu sprechen.`],paragraphs_zh:[`我們公司三樓有一個設有多張辦公桌的大辦公室。每張辦公桌都有電話和移動數位設備的接口。該空間供沒有個人辦公室的兼職員工和訪客使用。`,`辦公桌三側都有隔板隔開，讓人可以在開放式辦公室也能專注工作。此外，還有一張額外的桌子可以放文件或較大的計劃圖。辦公文具和影印機在入口附近的側室。`,`請在每個工作日結束時整理所有文件並保持辦公桌整潔。工作場所允許喝飲料，但吃東西只能在休息室和員工餐廳進行。`,`打電話或進行視訊會議時，請注意不要說話太大聲。`],qa:[{q:`6. Im Unternehmen arbeiten die Mitarbeitenden in Großraumbüros.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Im Text wird beschrieben, dass es in der dritten Etage einen großen Raum mit mehreren Schreibtischen gibt.`},{q:`7. Die Unternehmensleitung bittet darum, ...`,type:`mc`,options:[`a) Essensreste von den Schreibtischen zu räumen.`,`b) keine privaten Arbeitsmittel zu nutzen.`,`c) sich beim Telefonieren leise zu verhalten.`],answer:2,label:`c`,explain:`Man soll beim Telefonieren oder Videokonferenz nicht zu laut sprechen.`}]},{src:`[Klett] Elektronisches Zugangs- und Zeiterfassungssystem`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`Für den Zugang zu unserem Firmengebäude und die Erfassung der Arbeitszeit wurde Ihnen eine elektronische Karte ausgehändigt, auf der auch Ihre Mitarbeiternummer und Ihr vollständiger Name hinterlegt sind.`,`Beim Betreten und Verlassen des Firmengebäudes halten Sie Ihre Karte an das elektronische Lesegerät, das neben dem Haupteingang an der Wand befestigt ist. Warten Sie unbedingt das grüne Signal ab, das anzeigt, dass Ihre Karte gelesen und Ihre Zeit automatisch erfasst wurde.`,`Die Pausenzeiten (siehe Anlage F) sind einzuhalten. Die gesetzlichen Ruhepausen werden vom Erfassungssystem automatisch abgezogen, wenn Sie es versäumen, sich zur Pause ab- und wieder anzumelden. Sind Anpassungen der erfassten Zeit erforderlich (z.B. bei Fehlfunktion des Lesegeräts), wenden Sie sich an Herrn Sangkam (Raum 169, Durchwahl -29).`,`Sollten Sie Probleme bei der Verwendung haben, wenden Sie sich an das Büro des Officemanagements (Raum 132). Sollte das Büro nicht besetzt sein, erreichen Sie die Assistenz der Geschäftsführung, Frau Schneider, unter der Durchwahl -22.`],paragraphs_zh:[`為了進入公司大樓和記錄工作時間，我們已向您發放了一張電子卡，上面還存有您的員工編號和全名。`,`進出公司大樓時，請將您的卡片靠近固定在主入口旁牆上的電子讀卡機。務必等待綠色信號，表示您的卡片已被讀取且時間已自動記錄。`,`必須遵守休息時間（見附件F）。如果您忘記登出和重新登入休息，法定休息時間將由記錄系統自動扣除。如需調整記錄時間（例如讀卡機故障），請聯繫Sangkam先生（169室，分機-29）。`,`如有使用問題，請聯繫辦公室管理部門（132室）。若辦公室無人，可通過分機-22聯繫管理層助理Schneider女士。`],qa:[{q:`8. Die elektronische Karte wird auch als Schlüssel verwendet.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Die Karte dient sowohl für den Zugang zum Firmengebäude (= Schlüsselfunktion) als auch für die Zeiterfassung.`},{q:`9. Die von dem System erfassten Zeiten ...`,type:`mc`,options:[`a) beinhalten die Ruhepausen.`,`b) kann man nachträglich ändern lassen.`,`c) werden am Ladegerät korrigiert.`],answer:1,label:`b`,explain:`Bei Fehlfunktionen können Anpassungen der erfassten Zeit bei Herrn Sangkam beantragt werden.`}]}]},
{title:`T12: Freizeitangebote & Benefits（休閒活動與員工福利）`,color:`#558B2F`,texts:[{src:`[Klett] Freizeitangebote & Sprachen lernen`,badgeCls:`klett`,badgeLabel:`[Klett]`,paragraphs:[`Wir wollen, dass Sie sich auch in einem großen Betrieb wohlfühlen und fördern gemeinsame Unternehmungen. Jeden letzten Freitag im Monat treffen sich interessierte Mitarbeitende um 18 Uhr, um ungezwungen zusammen zu sein und miteinander ins Gespräch zu kommen. Treffpunkt ist im Foyer, der Veranstaltungsort wechselt – achten Sie bitte auf den Aushang am Schwarzen Brett. Besonders beliebt ist im Sommer der Besuch im Biergarten im Stadtpark.`,`Dort trifft sich jeden Donnerstag um 17 Uhr eine betriebsinterne Laufgruppe, der Sie sich anschließen können. Die verschiedenen Laufstrecken sind auch für Anfänger geeignet – besonders neu zugezogene Mitarbeitende finden hier schnell Anschluss und lernen die Umgebung kennen. Wer das attraktive Umland kennenlernen will, kann sich unserer seit fünf Jahren aktiven Wandergruppe anschließen.`,`Die Unternehmensleitung hat außerdem einen Vertrag mit dem Fitness-Center Gehrlich geschlossen. Alle Mitarbeitenden können dort trainieren. Das Unternehmen beteiligt sich an den Kosten. Kulturell Interessierte sollten auf die Informationen unserer PR-Abteilung achten, über die regelmäßig Eintrittskarten für Oper, Theater, Lesungen, aber auch für Fußballspiele verlost werden.`,`Geplant sind für das nächste Jahr mehrere Inhouse-Sprachkurse. Neben Englisch soll auch der Besuch von Spanisch- und Chinesischkursen möglich sein.`],paragraphs_zh:[`我們希望您在大公司也能感到舒適，並鼓勵共同活動。每個月最後一個週五晚上6點，有興趣的員工聚在一起輕鬆交流。集合地點在大廳，活動地點有所變化——請注意公佈欄上的公告。夏天特別受歡迎的是去市立公園的啤酒花園。`,`那裡每週四下午5點有一個公司內部跑步小組，您可以加入。各種跑步路線也適合初學者——特別是新搬來的員工能在這裡迅速融入並了解周邊環境。想了解美麗周邊的人可以加入我們已活躍五年的登山健行小組。`,`公司管理層還與「Gehrlich」健身中心簽署了合同。所有員工都可以在那裡訓練，公司分擔費用。對文化感興趣的人應關注公關部門的信息，定期抽獎發放歌劇、劇場、朗讀會及足球比賽的門票。`,`明年計劃開設幾門內部語言課程。除英語外，還計劃提供西班牙語和中文課程。`],qa:[{q:`8. Im Unternehmen gibt es regelmäßig Aktivitäten nach der Arbeit.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Es gibt monatliche Treffen, eine wöchentliche Laufgruppe, eine Wandergruppe und Fitnessangebote – alles regelmäßige Aktivitäten.`},{q:`9. Die Mitarbeiterinnen und Mitarbeiter ...`,type:`mc`,options:[`a) bekommen eine Ermäßigung im Fitnesscenter.`,`b) besuchen donnerstags gerne den Biergarten.`,`c) haben Anspruch auf Veranstaltungstickets.`],answer:0,label:`a`,explain:`Das Unternehmen beteiligt sich an den Kosten für das Fitnesscenter – das entspricht einer Ermäßigung für die Mitarbeitenden.`}]}]}
];
const KEY='dtb_b2_v4';
let unfamiliar=new Set();
try{const s=localStorage.getItem(KEY);if(s)unfamiliar=new Set(JSON.parse(s));}catch(e){}
function save(){try{localStorage.setItem(KEY,JSON.stringify([...unfamiliar]));}catch(e){}}

// ── Speech ───────────────────────────────────────────────────────────────────
const synth=window.speechSynthesis;
let deVoice=null,enVoice=null,activePara=null;
function loadVoices(){
  const v=synth.getVoices();
  deVoice=v.find(x=>x.lang.startsWith('de'))||null;
  enVoice=v.find(x=>x.lang.startsWith('en'))||null;
}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=loadVoices;

function speakText(text,lang){
  synth.cancel();
  const badge=document.getElementById('speakingBadge');
  badge.classList.add('active');
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;u.voice=lang.startsWith('de')?deVoice:enVoice;u.rate=0.88;
  u.onend=u.onerror=()=>{
    badge.classList.remove('active');
    if(activePara){activePara.classList.remove('speaking');activePara=null;}
  };
  synth.speak(u);
}
function speakWord(i){const v=VOCAB[i];speakText((v.a?v.a+' ':'')+v.w,'de-DE');}
function speakKoll(i){speakText(VOCAB[i].k,'de-DE');}
function speakSatz(i){speakText(VOCAB[i].ex,'de-DE');}
function speakEn(i){speakText(VOCAB[i].en.split('/')[0].trim(),'en-US');}

function speakPara(el,text){
  if(activePara===el){
    synth.cancel();
    el.classList.remove('speaking');
    activePara=null;
    document.getElementById('speakingBadge').classList.remove('active');
    return;
  }
  if(activePara)activePara.classList.remove('speaking');
  activePara=el;
  el.classList.add('speaking');
  speakText(text,'de-DE');
}

// ── Mark ─────────────────────────────────────────────────────────────────────
function toggleMark(idx){
  if(unfamiliar.has(idx))unfamiliar.delete(idx);else unfamiliar.add(idx);
  save();renderAll();
  if(document.getElementById('exportPanel').classList.contains('visible'))renderExport();
}
let currentFilter='all';
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function clearAll(){
  if(!unfamiliar.size)return;
  if(confirm('確定要清除所有「不熟悉」標記嗎？')){unfamiliar.clear();save();renderAll();}
}

// ── Verb highlight ────────────────────────────────────────────────────────────
const VRE=/\b(einhalten|befolgen|anpassen|setzen|abschliessen|behandeln|weitergeben|geben|uebernehmen|besuchen|entwickeln|befaehigen|bezuschussen|nutzen|abstellen|reservieren|umsteigen|registrieren|aussetzen|ausgleichen|betragen|legen|dienen|planen|veranstalten|rufen|unterbreiten|mitbeziehen|werden|sein|haben|machen|leiten|informieren|ermoeglichen|vergroessern|erhalten|anbieten|teilnehmen|pruefen|klaeren|melden|ueben|halten|bringen|benutzen|abgeben|einrichten|regeln|wahren|schuetzen|beachten|trennen|foerdern|entnehmen|tragen|bedecken|ablegen|verlassen|binden|wenden|suchen|sichern|aufbauen|stellen)\b/g;
function hlV(t){return t.replace(VRE,m=>`<span class="koll-verb">${m}</span>`);}

// ── Vocab row ─────────────────────────────────────────────────────────────────
function buildRow(v,i,compact){
  const uf=unfamiliar.has(i);
  const enP=v.en.split('/').map(s=>s.trim()).join('<br>');
  const zhP=v.zh.split('/').map(s=>s.trim()).join('<br>');
  const kP=hlV(v.k);
  const dotTd=compact?'':
    `<td class="dot-cell" onclick="event.stopPropagation();toggleMark(${i})"><span class="dot"></span></td>`;
  const sc=compact?'':'speak-td';
  return `<tr class="${uf?'unfamiliar':''}">
    ${dotTd}
    <td class="${sc}" onclick="${compact?'':`speakWord(${i})`}">
      ${v.a?`<span class="artikel">${v.a}</span>`:''}<span class="word-de">${v.w}</span>${v.p?`<span class="plural">${v.p}</span>`:''}
    </td>
    <td class="${sc}" onclick="${compact?'':`speakEn(${i})`}">
      <span class="word-en">${enP}</span><span class="word-zh">${zhP}</span>
    </td>
    <td class="${sc}" onclick="${compact?'':`speakKoll(${i})`}">
      <span class="koll-de">${kP}</span><span class="koll-zh">${v.kz}</span>
    </td>
    <td class="${sc}" onclick="${compact?'':`speakSatz(${i})`}">
      <span class="satz-de">${v.ex}</span><span class="satz-zh">${v.ez}</span>
    </td>
  </tr>`;
}
function buildVocabTable(items,compact){
  const dTh=compact?'':'<th class="col-dot"></th>';
  return `<table>
    <thead><tr>${dTh}
      <th class="col-de">德文</th><th class="col-enzh">英文＋中文</th>
      <th class="col-koll">固定搭配＋中文</th><th class="col-satz">例句＋翻譯</th>
    </tr></thead>
    <tbody>${items.map(([v,i])=>buildRow(v,i,compact)).join('')}</tbody>
  </table>`;
}

// ── Text card ─────────────────────────────────────────────────────────────────
let qaState={};
function revealAnswer(qaId){
  document.getElementById('reveal-'+qaId).classList.add('hidden');
  document.getElementById('answer-'+qaId).classList.remove('hidden');
  document.getElementById('explain-'+qaId).classList.remove('hidden');
  const correctIdx=parseInt(document.getElementById('answer-'+qaId).dataset.correct);
  document.querySelectorAll(`.qa-opt[data-qa="${qaId}"]`).forEach((opt,i)=>{
    if(i===correctIdx)opt.classList.add('correct');
  });
}

function buildTextCard(tb,secIdx,textIdx){
  const cardId=`c${secIdx}_${textIdx}`;
  const zhArr=tb.paragraphs_zh||[];
  let parasHtml='';
  tb.paragraphs.forEach((para,pi)=>{
    const pid=`${cardId}_p${pi}`;
    const zhLine=zhArr[pi]||'';
    // Escape backticks and $ in para for inline onclick
    const paraEsc=para.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
    parasHtml+=`<div class="para-block">
      <div class="para-de" id="${pid}" onclick="speakPara(this,\`${paraEsc}\`)">${para}</div>
      ${zhLine?`<div class="para-zh">${zhLine}</div>`:''}
    </div>`;
  });

  let qaHtml='';
  if(tb.qa&&tb.qa.length){
    let items='';
    tb.qa.forEach((qa,qi)=>{
      const qaId=`${cardId}_q${qi}`;
      const optsHtml=qa.options.map((opt,oi)=>
        `<div class="qa-opt" data-qa="${qaId}" data-idx="${oi}">${opt}</div>`
      ).join('');
      items+=`<div class="qa-item">
        <div class="qa-q">${qa.q}</div>
        <div class="qa-options">${optsHtml}</div>
        <div class="answer-row">
          <button class="reveal-btn" id="reveal-${qaId}" onclick="revealAnswer('${qaId}')">顯示答案</button>
          <div class="hidden" id="answer-${qaId}" data-correct="${qa.answer}">
            <span class="answer-badge">✓ ${qa.label}</span>
          </div>
        </div>
        <div class="explain-text hidden" id="explain-${qaId}">${qa.explain}</div>
      </div>`;
    });
    qaHtml=`<div class="qa-block"><div class="qa-label">📝 練習題</div>${items}</div>`;
  }

  return `<div class="text-card">
    <div class="text-card-header">
      <span class="badge badge-${tb.badgeCls}">${tb.badgeLabel}</span>
      <span class="text-src">${tb.src.replace(/^\[.*?\]\s*/,'')}</span>
    </div>
    <div class="text-body">${parasHtml}</div>
    ${qaHtml}
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll(){
  const indexed=VOCAB.map((v,i)=>[v,i]);
  const secVocab={};
  indexed.forEach(([v,i])=>{if(!secVocab[v.s])secVocab[v.s]=[];secVocab[v.s].push([v,i]);});

  let html='';
  SECTIONS.forEach((sec,si)=>{
    const col=sec.color;
    const allV=secVocab[sec.title]||[];
    const filtered=allV.filter(([v,i])=>{
      if(currentFilter==='unfamiliar')return unfamiliar.has(i);
      if(currentFilter==='familiar')return !unfamiliar.has(i);
      return true;
    });
    const ufCnt=allV.filter(([v,i])=>unfamiliar.has(i)).length;

    let tableHtml=filtered.length
      ?`<div class="vocab-wrap">${buildVocabTable(filtered,false)}</div>`
      :`<div class="vocab-wrap" style="padding:14px;text-align:center;font-size:12px;color:#aaa;background:#fff">（此篩選條件下無單字）</div>`;

    let textsHtml=sec.texts.map((tb,ti)=>buildTextCard(tb,si,ti)).join('');

    html+=`<div class="section-block" id="sec-${si}">
      <div class="section-title" style="background:${col}">${sec.title}</div>
      <div class="vocab-toolbar">
        <span class="vocab-count">單字 ${allV.length} 個${ufCnt>0?` ‧ 不熟悉 ${ufCnt} 個`:''}</span>
      </div>
      ${tableHtml}
      ${textsHtml}
    </div>`;
  });

  document.getElementById('exportBtn').disabled=(unfamiliar.size===0);
  document.getElementById('mainContent').innerHTML=html;
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function scrollToSection(idx,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const el=document.getElementById('sec-'+idx);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}
function buildNav(){
  const c=document.getElementById('navBtns');
  SECTIONS.forEach((sec,i)=>{
    // Strip Chinese annotation for short nav label
    const label=sec.title.replace(/（[^）]*）/,'').trim();
    const btn=document.createElement('button');
    btn.className='nav-btn';
    btn.textContent=label;
    btn.style.cssText=`border-color:${sec.color};`;
    btn.onclick=()=>scrollToSection(i,btn);
    c.appendChild(btn);
  });
}

// ── Export ────────────────────────────────────────────────────────────────────
function groupBySec(items){
  const out={};
  items.forEach(([v,i])=>{if(!out[v.s])out[v.s]=[];out[v.s].push([v,i]);});
  return out;
}
function toggleExport(){
  const p=document.getElementById('exportPanel');
  p.classList.toggle('visible');
  if(p.classList.contains('visible'))renderExport();
}
function renderExport(){
  const words=VOCAB.map((v,i)=>[v,i]).filter(([v,i])=>unfamiliar.has(i));
  document.getElementById('exportCount').textContent=`共 ${words.length} 個單字`;
  if(!words.length){
    document.getElementById('exportContent').innerHTML='<p style="color:#aaa;font-size:13px;padding:12px 0">尚未標記任何不熟悉的單字。</p>';
    return;
  }
  let html='';
  for(const [sec,ws] of Object.entries(groupBySec(words))){
    const col=SECTIONS.find(s=>s.title===sec)?.color||'#1F4E79';
    html+=`<div class="section-block">
      <div class="section-title" style="background:${col}">${sec}</div>
      <div class="vocab-wrap">${buildVocabTable(ws,true)}</div>
    </div>`;
  }
  document.getElementById('exportContent').innerHTML=html;
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildNav();
renderAll();

// ── Checkpoint export / import ─────────────────────────────────────────────
function exportCheckpoint(){
  const ids = [...unfamiliar];
  const json = JSON.stringify({checkpoint: ids}, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'LesenII_Einweisungen_und_Unterweisungen verstehen-checkpoint.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importCheckpoint(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!data.checkpoint || !Array.isArray(data.checkpoint))
        throw new Error('格式錯誤');
      unfamiliar = new Set(data.checkpoint.map(Number));
      save();
      renderAll();
      const msg = document.getElementById('importSuccess');
      msg.classList.add('show');
      setTimeout(()=>msg.classList.remove('show'), 3000);
    } catch(err){
      alert('匯入失敗：格式錯誤，請確認檔案是否正確。');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

// ── On load: try to auto-load checkpoint JSON from same directory ─────────────
// (works when both files are uploaded to GitHub Pages together)
(async function tryAutoLoad(){
  try{
    const fname = 'LesenII_Einweisungen_und_Unterweisungen verstehen-checkpoint.json';
    const resp = await fetch(fname);
    if(!resp.ok) return;   // file not found → skip silently
    const data = await resp.json();
    if(!data.checkpoint || !Array.isArray(data.checkpoint)) return;
    // Only auto-load if localStorage is empty (first visit / new device)
    const existing = localStorage.getItem(KEY);
    if(!existing || JSON.parse(existing).length === 0){
      unfamiliar = new Set(data.checkpoint.map(Number));
      save();
      renderAll();
      const msg = document.getElementById('importSuccess');
      msg.textContent = '✓ 自動載入備份成功';
      msg.classList.add('show');
      setTimeout(()=>{ msg.classList.remove('show'); msg.textContent='✓ 匯入成功'; }, 4000);
    }
  } catch(e){ /* fetch failed = no json file present, ignore */ }
})();
