<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTB B2: Lesen Teil 2 – Wortschatz Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f0f0ee;color:#1a1a1a;font-size:14px}

/* Nav */
.nav-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #ddd;
  padding:8px 14px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.nav-title{font-size:12px;font-weight:700;color:#555;margin-right:4px;white-space:nowrap;letter-spacing:.01em}
.nav-btn{padding:4px 10px;border-radius:16px;border:1.5px solid #ccc;background:#fff;
  color:#444;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.nav-btn:hover{border-color:#888;color:#1a1a1a}
.nav-btn.active{color:#fff;border-color:transparent}
.nav-right{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:4px 10px;border-radius:14px;border:0.5px solid #ccc;background:#fff;color:#333;font-size:11px;cursor:pointer}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.clear-btn{padding:4px 9px;border-radius:14px;border:0.5px solid #f0c0c0;background:#fff;color:#c0392b;font-size:11px;cursor:pointer}
.export-btn-nav{padding:4px 10px;border-radius:14px;border:0.5px solid #ccc;background:#fff;color:#333;font-size:11px;cursor:pointer}
.export-btn-nav:disabled{opacity:.35;cursor:default}

/* Page */
.page{max-width:1200px;margin:0 auto;padding:18px 16px 60px}
.page-header{margin-bottom:16px}
.page-header h1{font-size:17px;font-weight:600;color:#1F4E79;margin-bottom:3px}
.page-header p{font-size:11px;color:#999;line-height:1.7}

/* Section */
.section-block{margin-bottom:30px;scroll-margin-top:65px}
.section-title{font-size:13px;font-weight:700;color:#fff;padding:7px 13px;
  border-radius:8px 8px 0 0;letter-spacing:.02em}

/* Vocab toolbar */
.vocab-toolbar{display:flex;align-items:center;gap:8px;padding:7px 12px;
  background:#f5f5f3;border:0.5px solid #ccc;border-bottom:none;margin-top:0}
.vocab-count{font-size:11px;color:#888}

/* Vocab table */
.vocab-wrap{border:0.5px solid #ccc;border-radius:0 0 8px 8px;overflow:hidden;margin-bottom:0}
table{width:100%;border-collapse:collapse;background:#fff;table-layout:fixed}
th{text-align:left;padding:6px 10px;background:#f5f5f3;color:#777;font-weight:500;
  font-size:11px;border-bottom:0.5px solid #e0e0e0;letter-spacing:.03em}
td{padding:7px 10px;border-bottom:0.5px solid #efefed;vertical-align:top}
tr:last-child td{border-bottom:none}
tr.unfamiliar td{background:#fff6f6}
.dot-cell{width:26px;cursor:pointer;user-select:none}
.dot-cell:hover .dot{border-color:#e24b4a}
.dot{display:block;width:9px;height:9px;border-radius:50%;border:1.5px solid #ccc;margin-top:4px;transition:all .15s}
tr.unfamiliar .dot{background:#e24b4a;border-color:#e24b4a}
.speak-td{cursor:pointer}
.speak-td:hover{background:#f0f6ff!important}
tr.unfamiliar .speak-td:hover{background:#ffe4e4!important}
.col-dot{width:26px}.col-de{width:14%}.col-enzh{width:17%}.col-koll{width:26%}.col-satz{width:43%}
.artikel{font-size:11px;color:#aaa;font-style:italic;display:block;line-height:1.4}
.word-de{font-weight:700;font-size:13px;color:#1a5fc8;display:block}
.plural{font-size:11px;color:#bbb;display:block;line-height:1.4}
.word-en{font-size:12px;color:#222;line-height:1.6;display:block}
.word-zh{font-size:11px;color:#999;font-style:italic;display:block}
.koll-de{font-size:12px;color:#222;line-height:1.6;display:block}
.koll-verb{color:#1a5fc8;font-weight:700}
.koll-zh{font-size:11px;color:#999;font-style:italic;display:block}
.satz-de{font-size:12px;color:#222;line-height:1.6;display:block}
.satz-zh{font-size:11px;color:#999;font-style:italic;display:block}

/* Text card */
.text-card{background:#fff;border:0.5px solid #ccc;border-top:none;overflow:hidden}
.text-card:last-child{border-radius:0 0 8px 8px}
.text-card-header{display:flex;align-items:center;gap:8px;padding:8px 13px;
  background:#fafaf8;border-bottom:0.5px solid #eee;border-top:1px solid #e0e0e0}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:9px;white-space:nowrap}
.badge-klett{background:#ddeafb;color:#1F4E79}
.badge-cornelsen{background:#dff0df;color:#2E7D32}
.badge-telc{background:#fde8e8;color:#B71C1C}
.text-src{font-size:12px;color:#444;font-weight:500}

.text-body{padding:10px 14px 4px}

/* Paragraph — click to speak, ZH below */
.para-block{margin-bottom:8px}
.para-de{font-size:13px;color:#1a1a1a;line-height:1.75;cursor:pointer;
  padding:3px 7px;margin:-3px -7px;border-radius:5px;transition:background .1s;display:inline-block;width:calc(100% + 14px)}
.para-de:hover{background:#eef4ff}
.para-de.speaking{background:#deeafc;outline:2px solid #1a5fc8;outline-offset:-1px}
.para-zh{font-size:11px;color:#999;font-style:italic;line-height:1.6;margin-top:3px;padding-left:2px}

/* QA */
.qa-block{border-top:0.5px solid #e8e8e8;padding:10px 14px 14px;background:#fafaf8}
.qa-label{font-size:10px;font-weight:700;color:#999;letter-spacing:.07em;margin-bottom:8px;text-transform:uppercase}
.qa-item{margin-bottom:14px}
.qa-item:last-child{margin-bottom:0}
.qa-q{font-size:13px;color:#1a1a1a;font-weight:500;margin-bottom:6px;line-height:1.5}
.qa-options{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
.qa-opt{font-size:12px;color:#444;padding:4px 10px;border-radius:6px;
  border:0.5px solid #ddd;background:#fff;line-height:1.5}
.qa-opt.correct{background:#e8f5e9;border-color:#66bb6a;color:#2e7d32;font-weight:600}
.reveal-btn{font-size:11px;color:#888;border:0.5px solid #ccc;background:#fff;
  border-radius:6px;padding:3px 10px;cursor:pointer;transition:all .15s}
.reveal-btn:hover{border-color:#1a5fc8;color:#1a5fc8}
.answer-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.answer-badge{font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;
  background:#e8f5e9;color:#2e7d32;border:0.5px solid #a5d6a7;white-space:nowrap}
.explain-text{font-size:11px;color:#888;font-style:italic;line-height:1.5;
  margin-top:5px;padding:5px 10px;background:#f5f5f3;border-radius:5px;width:100%}
.hidden{display:none}

/* Speaking badge */
.speaking-badge{position:fixed;bottom:18px;right:18px;display:none;align-items:center;gap:6px;
  font-size:12px;color:#fff;padding:6px 14px;border-radius:20px;
  background:#1a5fc8;box-shadow:0 2px 10px rgba(26,95,200,.35);z-index:200}
.speaking-badge.active{display:flex}
.speaking-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse .9s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Export panel */
.export-panel{display:none;margin-top:20px;background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:18px}
.export-panel.visible{display:block}
.export-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.export-top h2{font-size:14px;font-weight:600}
.export-actions{display:flex;gap:8px;align-items:center}
.print-btn{padding:5px 14px;border-radius:6px;border:none;background:#1a1a1a;color:#fff;font-size:12px;cursor:pointer}
.close-btn{padding:5px 12px;border-radius:6px;border:0.5px solid #ccc;background:#fff;color:#555;font-size:12px;cursor:pointer}
.export-count{font-size:11px;color:#888;background:#f5f5f3;padding:2px 10px;border-radius:14px}

@media print{
  @page{size:A4 portrait;margin:12mm 10mm}
  body *{visibility:hidden}
  #exportPanel,#exportPanel *{visibility:visible}
  #exportPanel{position:absolute;top:0;left:0;width:100%;height:auto!important;border:none!important;padding:0!important;overflow:visible!important}
  html,body{height:auto!important;overflow:hidden!important}
  .export-top{display:none!important}
  table{width:100%!important;table-layout:fixed!important;font-size:9pt!important;border-collapse:collapse!important}
  tr{page-break-inside:avoid}
  td,th{padding:4px 6px!important;border:0.5px solid #ddd!important}
  .artikel{display:block;font-size:8pt;color:#999;font-style:italic}
  .word-de{display:block;font-size:10pt;font-weight:bold;color:#1a5fc8;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .plural{display:block;font-size:8pt;color:#bbb}
  .word-en{display:block;font-size:8pt;color:#222}
  .word-zh{display:block;font-size:7pt;color:#888;font-style:italic}
  .koll-de,.satz-de{display:block;font-size:8pt;color:#222}
  .koll-verb{color:#1a5fc8;font-weight:bold;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .koll-zh,.satz-zh{display:block;font-size:7pt;color:#888;font-style:italic}
  td{background:#fff!important}
  tr.unfamiliar td{background:#fff0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th{background:#f0f0f0!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .section-title{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .col-de{width:14%}.col-enzh{width:17%}.col-koll{width:26%}.col-satz{width:43%}
}
</style>

const SECTIONS=[
{title:`T1a: Allgemeine Regelungen am Arbeitsplatz（工作場所一般規定）`,color:`#1F4E79`,texts:[{src:`[課本 Klett] Text 1 – Gesundheit am Arbeitsplatz`,badgeCls:`klett`,badgeLabel:`[課本 Klett]`,paragraphs:[`Die Gesundheit unserer Mitarbeiterinnen und Mitarbeiter ist uns ein grosses Anliegen. So sind in allen Bueros moderne, ergonomische Arbeitsplaetze eingerichtet.`,`Um die Schreibtischhoehe, den Buerostuhl und den Abstand zum Bildschirm auf Ihre Koerpergroesse einstellen zu lassen, kontaktieren Sie bitte bereits in der ersten Arbeitswoche unseren Gesundheitsbeauftragten Anton Meisner unter der Durchwahl -039.`,`Die Temperatur und Luftfeuchtigkeit in den Raeumen wird zentral geregelt. Bei Aenderungsgruenschen kontaktieren Sie bitte umgehend Herrn Meisner. Fuer ein besseres Raumklima und eine angenehme Arbeitsatmosphaere sorgen ausserdem unsere Pflanzen.`,`Um allen ein konzentriertes Arbeiten zu ermoeglichen, sollte der Laermpegel in den Bueros moeglichst niedrig gehalten werden. Sollten Sie Gespraeche fuehren muessen, die laenger dauern, suchen Sie eine der Kommunikationsboxen auf, die sich in jedem Stockwerk befinden.`],paragraphs_zh:[`我們非常重視員工的健康。因此所有辦公室都配備了現代化的人體工學工作站。`,`如需調整書桌高度、辦公椅和螢幕距離，請在第一週工作期間聯繫我們的健康專員Anton Meisner，分機-039。`,`房間的溫度和濕度由中央統一調節。如需更改，請立即聯繫Meisner先生。我們的植栽也有助於改善室內環境。`,`為了讓所有人都能專注工作，辦公室的噪音應盡量保持低水平。如需進行較長的對話，請使用每層樓都設有的溝通隔間。`],qa:[{q:`1. Die Mitarbeiter/innen richten sich ihren Arbeitsplatz bei Arbeitsbeginn selbst ein.`,type:`tf`,options:[`richtig`,`falsch`],answer:1,label:`falsch`,explain:`Der Gesundheitsbeauftragte hilft dabei – man soll ihn in der ersten Arbeitswoche kontaktieren.`},{q:`2. Die Firma bittet die Mitarbeiter/innen, ...`,type:`mc`,options:[`a) die Temperatur in den Büros selbst einzustellen.`,`b) ihre Schreibtische für längere Unterhaltungen zu verlassen.`,`c) sich um die Pflanzen zu kümmern.`],answer:1,label:`b`,explain:`Für längere Gespräche soll man die Kommunikationsboxen aufsuchen, also den Schreibtisch verlassen.`}]},{src:`[Cornelsen] Regelungen am Arbeitsplatz (AKO.KG)`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Es ist wichtig, dass auf dem Betriebsgelaende der AKO.KG alle Massnahmen eingehalten werden, damit Sie sich selbst und andere nicht gefaehrden. Bei der Bedienung der Maschinen sind die jeweiligen Sicherheitsbestimmungen zu befolgen, angepasst an die neuen Richtlinien laut Arbeitsschutzgesetz vom Januar dieses Jahres.`,`Die Sicherheitsbestimmungen finden Sie in der Anlage zu dieser Willkommensmappe und zusammengefasst auch auf Informationsblaettern an den Maschinen. Sollten Sie hierzu Fragen haben, setzen Sie sich bitte mit unserer Sicherheitsbeauftragten Frau Scholz, Zimmer 122, Durchwahl -308, in Verbindung.`,`Dies ist auch die Kontaktstelle fuer alle Stoerungen, Unfaelle, Brand oder bei fuer Sie unklaren Situationen. In diesen Faellen kontaktieren Sie bitte auch immer den Empfang, Durchwahl -100.`,`Nach Verlassen der Werkstaetten sind diese immer ordnungsgemass abzuschliessen, damit sich kein Unbefugter den Anlagen und Maschinen naehern kann. Der Arbeitsplatz muss sauber gehalten werden, damit umherliegender Unrat nicht zur Gefahrenquelle werden kann. Achten Sie dabei bitte auch auf die vorgeschriebene Trennung der Abfaelle. Auf dem gesamten Betriebsgelaende ist Filmen und Fotografieren sowie der Konsum von Alkohol und Zigaretten nicht gestattet.`],paragraphs_zh:[`在AKO.KG廠區內，所有措施都必須被遵守，以免傷害自己和他人。操作機器時必須遵守相關安全規定，已依照今年一月份勞動保護法的新指導方針進行調整。`,`安全規定可在入職手冊附件及機器旁的說明頁中找到。如有疑問，請與安全負責人Scholz女士（122室，分機-308）聯繫。`,`這也是所有故障、事故、火災或不明情況的聯繫窗口。遇到這類情況，也請務必聯繫前台，分機-100。`,`離開車間後必須按規定鎖好，以防未授權人員靠近設備和機器。工作場所必須保持整潔，以免散落的垃圾成為危險源。請遵守規定的垃圾分類。整個廠區內禁止拍照錄像及飲酒和吸菸。`],qa:[{q:`6. Die Regelungen am Arbeitsplatz wurden aktualisiert.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Die Sicherheitsbestimmungen wurden angepasst an die neuen Richtlinien laut Arbeitsschutzgesetz vom Januar.`},{q:`7. Auf dem Firmengelände ...`,type:`mc`,options:[`a) darf kein Abfall entsorgt werden.`,`b) ist bei Gefahr Frau Scholz zu informieren.`,`c) ist es verboten, Nahrungsmittel zu sich zu nehmen.`],answer:1,label:`b`,explain:`Frau Scholz ist die Kontaktstelle für Störungen, Unfälle, Brand und unklare Situationen.`}]}]},
{title:`T1b: Laborkleidung & Sicherheit（實驗室服裝與安全）`,color:`#37474F`,texts:[{src:`[課本 Klett] Text 2 – Hygiene- und Verhaltensrichtlinien in der Produktion`,badgeCls:`klett`,badgeLabel:`[課本 Klett]`,paragraphs:[`Der Eintritt in den Produktionsbereich darf nur mit entsprechender Schutzkleidung erfolgen. Die vom Betrieb zur Verfuegung gestellte Schutzkleidung ist korrekt anzuziehen: Der Kittel muss geschlossen und die Haare vom Kopfschutz vollstaendig bedeckt sein. Die Schuhe sind sauber zu halten. Ausserdem ist das Tragen von Schmuck im Produktionsbereich nicht gestattet.`,`Das Essen und Trinken ist nur in den Pausenraeumen erlaubt. Bei Arbeitsbeginn und nach den Pausen sind die Haende gruendlich zu reinigen. Wenn Sie Plastikhandschuhe tragen, muessen diese mindestens dreimal taeglich bzw. bei jedem Wechsel der Taetigkeit ausgetauscht werden.`,`Welche Taetigkeiten Plastikhandschuhe erfordern, sehen Sie auf dem Plan auf Seite 10. Der Eintritt in den Produktionsbereich erfolgt immer ueber die Hygieneschleuse. Dort werden Haende und Schuhe desinfiziert bzw. gereinigt.`,`Das Betreten des Produktionsbereichs ist nur ueber diesen Eingang erlaubt. Die gesamte Schutzkleidung muss nach Arbeitsende fuer eine professionelle Reinigung in den dafuer vorgesehenen Container geworfen werden. Die Einhaltung der Hygieneregeln wird durch den/die jeweilige/n Abteilungsleiter/in kontrolliert. In regelmaessigen Abstaenden finden Hygieneschulungen statt, die Anwesenheit ist dabei fuer alle Mitarbeiterinnen und Mitarbeiter aus dem Produktionsbereich Pflicht.`],paragraphs_zh:[`進入生產區域只能穿著相應的防護服。公司提供的防護服必須正確穿著：實驗衣必須扣好，頭髮必須完全被頭套蓋住。鞋子必須保持乾淨。此外，在生產區域不允許佩戴飾品。`,`飲食只允許在休息室進行。上班開始時及休息後必須徹底清洗雙手。如果您佩戴塑膠手套，每天至少必須更換三次，或在每次換工作任務時更換。`,`哪些工作需要佩戴塑膠手套，請參見第10頁的計劃表。進入生產區域必須經由衛生閘口。在那裡，雙手和鞋子將被消毒或清洗。`,`只允許通過這個入口進入生產區域。所有防護服在下班後必須投入指定的容器進行專業清洗。衛生規定的遵守情況由部門主管負責監督。定期舉辦衛生培訓，所有生產區域的員工均必須出席。`],qa:[{q:`3. Man darf den Produktionsbereich nur durch eine bestimmte Tür betreten.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Der Eintritt erfolgt immer über die Hygieneschleuse – das ist der einzige erlaubte Eingang.`},{q:`4. Mitarbeiter/innen im Produktionsbereich müssen ...`,type:`mc`,options:[`a) an Hygieneschulungen teilnehmen.`,`b) ihre Schutzkleidung regelmäßig waschen.`,`c) jederzeit Plastikhandschuhe anhaben.`],answer:0,label:`a`,explain:`Die Anwesenheit bei Hygieneschulungen ist für alle Mitarbeiter/innen im Produktionsbereich Pflicht.`}]},{src:`[Telc DTB] Sicherheit im Labor – Laborkleidung`,badgeCls:`telc`,badgeLabel:`[Telc DTB]`,paragraphs:[`Beim Arbeiten im Labor muss eine angemessene Kleidung getragen werden, um einerseits sich selbst, andererseits auch bestimmte Materialien zu schuetzen. Dazu gehoert zunaechst ein weisser Schutzkittel aus Baumwolle, der immer geschlossen und sauber sein muss.`,`Da ein Kittel nicht den ganzen Koerper schuetzt, ist darauf zu achten, dass stets geschlossenes, festes Schuhwerk (keine hohen Absaetze oder offene Sandalen) sowie lange Hosen zu tragen sind. Das feste, flache Schuhwerk dient nebenbei auch dem Zweck, in Notsituationen das Labor zuegig verlassen zu koennen.`,`Aus hygienischen Gruenden muessen auch die Haare durch eine Haube bedeckt sein. Lange Haare muessen zusaetzlich zu einem Zopf zusammengebunden werden. Haeufig kommt auch noch eine Schutzbrille zum Einsatz.`,`Beim Hantieren mit empfindlichen oder gefaehrlichen Substanzen sind Handschuhe zu tragen, um die Haende vor Kontamination zu schuetzen. Da die Handschuhe durch die Arbeit mit chemischen Substanzen verunreinigt sein koennten, sollten diese nach durchgefuehrter Arbeit stets abgelegt und nicht auch noch waehrend anderer Taetigkeiten im Labor getragen werden. Auf keinen Fall darf das Labor mit Handschuhen verlassen werden.`],paragraphs_zh:[`在實驗室工作時必須穿著合適的服裝，一方面保護自己，另一方面保護某些材料。首先需要一件永遠保持扣好且乾淨的白色棉質防護服。`,`由於實驗衣不能保護全身，必須注意始終穿著密閉的固定鞋類（不可穿高跟鞋或涼鞋）及長褲。固定的平底鞋此外也有助於在緊急情況下迅速離開實驗室。`,`出於衛生原因，頭髮也必須用帽子蓋住。長頭髮必須另外綁成馬尾。通常還會使用護目鏡。`,`在處理敏感或危險物質時必須佩戴手套，以保護雙手免受污染。由於手套可能被化學物質污染，應在完成工作後立即脫下，不應在從事其他活動時繼續佩戴。絕對不可以戴著手套離開實驗室。`],qa:[{q:`8. Beim Arbeiten im Labor darf man weder kurze Hosen tragen noch längere Haare offen lassen.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Es sind lange Hosen zu tragen und die Haare müssen durch eine Haube bedeckt bzw. zu einem Zopf gebunden sein.`},{q:`9. Im Labor müssen Handschuhe ...`,type:`mc`,options:[`a) bei allen Arbeiten getragen werden.`,`b) gleich bei Arbeitsantritt angelegt werden.`,`c) nach Arbeiten mit Chemikalien ausgezogen werden.`],answer:2,label:`c`,explain:`Nach durchgeführter Arbeit mit chemischen Substanzen sollten die Handschuhe stets abgelegt werden.`}]}]},
{title:`T2: Betriebliche Veranstaltungen & Sport（公司活動與運動）`,color:`#2E7D32`,texts:[{src:`[Telc DTB] Gemeinschaftsveranstaltungen & Betriebssport`,badgeCls:`telc`,badgeLabel:`[Telc DTB]`,paragraphs:[`Neben zahlreichen Sozialleistungen bietet unser Unternehmen alljaehrlich zwei Gemeinschaftsveranstaltungen an. Immer am dritten Mittwoch im Mai findet unser eintaegiger Betriebsausflug statt, der sowohl einen kulturellen als auch einen sportlichen Teil enthaelt und mit einem Essen abschliesst.`,`Den Organisationsausschuss bilden stets zwei langjaehrige und zwei neue Mitarbeiterinnen oder Mitarbeiter. Die Geschaeftsleitung stellt ein festgelegtes Budget zur Verfuegung, die Kosten fuer alkoholische Getraenke traegt jeder Mitarbeiter selbst.`,`Nach einer Umfrage unter unseren Mitarbeiterinnen und Mitarbeitern entschieden wir uns aufgrund der Arbeitsdichte zum Jahresabschluss, der religioesen Vielfalt in unseren Teams und der hohen Termindichte in der Vorweihnachtszeit dazu, ein Sommerfest statt einer Weihnachtsfeier zu veranstalten. Feste Programmpunkte sind dabei ein gutes Essen, das Ueberreichen eines Preises an den Mitarbeiter mit der Idee des Jahres und Tanz zu Live-Musik.`,`Anders als beim Betriebsausflug koennen wichtige Geschaeftspartner als geladene Gaeste daran teilnehmen. Sportliche Aktivitaeten werden bei uns grossgeschrieben. Die Laufgruppe hat sogar schon an einem Marathon teilgenommen.`],paragraphs_zh:[`除眾多員工福利外，我們公司每年還提供兩次集體活動。每年五月第三個星期三舉行一日公司郊遊，包含文化和體育兩個環節，並以晚餐收尾。`,`組委會由兩名資深員工和兩名新員工組成。管理層提供固定預算，酒精飲料的費用由員工個人自付。`,`根據員工問卷調查，由於年底工作密度高、團隊宗教多元性以及聖誕前夕行程密集，我們決定舉辦夏日派對而非聖誕晚會。固定節目包括美食、頒發年度最佳創意獎和現場音樂舞蹈。`,`與公司郊遊不同，重要合作夥伴可作為受邀嘉賓參加夏日派對。體育活動在我們公司非常重要。跑步小組甚至已經參加過馬拉松比賽。`],qa:[{q:`6. Zu allen Gemeinschaftsveranstaltungen dürfen Gäste mitgebracht werden.`,type:`tf`,options:[`richtig`,`falsch`],answer:1,label:`falsch`,explain:`Nur beim Sommerfest können Geschäftspartner als geladene Gäste teilnehmen – beim Betriebsausflug nicht.`},{q:`7. Der Arbeitgeber veranstaltet ein Sommerfest, ...`,type:`mc`,options:[`a) da man in den Betriebsferien gut feiern kann.`,`b) das von ausgewählten Mitarbeitern organisiert wird.`,`c) weil die meisten Mitarbeiter im Dezember viele Termine haben.`],answer:2,label:`c`,explain:`Aufgrund der hohen Termindichte in der Vorweihnachtszeit wurde das Sommerfest gewählt.`}]},{src:`[Cornelsen] Betriebliche Veranstaltungen – Infotag`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Nicht nur durch unser Sommerfest und unseren Betriebsausflug moechten wir dazu beitragen, dass alle unsere Mitarbeitenden sich in unserem Unternehmen wohlfuehlen. Anfang des kommenden Jahres, im Februar oder Maerz, soll nach fuenfjaehriger Pause wieder einmal ein Infotag stattfinden.`,`Wie der Name schon sagt, wollen wir uns und unsere Produkte und Dienstleistungen der Oeffentlichkeit vorstellen. Nach den Erfahrungen unseres letzten Info-Tags moechten wir dieses Mal laengerfristig planen und alle Mitarbeitenden in die Planung dieser Veranstaltung mitbeziehen.`,`Dazu haben wir jetzt schon eine Projektgruppe ins Leben gerufen, die sich zum ersten Mal am 10. September um 12.30 Uhr in Raum 010 treffen wird. Neben einem Terminvorschlag, den die Geschaeftsleitung unterbreiten wird, sollen hier moegliche Programmschwerpunkte besprochen werden.`,`Der informative Teil, also die Praesentation unserer Produkte und Erzeugnisse, wird von der Geschaeftsleitung erstellt. Vielleicht koennen wir ein Preisausschreiben veranstalten, andere Gewinnspiele, einen Wettbewerb fuer die Kinder, Musik. Teilen Sie allen Familienangehoerigen, Freunden und Bekannten mit, dass unsere Firma ein grosses Fest plant, zu dem alle herzlich eingeladen sind.`],paragraphs_zh:[`我們不僅希望透過夏日派對和公司郊遊，讓所有員工在公司感到舒適。明年初，二月或三月，在中斷五年後，將再度舉辦一次資訊日。`,`顧名思義，我們希望向公眾介紹我們的公司、產品和服務。根據上次資訊日的經驗，我們這次希望提前規劃，並讓所有員工參與活動策劃。`,`為此，我們已成立了一個專案小組，將於9月10日中午12:30在010室首次開會。除了管理層將提出的時間提案外，還將討論可能的活動重點。`,`公司資訊和產品展示部分由管理層負責準備。也許我們可以舉辦有獎競賽、抽獎、兒童比賽或音樂活動。請通知所有家屬、朋友和熟人，我們公司正在籌辦一場大型活動，歡迎所有人參加。`],qa:[{q:`8. Der Infotag dient der Außenpräsentation und Unterhaltung.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Wir wollen uns und unsere Produkte der Öffentlichkeit vorstellen (Information) und es gibt Unterhaltungsprogramm.`},{q:`9. Die Mitarbeitenden sollen ...`,type:`mc`,options:[`a) für die Durchführung der Veranstaltung verantwortlich sein.`,`b) der Geschäftsführung ihre Terminvorschläge bekanntgeben.`,`c) aktiv bei der Vorbereitung mitmachen.`],answer:2,label:`c`,explain:`Alle Mitarbeitenden sollen in die Planung mitbezogen werden – sie sollen aktiv bei der Vorbereitung mitmachen.`}]}]},
{title:`T3: Arbeitszeiten（工作時間）`,color:`#7B3F00`,texts:[{src:`[Cornelsen] Arbeitszeiten`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Die woechentliche Arbeitszeit betraegt 40 Stunden – bei einem Arbeitstag von acht Stunden, wobei die Pausen nicht mitgerechnet werden. Es gilt die Fuenf-Tage-Woche. Betriebsbedingt ist es moeglich, dass Sie bis zu zehn Stunden pro Tag arbeiten. Diese Mehrarbeit ist aber nur in Ausnahmefaellen erlaubt und muss innerhalb von sechs Monaten durch entsprechend kuerzere Arbeitstage ausgeglichen werden.`,`Wir haben flexible Arbeitszeiten. Sie koennen selbst bestimmen, wann Sie morgens anfangen zu arbeiten und wann Sie aufhoeren. Zwischen 10 und 15 Uhr, in der sogenannten Kernzeit, muessen Sie jedoch anwesend sein. Gleitzeitzeiten sind zwischen 8 und 10 Uhr und 15 und 17 Uhr.`,`Unser elektronisches Zeiterfassungssystem registriert taeglich die Zahl der von Ihnen geleisteten Arbeitsstunden auf Ihrem persoenlichen Arbeitszeitkonto. Haben Sie in einer Woche mehr als 40 Stunden gearbeitet, sollten Ihre Ueberstunden bereits vor Monatsende durch weniger Arbeit abgebaut werden.`,`Wenn ein Abbau nicht moeglich ist, wird mit der Geschaeftsfuehrung eine rasche Loesung besprochen. Aus betrieblichen Gruenden kann der Arbeitgeber die Gleitzeitregelung fuer eine gewisse Zeit aussetzen.`],paragraphs_zh:[`每週工作時間為40小時——每工作日8小時，不含休息時間。採五天工作制。因業務需要，您可能每天工作最多十小時。但這些額外工作只在特殊情況下才被允許，必須在六個月內以縮短工作日的方式補回。`,`我們提供彈性工時。您可以自行決定何時開始和結束工作。但上午10點至下午3點的核心時間內，您必須出勤。彈性工時時間為早上8至10點及下午3至5點。`,`我們的電子工時記錄系統每天將您完成的工時記錄在個人工時帳戶中。若某週工作超過40小時，加班時數應在月底前通過減少工作消化完畢。`,`若無法做到，將與管理層討論快速解決方案。基於業務原因，雇主可暫時暫停彈性工時規定。`],qa:[{q:`6. Die Beschäftigten dürfen mit der Arbeit anfangen, wann sie wollen.`,type:`tf`,options:[`richtig`,`falsch`],answer:1,label:`falsch`,explain:`In der Kernzeit (10–15 Uhr) müssen alle anwesend sein – man kann also nicht beliebig anfangen.`},{q:`7. Ergibt sich auf einem Arbeitszeitkonto ein Plus, ...`,type:`mc`,options:[`a) kann der Betrieb den Acht-Stunden-Tag verlängern oder verkürzen.`,`b) ist schnellstmöglich ein Ausgleich zu finden.`,`c) kann der Betrieb die Gleitzeitregelungen ändern.`],answer:1,label:`b`,explain:`Überstunden sollten vor Monatsende abgebaut werden; wenn nicht möglich, wird schnellstmöglich eine Lösung besprochen.`}]}]},
{title:`T4: Datenschutz（資料保護）`,color:`#6A1B9A`,texts:[{src:`[Cornelsen] Datenschutz`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Unser Betrieb legt auf Datenschutz grossen Wert. Die Mitarbeitenden sind bei ihrer Arbeit verpflichtet, alle Firmenereignisse vertraulich zu behandeln. Die private E-Mail-Nutzung ist nicht erlaubt. Regeln zur Nutzung Ihres Smartphones regelt jede Abteilung nach Ruecksprache mit den dort arbeitenden Kolleginnen und Kollegen.`,`Im gesamten Betrieb duerfen aber mit dem Smartphone keine privaten Fotos gemacht werden. Genauso wichtig wie der Schutz unserer Firmendaten ist uns auch der Schutz Ihrer persoenlichen Daten. Ihre bei der Personalstelle gespeicherten Daten werden an niemand anderen weitergegeben.`,`Sollte der Betrieb fuer Werbezwecke Fotos machen wollen, auf denen Sie zu sehen sind, geht das nur mit Ihrer persoenlichen Zustimmung. Da der Datenschutz ein sehr komplexer Bereich ist, bieten wir fuer alle neuen Mitarbeitenden Datenschutzschulungen an. Die Teilnahme ist verpflichtend.`,`In den Seminaren erfahren Sie, in welchen Abteilungen des Unternehmens Sie spezielle Zugangscodes benoetigen, wie mit Passwoertern umzugehen ist und worauf Sie bei der Arbeit mit unserem Computersystem achten muessen. Gerade in Zeiten zunehmender Cyberkriminalitaet ist eine Schulung zur IT-Sicherheit absolut notwendig. Weitere Informationen zu Terminen und Inhalten der Schulung erhalten Sie von unserer Datenschutzbeauftragten Frau Herz, Durchwahl -111, Raum 15.`],paragraphs_zh:[`我們公司非常重視資料保護。員工在工作中有義務將所有公司事務保密處理。私人電子郵件的使用不被允許。智慧型手機的使用規則由每個部門與同事協商後自行規定。`,`但整個公司內不得用手機拍攝私人照片。保護員工的個人資料對我們同樣重要。您在人事部門儲存的資料不會被轉交給任何其他人。`,`若公司欲拍攝出現您的照片用於廣告目的，必須取得您的個人同意。由於資料保護是一個非常複雜的領域，我們為所有新員工提供資料保護培訓。參加是強制性的。`,`在研討會上，您將了解在哪些部門需要特殊存取碼、如何處理密碼以及在使用電腦系統時需注意哪些事項。尤其在網路犯罪日益猖獗的時代，IT安全培訓是絕對必要的。更多有關培訓時間和內容的資訊，請向資料保護負責人Herz女士查詢（分機-111，15室）。`],qa:[{q:`8. Sowohl betriebliche Daten als auch die Daten der Mitarbeitenden sollen geschützt werden.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Der Text betont sowohl den Schutz von Firmendaten als auch den Schutz persönlicher Daten der Mitarbeitenden.`},{q:`9. Die Mitarbeitenden ...`,type:`mc`,options:[`a) müssen Schulungen zum Datenschutz besuchen.`,`b) werden auf Schulungen Passwörter für ihre Arbeit bekommen.`,`c) dürfen aus Sicherheitsgründen im Betrieb weder ihre Smartphones benutzen noch persönliche E-Mails schreiben.`],answer:0,label:`a`,explain:`Die Teilnahme an den Datenschutzschulungen ist verpflichtend.`}]}]},
{title:`T5: Fortbildungen & Schulungen（進修與培訓）`,color:`#B71C1C`,texts:[{src:`[Cornelsen] Fortbildungen, Schulungen, Seminare`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Wir freuen uns, mitteilen zu koennen, dass im September im Nebengebaeude unser eigenes Schulungs- und Seminarzentrum eroeffnet hat. Wir haben ein umfassendes Fortbildungsprogramm entwickelt, Kurse, die Sie befaehigen, sich fuer Ihre Arbeit weiterzuqualifizieren, z.B. Schulungen in neuen Softwareanwendungen.`,`Ihre Teilnahme an diesen Fortbildungen ist erforderlich. Sie finden waehrend der Arbeitszeit statt und wir uebernehmen selbstverstaendlich die Kosten. Organisiert werden die Fortbildungen von den verschiedenen Unternehmensbereichen. Die Mitarbeitenden sollen aber auch unbedingt selbst der Leitung ihrer Abteilung Vorschlaege dazu machen, in welchem Bereich sie fachlich noch unsicher sind und wo ihrer Meinung nach eine passende Fortbildung organisiert werden sollte.`,`Ausserdem gibt es im Rahmen der betrieblichen Gesundheitsfoerderung in Zusammenarbeit mit den Krankenkassen ein reichhaltiges Angebot an Seminaren. Wir empfehlen unbedingt den Besuch dieser Gesundheits- und Fitnesskurse: Waehlen Sie den Kurs aus, der Ihren eigenen Beduerfnissen entspricht.`,`Diese Veranstaltungen werden von uns bezuschusst und finden zum Teil auch nicht in unserem Betrieb und ausserhalb der Arbeitszeit statt. In unserer Broschuere Betriebliche Gesundheitsfoerderung geben wir einen Ueberblick ueber die im naechsten Halbjahr stattfindenden Gesundheitskurse.`],paragraphs_zh:[`我們很高興地通知您，九月我們自己的培訓和研討中心已在附屬樓開幕。我們制訂了全面的進修計劃，課程使您能夠持續提升工作資格，例如新軟體應用程式的培訓。`,`您參加這些進修活動是必要的。進修在工作時間內進行，我們當然承擔所有費用。進修由各部門負責組織。員工也應主動向部門管理層提出建議，說明自己在哪些方面仍感不確定、認為應安排哪些進修。`,`此外，在公司健康促進計劃框架內，與保險公司合作提供了豐富的研討會。我們強烈建議參加這些健康與健身課程——選擇符合您個人需求的課程。`,`這些活動由我們資助，部分也在工作時間以外及公司外舉行。在我們的《公司健康促進》小冊子中，提供了下半年健康課程的概覽。`],qa:[{q:`6. Die Kosten für die Kurse und Seminare übernimmt der Arbeitgeber.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Die Fortbildungen finden während der Arbeitszeit statt und der Betrieb übernimmt selbstverständlich die Kosten.`},{q:`7. Die Mitarbeitenden können selbst entscheiden, ...`,type:`mc`,options:[`a) welcher Gesundheitskurs für sie der passende ist.`,`b) welche Schulungen eingerichtet werden.`,`c) ob sie an den Fortbildungsveranstaltungen teilnehmen.`],answer:0,label:`a`,explain:`Man kann den Gesundheitskurs wählen, der den eigenen Bedürfnissen entspricht. Die Fortbildungen selbst sind verpflichtend.`}]}]},
{title:`T6: Fuhrpark & Firmenparkplatz（公務車隊與停車場）`,color:`#00695C`,texts:[{src:`[Cornelsen] Fuhrpark und Firmenparkplatz`,badgeCls:`cornelsen`,badgeLabel:`[Cornelsen]`,paragraphs:[`Fuer notwendige Fahrten stehen den Mitarbeitenden des Aussendienstszehn Firmenwagen und drei E-Bikes (Lastenfahrraeder) zur Verfuegung. Die Fahrzeuge duerfen nur dienstlich genutzt werden. Wenn Sie einen Firmenwagen benoetigen, melden Sie sich beim Empfang bzw. tragen Sie sich dort fruehzeitig in eine Liste ein. Dort erhalten Sie auch den Schluessel und die notwendigen Fahrzeugpapiere. Ansprechpartnerin ist Frau Boenisch, Durchwahl -02.`,`Auf dem Firmenparkplatz im Innenhof koennen Sie Ihr eigenes Auto ohne Parkgebuehr abstellen, es gibt allerdings nur eine begrenzte Anzahl Parkplaetze. Zudem: Die Parkplaetze mit den Nummern 15–20 sind fuer unsere Kunden reserviert. Bitte lassen Sie diese Parkplaetze frei.`,`An beiden Seiten des Firmenparkplatzes gibt es ueberdachte Fahrradstellplaetze. Im Erdgeschoss des Gebaeudes B gibt es fuer die Kolleginnen und Kollegen, die mit dem Rad kommen, auch Moeglichkeiten, sich zu waschen und zu duschen. Ladeoptionen fuer die Akkus von E-Bikes sind neben den Duschraaeumen vorhanden.`,`Die Nutzung des Firmenparkplatzes ist zurzeit noch kostenlos, da immer mehr Mitarbeitende auf das Fahrrad umgestiegen sind und es im Augenblick keine groesseren Engpaesse gibt. Bitte schauen Sie aber immer auch nach oeffentlichen Parkplaetzen rund um den Kaiserplatz.`],paragraphs_zh:[`公司有十輛公務車和三輛電動貨運自行車供外勤員工用於必要出行。車輛只能用於公務目的。如需公務車，請到前台登記或提前填寫預約表。您也可以在那裡領取鑰匙和必要的車輛文件。聯絡人為Boenisch女士，分機-02。`,`在內院的公司停車場，您可以免費停放私家車，但停車位數量有限。此外，15至20號停車位為我們的客戶保留，請勿占用。`,`公司停車場兩側有帶頂棚的自行車停放點。B棟一樓為騎自行車上班的同事提供了洗漱設施。電動自行車電池的充電設施位於淋浴室旁。`,`公司停車場目前仍免費使用，因為越來越多員工改騎自行車，目前沒有嚴重的停車位不足問題。但也請留意凱澤廣場周邊的公共停車場。`],qa:[{q:`8. Es ist nicht sicher, ob die Nutzung des Firmenparkplatzes kostenlos bleiben kann.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Es heißt "zurzeit noch kostenlos" – das impliziert, dass es sich ändern könnte.`},{q:`9. Auf dem Firmenparkplatz ...`,type:`mc`,options:[`a) dürfen nur Mitarbeitende der Firma parken.`,`b) darf geparkt werden, wenn es keine öffentlichen Parkplätze mehr gibt.`,`c) können Fahrräder auch bei schlechtem Wetter geschützt abgestellt werden.`],answer:2,label:`c`,explain:`Es gibt überdachte Fahrradstellplätze an beiden Seiten des Firmenparkplatzes.`}]}]},
{title:`T7: Mitarbeitersuche（招募人才）`,color:`#0277BD`,texts:[{src:`[課本 Klett] Mitarbeitersuche`,badgeCls:`klett`,badgeLabel:`[課本 Klett]`,paragraphs:[`Wir sind sehr stolz darauf, dass unsere Firma seit 20 Jahren stetig waechst. Bundesweit haben wir mittlerweile ein Netz aus 32 Filialen mit etwa 400 Mitarbeitenden aufgebaut. In den naechsten Jahren ist unser grosses Ziel, uns auf den internationalen Markt zu vergroessern. Daher ist unser Unternehmen staendig auf der Suche nach qualifizierten und motivierten Mitarbeitenden.`,`Auch in unserem Nachbarland sind bereits Stellen ausgeschrieben und Bewerbungsprozesse laufen. Wenn Sie Interesse haben, sich zu veraendern, wenden Sie sich bitte direkt an die Personalabteilung.`,`Das Vertrauen, das wir in Sie haben, haben wir auch in Ihr Netzwerk. Deshalb moechten wir Sie noch auf ein neues Angebot hinweisen: Machen Sie Freunde und Bekannte auf unsere Stellenanzeigen aufmerksam und sichern Sie sich eine Praemie! Bei erfolgreichem Abschluss eines neuen Arbeitsvertrags koennen Sie als werbende/r Mitarbeitende/r angeboten werden.`,`Als Dank erhalten Sie eine Vermittlungspraemie von bis zu 300 Euro. Die genauen Voraussetzungen fuer den Erhalt der Praemie koennen Sie dem Dokument Mitarbeiter/innen_werben_Mitarbeiter/innen im Intranet entnehmen. Weitere Fragen dazu beantwortet Ihnen gerne Frau Helga Jahn aus der Personalabteilung.`],paragraphs_zh:[`我們非常自豪，公司已穩定成長了20年。我們在全國已建立了一個擁有約400名員工的32家分公司網絡。未來幾年，我們的重大目標是向國際市場擴展。因此，我們公司一直在尋找有資格且有積極性的員工。`,`在鄰國也已發布職缺並啟動了招募流程。如果您有興趣轉換工作，請直接聯繫人事部門。`,`我們對您的信任也延伸到您的人際網絡。因此我們想向您介紹一個新優惠：請讓朋友和熟人注意我們的徵才廣告，為自己爭取一筆獎金！成功達成新勞動合約後，您可作為推薦員工獲得獎勵。`,`作為感謝，您將獲得高達300歐元的介紹獎金。詳細的領取條件，您可以從內網的「員工推薦員工」文件中查閱。如有其他問題，人事部門的Helga Jahn女士樂意為您解答。`],qa:[{q:`1. Die Firma sucht Mitarbeiter/innen im In- und Ausland.`,type:`tf`,options:[`richtig`,`falsch`],answer:0,label:`richtig`,explain:`Auch im Nachbarland sind bereits Stellen ausgeschrieben – die Firma sucht also international.`},{q:`2. Wenn man eine Belohnung bekommen will, ...`,type:`mc`,options:[`a) der Firma einem neuen Mitarbeiter/in vermittelt.`,`b) in einer neuen Filiale der Firma anfängt.`,`c) Stellenangebote der Firma weiterleitet.`],answer:0,label:`a`,explain:`Man erhält eine Vermittlungsprämie, wenn man erfolgreich neue Mitarbeitende wirbt und ein Arbeitsvertrag abgeschlossen wird.`}]}]}
];
const KEY='dtb_b2_v3';
let unfamiliar=new Set();
try{const s=localStorage.getItem(KEY);if(s)unfamiliar=new Set(JSON.parse(s));}catch(e){}
function save(){try{localStorage.setItem(KEY,JSON.stringify([...unfamiliar]));}catch(e){}}

// ── Speech ───────────────────────────────────────────────────────────────────
const synth=window.speechSynthesis;
let deVoice=null,enVoice=null,activePara=null;
function loadVoices(){
  const v=synth.getVoices();
  deVoice=v.find(x=>x.lang.startsWith('de'))||null;
  enVoice=v.find(x=>x.lang.startsWith('en'))||null;
}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=loadVoices;

function speakText(text,lang){
  synth.cancel();
  const badge=document.getElementById('speakingBadge');
  badge.classList.add('active');
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;u.voice=lang.startsWith('de')?deVoice:enVoice;u.rate=0.88;
  u.onend=u.onerror=()=>{
    badge.classList.remove('active');
    if(activePara){activePara.classList.remove('speaking');activePara=null;}
  };
  synth.speak(u);
}
function speakWord(i){const v=VOCAB[i];speakText((v.a?v.a+' ':'')+v.w,'de-DE');}
function speakKoll(i){speakText(VOCAB[i].k,'de-DE');}
function speakSatz(i){speakText(VOCAB[i].ex,'de-DE');}
function speakEn(i){speakText(VOCAB[i].en.split('/')[0].trim(),'en-US');}

function speakPara(el,text){
  if(activePara===el){
    synth.cancel();
    el.classList.remove('speaking');
    activePara=null;
    document.getElementById('speakingBadge').classList.remove('active');
    return;
  }
  if(activePara)activePara.classList.remove('speaking');
  activePara=el;
  el.classList.add('speaking');
  speakText(text,'de-DE');
}

// ── Mark ─────────────────────────────────────────────────────────────────────
function toggleMark(idx){
  if(unfamiliar.has(idx))unfamiliar.delete(idx);else unfamiliar.add(idx);
  save();renderAll();
  if(document.getElementById('exportPanel').classList.contains('visible'))renderExport();
}
let currentFilter='all';
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function clearAll(){
  if(!unfamiliar.size)return;
  if(confirm('確定要清除所有「不熟悉」標記嗎？')){unfamiliar.clear();save();renderAll();}
}

// ── Verb highlight ────────────────────────────────────────────────────────────
const VRE=/\b(einhalten|befolgen|anpassen|setzen|abschliessen|behandeln|weitergeben|geben|uebernehmen|besuchen|entwickeln|befaehigen|bezuschussen|nutzen|abstellen|reservieren|umsteigen|registrieren|aussetzen|ausgleichen|betragen|legen|dienen|planen|veranstalten|rufen|unterbreiten|mitbeziehen|werden|sein|haben|machen|leiten|informieren|ermoeglichen|vergroessern|erhalten|anbieten|teilnehmen|pruefen|klaeren|melden|ueben|halten|bringen|benutzen|abgeben|einrichten|regeln|wahren|schuetzen|beachten|trennen|foerdern|entnehmen|tragen|bedecken|ablegen|verlassen|binden|wenden|suchen|sichern|aufbauen|stellen)\b/g;
function hlV(t){return t.replace(VRE,m=>`<span class="koll-verb">${m}</span>`);}

// ── Vocab row ─────────────────────────────────────────────────────────────────
function buildRow(v,i,compact){
  const uf=unfamiliar.has(i);
  const enP=v.en.split('/').map(s=>s.trim()).join('<br>');
  const zhP=v.zh.split('/').map(s=>s.trim()).join('<br>');
  const kP=hlV(v.k);
  const dotTd=compact?'':
    `<td class="dot-cell" onclick="event.stopPropagation();toggleMark(${i})"><span class="dot"></span></td>`;
  const sc=compact?'':'speak-td';
  return `<tr class="${uf?'unfamiliar':''}">
    ${dotTd}
    <td class="${sc}" onclick="${compact?'':`speakWord(${i})`}">
      ${v.a?`<span class="artikel">${v.a}</span>`:''}<span class="word-de">${v.w}</span>${v.p?`<span class="plural">${v.p}</span>`:''}
    </td>
    <td class="${sc}" onclick="${compact?'':`speakEn(${i})`}">
      <span class="word-en">${enP}</span><span class="word-zh">${zhP}</span>
    </td>
    <td class="${sc}" onclick="${compact?'':`speakKoll(${i})`}">
      <span class="koll-de">${kP}</span><span class="koll-zh">${v.kz}</span>
    </td>
    <td class="${sc}" onclick="${compact?'':`speakSatz(${i})`}">
      <span class="satz-de">${v.ex}</span><span class="satz-zh">${v.ez}</span>
    </td>
  </tr>`;
}
function buildVocabTable(items,compact){
  const dTh=compact?'':'<th class="col-dot"></th>';
  return `<table>
    <thead><tr>${dTh}
      <th class="col-de">德文</th><th class="col-enzh">英文＋中文</th>
      <th class="col-koll">固定搭配＋中文</th><th class="col-satz">例句＋翻譯</th>
    </tr></thead>
    <tbody>${items.map(([v,i])=>buildRow(v,i,compact)).join('')}</tbody>
  </table>`;
}

// ── Text card ─────────────────────────────────────────────────────────────────
let qaState={};
function revealAnswer(qaId){
  document.getElementById('reveal-'+qaId).classList.add('hidden');
  document.getElementById('answer-'+qaId).classList.remove('hidden');
  document.getElementById('explain-'+qaId).classList.remove('hidden');
  const correctIdx=parseInt(document.getElementById('answer-'+qaId).dataset.correct);
  document.querySelectorAll(`.qa-opt[data-qa="${qaId}"]`).forEach((opt,i)=>{
    if(i===correctIdx)opt.classList.add('correct');
  });
}

function buildTextCard(tb,secIdx,textIdx){
  const cardId=`c${secIdx}_${textIdx}`;
  const zhArr=tb.paragraphs_zh||[];
  let parasHtml='';
  tb.paragraphs.forEach((para,pi)=>{
    const pid=`${cardId}_p${pi}`;
    const zhLine=zhArr[pi]||'';
    // Escape backticks and $ in para for inline onclick
    const paraEsc=para.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
    parasHtml+=`<div class="para-block">
      <div class="para-de" id="${pid}" onclick="speakPara(this,\`${paraEsc}\`)">${para}</div>
      ${zhLine?`<div class="para-zh">${zhLine}</div>`:''}
    </div>`;
  });

  let qaHtml='';
  if(tb.qa&&tb.qa.length){
    let items='';
    tb.qa.forEach((qa,qi)=>{
      const qaId=`${cardId}_q${qi}`;
      const optsHtml=qa.options.map((opt,oi)=>
        `<div class="qa-opt" data-qa="${qaId}" data-idx="${oi}">${opt}</div>`
      ).join('');
      items+=`<div class="qa-item">
        <div class="qa-q">${qa.q}</div>
        <div class="qa-options">${optsHtml}</div>
        <div class="answer-row">
          <button class="reveal-btn" id="reveal-${qaId}" onclick="revealAnswer('${qaId}')">顯示答案</button>
          <div class="hidden" id="answer-${qaId}" data-correct="${qa.answer}">
            <span class="answer-badge">✓ ${qa.label}</span>
          </div>
        </div>
        <div class="explain-text hidden" id="explain-${qaId}">${qa.explain}</div>
      </div>`;
    });
    qaHtml=`<div class="qa-block"><div class="qa-label">📝 練習題</div>${items}</div>`;
  }

  return `<div class="text-card">
    <div class="text-card-header">
      <span class="badge badge-${tb.badgeCls}">${tb.badgeLabel}</span>
      <span class="text-src">${tb.src.replace(/^\[.*?\]\s*/,'')}</span>
    </div>
    <div class="text-body">${parasHtml}</div>
    ${qaHtml}
  </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll(){
  const indexed=VOCAB.map((v,i)=>[v,i]);
  const secVocab={};
  indexed.forEach(([v,i])=>{if(!secVocab[v.s])secVocab[v.s]=[];secVocab[v.s].push([v,i]);});

  let html='';
  SECTIONS.forEach((sec,si)=>{
    const col=sec.color;
    const allV=secVocab[sec.title]||[];
    const filtered=allV.filter(([v,i])=>{
      if(currentFilter==='unfamiliar')return unfamiliar.has(i);
      if(currentFilter==='familiar')return !unfamiliar.has(i);
      return true;
    });
    const ufCnt=allV.filter(([v,i])=>unfamiliar.has(i)).length;

    let tableHtml=filtered.length
      ?`<div class="vocab-wrap">${buildVocabTable(filtered,false)}</div>`
      :`<div class="vocab-wrap" style="padding:14px;text-align:center;font-size:12px;color:#aaa;background:#fff">（此篩選條件下無單字）</div>`;

    let textsHtml=sec.texts.map((tb,ti)=>buildTextCard(tb,si,ti)).join('');

    html+=`<div class="section-block" id="sec-${si}">
      <div class="section-title" style="background:${col}">${sec.title}</div>
      <div class="vocab-toolbar">
        <span class="vocab-count">單字 ${allV.length} 個${ufCnt>0?` ‧ 不熟悉 ${ufCnt} 個`:''}</span>
      </div>
      ${tableHtml}
      ${textsHtml}
    </div>`;
  });

  document.getElementById('exportBtn').disabled=(unfamiliar.size===0);
  document.getElementById('mainContent').innerHTML=html;
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function scrollToSection(idx,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const el=document.getElementById('sec-'+idx);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}
function buildNav(){
  const c=document.getElementById('navBtns');
  SECTIONS.forEach((sec,i)=>{
    // Strip Chinese annotation for short nav label
    const label=sec.title.replace(/（[^）]*）/,'').trim();
    const btn=document.createElement('button');
    btn.className='nav-btn';
    btn.textContent=label;
    btn.style.cssText=`border-color:${sec.color};`;
    btn.onclick=()=>scrollToSection(i,btn);
    c.appendChild(btn);
  });
}

// ── Export ────────────────────────────────────────────────────────────────────
function groupBySec(items){
  const out={};
  items.forEach(([v,i])=>{if(!out[v.s])out[v.s]=[];out[v.s].push([v,i]);});
  return out;
}
function toggleExport(){
  const p=document.getElementById('exportPanel');
  p.classList.toggle('visible');
  if(p.classList.contains('visible'))renderExport();
}
function renderExport(){
  const words=VOCAB.map((v,i)=>[v,i]).filter(([v,i])=>unfamiliar.has(i));
  document.getElementById('exportCount').textContent=`共 ${words.length} 個單字`;
  if(!words.length){
    document.getElementById('exportContent').innerHTML='<p style="color:#aaa;font-size:13px;padding:12px 0">尚未標記任何不熟悉的單字。</p>';
    return;
  }
  let html='';
  for(const [sec,ws] of Object.entries(groupBySec(words))){
    const col=SECTIONS.find(s=>s.title===sec)?.color||'#1F4E79';
    html+=`<div class="section-block">
      <div class="section-title" style="background:${col}">${sec}</div>
      <div class="vocab-wrap">${buildVocabTable(ws,true)}</div>
    </div>`;
  }
  document.getElementById('exportContent').innerHTML=html;
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildNav();
renderAll();
</script>
</body>
</html>
