<style>

.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.cat-btn { padding: 5px 13px; border-radius: 6px; border: 1px solid #b8cce0; background: #fff; color: #2563a8; font-size: 12.5px; cursor: pointer; white-space: nowrap; }
.cat-btn.active { background: #2563a8; color: #fff; border-color: #2563a8; }
.stats { font-size: 11.5px; color: #888; margin-left: 4px; }
.search-box { margin-left: auto; padding: 6px 13px; border: 1.5px solid #c5d0e0; border-radius: 20px; font-size: 12.5px; width: 180px; outline: none; }
.search-box:focus { border-color: #2563a8; }
.clear-btn { padding: 5px 12px; border-radius: 6px; border: 0.5px solid #f0c0c0; background: #fff; color: #c0392b; font-size: 12px; cursor: pointer; }

.dot-cell { width: 26px; cursor: pointer; user-select: none; }

.col-tr  { width: 22%; }

.ex-de { font-size: 12px; color: #222; line-height: 1.55; display: block; }
.ex-zh { font-size: 11px; color: #999; font-style: italic; display: block; margin-top: 1px; }

.empty { text-align: center; padding: 40px; color: #aaa; font-size: 13px; background: #fff; border: 0.5px solid #ddd; border-radius: 8px; }

.note-box-inline { background: #fff8e8; border-left: 3px solid #d8a030; border-radius: 4px; padding: 5px 8px; margin-top: 4px; font-size: 10.5px; color: #7a5a10; line-height: 1.5; }

.sub-header { font-size: 10.5px; font-weight: 600; color: #2a5a9b; padding: 6px 12px 4px; background: #eef3fb; border: 0.5px solid #ddd; border-bottom: none; letter-spacing: 0.03em; }

<div class="chapter-info">
  <h1>A2 → B2 單字升級表（口語與書面表達）</h1>
  <p class="subtitle">🔊 點德文字／句子可朗讀　⭕ 點圓圈標記不熟悉　依分類瀏覽：動詞・形容詞與副詞・連接詞與固定用法</p>

</div>

<div class="page">

  <div class="toolbar">

const VOCAB = [
// ── Verben：認知／思考 ───────────────────────────────────────────────
{cat:'verb', sub:'kognition', b2:'begreifen', a2:'verstehen', en:'understand / grasp', zh:'理解、領悟', ex:'Ich kann diese Entscheidung nicht begreifen.', ez:'我無法理解這個決定。', note:'begreifen 偏「智力上的理解、想通」；nachvollziehen 偏「換位理解、能跟上對方的邏輯或感受」。'},
{cat:'verb', sub:'kognition', b2:'nachvollziehen', a2:'verstehen', en:'comprehend / trace', zh:'理解、追溯理解', ex:'Ich kann den Standpunkt des Kunden gut nachvollziehen.', ez:'我能很好地理解客戶的立場。'},
{cat:'verb', sub:'kognition', b2:'wahrnehmen', a2:'sehen', en:'perceive', zh:'察覺、感知', ex:'Ich habe die Veränderung sofort wahrgenommen.', ez:'我立刻察覺到了這個變化。'},
{cat:'verb', sub:'kognition', b2:'vernehmen', a2:'hören', en:'perceive (by ear)', zh:'聽聞、得知', ex:'Wie ich vernommen habe, wird die Stelle neu ausgeschrieben.', ez:'據我所聞，這個職位將重新招募。'},

{cat:'verb', sub:'kognition', b2:'erwägen', a2:'denken', en:'weigh / consider', zh:'考慮、衡量', ex:'Wir erwägen, das Projekt zu verschieben.', ez:'我們正在考慮將這個專案延後。'},
{cat:'verb', sub:'kognition', b2:'vermuten', a2:'glauben', en:'assume', zh:'猜測、推測', ex:'Ich vermute, dass die Lieferung sich verzögert.', ez:'我猜測這次配送會延誤。'},
{cat:'verb', sub:'kognition', b2:'entdecken', a2:'finden', en:'discover', zh:'發現', ex:'Wir haben einen Fehler im System entdeckt.', ez:'我們在系統中發現了一個錯誤。'},
{cat:'verb', sub:'kognition', b2:'ausfindig machen', a2:'finden', en:'locate', zh:'找出、查出', ex:'Es ist uns gelungen, die Ursache ausfindig zu machen.', ez:'我們成功地找出了原因。'},
{cat:'verb', sub:'kognition', b2:'sich aneignen', a2:'lernen', en:'acquire (a skill)', zh:'學會、習得', ex:'Sie hat sich die neue Software schnell angeeignet.', ez:'她很快就學會了這套新軟體。'},
{cat:'verb', sub:'kognition', b2:'nachforschen', a2:'suchen', en:'investigate', zh:'追查、調查', ex:'Wir forschen nach, warum der Fehler entstanden ist.', ez:'我們正在調查這個錯誤是怎麼產生的。'},
{cat:'verb', sub:'kognition', b2:'beherrschen', a2:'wissen', en:'master', zh:'掌握、精通', ex:'Sie beherrscht das Thema sehr gut.', ez:'她對這個主題掌握得非常好。'},

{cat:'verb', sub:'kommunikation', b2:'sich erkundigen', a2:'fragen', en:'inquire', zh:'詢問、查詢', ex:'Ich möchte mich nach dem aktuellen Stand erkundigen.', ez:'我想詢問目前的進度。'},
{cat:'verb', sub:'kommunikation', b2:'behaupten', a2:'sagen', en:'claim', zh:'聲稱、主張', ex:'Der Kunde behauptet, das Paket nicht erhalten zu haben.', ez:'客戶聲稱沒有收到包裹。'},

{cat:'verb', sub:'kommunikation', b2:'äußern', a2:'sprechen', en:'express', zh:'表達、發表意見', ex:'Der Kollege hat seine Bedenken offen geäußert.', ez:'同事坦率地表達了他的疑慮。'},

let currentFilter = 'all';
let currentCat = 'all';
let currentSearch = '';
let unfamiliarSet = new Set();

function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) unfamiliarSet = new Set(JSON.parse(s)); } catch(e) {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...unfamiliarSet])); } catch(e) {}
}

const CATS = { verb: '動詞', adj: '形容詞／副詞', konn: '連接詞／固定用法' };

function buildRow(v) {
  const id = v.b2;
  const unfam = unfamiliarSet.has(id);
  const noteHtml = v.note ? `<div class="note-box-inline">💡 ${v.note}</div>` : '';
  return `<tr class="${unfam?'unfamiliar':''}" data-id="${escAttr(id)}" data-cat="${v.cat}" data-sub="${v.sub}" data-search="${(v.b2+' '+v.a2+' '+v.en+' '+v.zh).toLowerCase()}">
    <td class="dot-cell" onclick="toggleMark('${escAttr(id)}')"><span class="dot"></span></td>
    <td class="speak-cell" onclick="speakText('${escAttr(v.b2)}','de-DE')"><span class="word-b2">${v.b2}</span></td>
    <td class="speak-cell" onclick="speakText('${escAttr(v.a2)}','de-DE')"><span class="word-a2">${v.a2}</span></td>
    <td>
      <span class="word-en">${v.en}</span>
      <span class="word-zh">${v.zh}</span>
      ${noteHtml}
    </td>
    <td class="speak-cell" onclick="speakText('${escAttr(v.ex)}','de-DE')">
      <span class="ex-de">${v.ex}</span>
      <span class="ex-zh">${v.ez}</span>
    </td>
  </tr>`;
}

function escAttr(s) { return s.replace(/'/g, "\\'"); }

function buildTable(items) {
  if (!items.length) return '';
  let rows = items.map(v => buildRow(v)).join('');
  return `<table>
    <thead><tr>
      <th class="col-dot"></th>
      <th class="col-b2">B2 進階單字</th>
      <th class="col-a2">A2 初階單字</th>
      <th class="col-tr">中／英文翻譯</th>
      <th class="col-ex">例句（僅 B2 單字）</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function render() {
  const grouped = { verb: {}, adj: {}, konn: {} };
  VOCAB.forEach((v) => {
    const id = v.b2;
    const isUnfam = unfamiliarSet.has(id);
    const okFilter = currentFilter==='all' || (currentFilter==='unfamiliar'&&isUnfam) || (currentFilter==='familiar'&&!isUnfam);
    const okCat = currentCat==='all' || currentCat===v.cat;
    const srch = (v.b2+' '+v.a2+' '+v.en+' '+v.zh).toLowerCase();
    const okSearch = !currentSearch || srch.includes(currentSearch);
    if (okFilter && okCat && okSearch) {
      if (!grouped[v.cat][v.sub]) grouped[v.cat][v.sub] = [];
      grouped[v.cat][v.sub].push(v);
    }
  });

  let html = '';
  let total = 0;
  Object.keys(grouped).forEach(cat => {
    const subKeys = Object.keys(grouped[cat]);
    const catCount = subKeys.reduce((s,k) => s + grouped[cat][k].length, 0);
    if (!catCount) return;
    html += `<div class="section-header">${CATS[cat]}（${catCount}）</div>`;
    subKeys.forEach(sub => {
      const items = grouped[cat][sub];
      if (!items.length) return;
      const subLabel = SUBCATS[cat][sub] || sub;
      html += `<div class="sub-header">${subLabel}（${items.length}）</div>`;
      html += buildTable(items);
      total += items.length;
    });
  });

  document.getElementById('mainContent').innerHTML = html;
  document.getElementById('noResults').style.display = total===0 ? 'block' : 'none';
  document.getElementById('stats').textContent = `共 ${VOCAB.length} 組　顯示 ${total} 組　不熟悉 ${unfamiliarSet.size} 組`;
}

function toggleMark(id) {
  if (unfamiliarSet.has(id)) unfamiliarSet.delete(id); else unfamiliarSet.add(id);
  save();
  render();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.toolbar-left .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setCat(c, btn) {
  currentCat = c;
  document.querySelectorAll('.toolbar-left .cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function runSearch(q) { currentSearch = q.toLowerCase(); render(); }
function clearAll() {
  if (!confirm('確定要清除所有「不熟悉」標記嗎？')) return;
  unfamiliarSet = new Set(); save(); render();
}

// ── TTS ──────────────────────────────────────────────────────────────────
function loadVoices() { if (typeof speechSynthesis !== 'undefined') speechSynthesis.getVoices(); }
if (typeof speechSynthesis !== 'undefined') {
  loadVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
}
function speakText(text, lang) {
  if (typeof speechSynthesis === 'undefined' || !text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 0.9;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}

// ── Checkpoint export / import ───────────────────────────────────────────
// 重要：checkpoint 儲存的是「B2 單字本身的文字」，不是陣列位置（index）。
// 這樣即使之後在表格中間插入新單字，舊的 checkpoint 仍能正確對應到同一個單字。
const CP_FILENAME = 'Wortschatz_A2-B2-Upgrade_checkpoint.json';
const VALID_IDS = new Set(VOCAB.map(v => v.b2));

function exportCheckpoint() {
  const data = JSON.stringify([...unfamiliarSet].sort(), null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = CP_FILENAME; a.click();
  URL.revokeObjectURL(url);
}

function importCheckpoint(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const arr = JSON.parse(e.target.result);
      if (!Array.isArray(arr)) {
        alert('格式錯誤：JSON 應為陣列，例如 ["begreifen", "bewältigen"]');
        return;
      }
      // 相容舊版（純數字 index）格式：若偵測到全為數字，提醒使用者舊檔已不適用新版結構
      if (arr.length && arr.every(x => typeof x === 'number')) {
        alert('這是舊版（以位置編號儲存）的 checkpoint 檔案，與目前版本不相容，且新版表格已重新分類排序，無法安全轉換。\n建議：忽略此檔案，重新勾選一次不熟悉的單字（之後匯出的新檔案就不會再有這個問題）。');
        return;
      }
      const newSet = new Set(arr.filter(x => typeof x === 'string' && VALID_IDS.has(x)));
      const skipped = arr.length - newSet.size;
      unfamiliarSet = newSet;
      save();
      render();
      setCpStatus(skipped > 0 ? `✓ 匯入成功（略過 ${skipped} 個目前清單中找不到的單字）` : '✓ 匯入成功');
    } catch(err) {
      alert('格式錯誤：無法解析 JSON 檔案\n' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function setCpStatus(msg) {
  const el = document.getElementById('cpStatus');
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 3000);
}

load();
render();
</script>
